numero: "45-02"
titre: "A toi mon cœur, Dieu créateur"
couplets:
  - |
    A toi mon cœur, Dieu créateur,
    Qui me donnas la vie !
    Tu me nourris, tu me guéris
    Et tu me fortifies.
    Le monde entier, par ses beautés,
    Proclame ta louange.
    Pour t'adorer, pour t'exalter,
    Il chante avec les anges.
  - |
    A toi mon cœur, ô Dieu Sauveur,
    En qui seul est la joie !
    Tu m'as remis, tu m'as conduit
    Dans une juste voie.
    Je ne crains rien du monde vain,
    Qu'il flatte ou qu'il menace.
    Pourquoi douter, pourquoi trembler ?
    Tu m'as promis ta grâce.
  - |
    A toi mon cœur, Consolateur,
    Esprit venu du Père !
    Dans mes combats, soutiens mes pas,
    En toi toujours j'espère.
    De mon péché veuille arracher
    Les racines amères
    Pour mon bonheur et pour l'honneur
    De ton Nom sur la terre !
credits: "Str. 1 : d'après Jean Anderfuhren *1926 / str. 2-3 : d'après Psautier Laufer 1926 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
