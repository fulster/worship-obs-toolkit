numero: "32-34"
titre: "Quand Dieu naît dans la nuit profonde"
refrain: |
  Quand Dieu naît dans la nuit profonde,
  L’espoir renaît dans notre nuit.
couplets:
  - |
    Ce Dieu déjà si près de nous
    Devient un homme comme nous.
  - |
    Si tant de doutes t’ont lassé,
    Celui qui sait vient t’éclairer.
  - |
    Il voit ta vie, il voit ton cœur :
    A son image, sois vainqueur !
  - |
    Reçois l’amour de Jésus-Christ,
    Répands sa paix par son Esprit !
  - |
    Malgré les haines qui font peur,
    Vers les humains tourne ton cœur ! Refr.
    Yves Kéler *1939
    © Auteur (138)
credits: "Dieter Trautwein *1928 — © Strube Verlag, Pettenkoferstr. 24, D-80336 München"
traductions:
  - langue: "de"
    couplets:
      - |
        Der immer schon uns nahe war,
        Stellt sich als Mensch den Menschen dar. Kehrvers
      - |
        Bist du der eignen Rätsel müd ?
        Es kommt, der alles kennt und sieht. Kehrvers
      - |
        Er sieht dein Leben unverhüllt,
        Zeigt dir zu gleich dein neues Bild. Kehrvers
      - |
        Nimm an des Christus Freundlichkeit,
        Trag seinen Frieden in die Zeit. Kehrvers
      - |
        Schreckt dich der Menschen Widerstand,
        Bleib ihnen dennoch zugewandt.
        Weil Gott in tiefster Nacht erschienen,
        Kann unsre Nacht nicht endlos sein.
