numero: "52-20"
titre: "Si tu dis par tes mots"
refrain: |
  Alors tu seras sauvé !
  Seigneur, nous croyons en toi,
  Fais grandir en nous la foi !
couplets:
  - |
    Si tu dis par te mots que Jésus est Seigneur,
    Si tu crois dans ton cœur que Dieu l'a ressuscité,
  - |
    Si tu dis par te mots que Dieu est créateur,
    Si tu crois dans ton cœur qu'il nous a fait à son image,
  - |
    Si tu dis par te mots que l'Esprit est amour,
    Si tu crois dans ton cœur qu'il fait naître son Eglise,
  - |
    Si tu dis par te mots que la mort est vaincue,
    Si tu crois dans ton cœur que tu ressusciteras, refr.
    Dom Georges Lefebvre (XXe)
