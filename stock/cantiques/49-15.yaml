numero: "49-15"
titre: "Tu es la joie de nos journées"
couplets:
  - |
    Tu es la joie de nos journées,
    Nos temps, Seigneur, sont dans ta main.
    Nous avançons dans ta clarté,
    Voyant, sans peur, venir demain.
  - |
    Tu es fidèle à ton dessein,
    Malgré les vents et les marées.
    Pour te rejoindre un seul chemin :
    Jésus, ton Fils, ton bien-aimé.
  - |
    Prenant le pain qui nous unit
    Et nous fait membres de son corps,
    Nous recevons de lui la vie
    Qui a déjà vaincu la mort.
  - |
    Reste avec nous quand vient le soir,
    Guide nos pas au long des jours,
    Fais nous marcher, remplis d’espoir,
    Vers la cité de ton amour.
