numero: "41-36"
titre: "Oui, tu es digne de régner"
couplets:
  - |
    Oui, tu es digne de régner dans notre cœur.
    Tu es le Roi de l’univers, alléluia, (alléluia) !
    Jésus, tu es le maître en moi, alléluia, (alléluia) !
    Alléluia, alléluia !
    Worthy are you, o Lord our God of glory and power,
    For you are reigning now on high, hallelujah, (hallelujah) !
    Jesus is Lord of all the earth, hallelujah, (hallelujah) !
    Hallelujah, hallelujah !
    Dave Richards (XXe)
    © Thank You Music, c/o LTC, 16, av. de la République, F-94000 Créteil (69a)
    Du bist der allerhöchste, Herr, würdig bist du !
    Dir gebührt Macht, Lobpreis und Ehr, halleluja, (halleluja) !
    König der Erde und des Alls, wir rufen dir zu, (wir rufen dir zu) :
    Halleluja, halleluja !
