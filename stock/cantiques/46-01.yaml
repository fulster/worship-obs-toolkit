numero: "46-01"
titre: "O Père des lumières"
couplets:
  - |
    O Père des lumières
    Et de tout don parfait,
    Tu es toujours le même
    Et nous combles de biens.
    Nous sommes par ta grâce
    Comptés parmi les tiens ;
    Jamais tu ne te lasses
    De nous tendre la main.
  - |
    Ta loi sainte et parfaite,
    Ta loi de liberté,
    Eclaire nos visages,
    Vient nous illuminer.
    Elle nous fait connaître
    Les défauts de nos vies
    Et nous incite à suivre
    L'appel de Jésus-Christ.
  - |
    Donne-nous la sagesse,
    Seigneur, pour accueillir
    Tout homme, riche ou pauvre,
    L'aimer et le servir.
    Mets en nous la prière
    Et viens changer nos cœurs
    Pour annoncer ton Règne,
    Source de vrai bonheur.
credits: "Commission d'hymnologie de la Fédération protestante de France 19479 / Roger Trunk * 1930 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)"
