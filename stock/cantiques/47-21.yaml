numero: "47-21"
titre: "J'ai besoin de ta confiance"
couplets:
  - |
    J'ai besoin de ta confiance
    Pour vivre chaque jour.
    J'ai besoin de ta présence.
    J'ai besoin d'être sûr de ton amour.
  - |
    Pouvoir frapper à ta porte,
    Parler en vérité,
    Savoir que tu réconfortes
    Et chez toi être toujours invité.
  - |
    J'ai besoin de ta patience,
    De ta sincérité.
    Tu entends mes confidences,
    Et chez toi, je suis en sécurité.
credits: "Colette Chanas *1948 — © Auteur (112)"
