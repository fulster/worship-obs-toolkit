numero: "49-52"
titre: "Pour le pain de chaque jour"
couplets:
  - |
    Pour le pain de chaque jour,
    Béni soit le Dieu d’amour !
    La Parole du Seigneur
    Vienne aussi nourrir nos cœurs !
