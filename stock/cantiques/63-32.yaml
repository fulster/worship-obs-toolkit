numero: "63-32"
titre: "Prière eucharistique"
couplets:
  - |
    Seigneur, nous annonçons ta mort,
    Nous proclamons ta résurrection
    Et nous attendons ton retour dans la gloire.
    Herr, wir verkünden deinen Tod,
    wir preisen deine Auferstehung,
    wir erwarten dein Zukunft in Herrlichkeit.
