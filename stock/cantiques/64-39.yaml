numero: "64-39"
titre: "Psaume 121"
source: "Antienne parlée"
couplets:
  - |
    Le Seigneur veillera sur toi depuis ton départ jusqu’à ton retour. (verset 8)
  - |
    Si Dieu est pour nous, qui sera contre nous ? (Rm 8,31b)
    Antienne chantée : 64-12
    Je lève les yeux vers les montagnes.
    Qui pourra me secourir ?
    Le secours me vient du Seigneur,
    qui a fait le ciel et la terre.
    Qu’il t’empêche de glisser,
    qu’il ne dorme pas, ton gardien !
    Non, il ne ferme pas les yeux,
    il ne dort pas, le gardien d’Israël.
    Le Seigneur est ton gardien,
    le Seigneur te protège,
    il est auprès de toi.
    Pendant le jour, le soleil ne te frappera pas,
    pendant la nuit, la lune ne te fera aucun mal.
    Le Seigneur te protégera de tout mal,
    il veillera sur ta vie.
    Le Seigneur veillera sur toi depuis ton départ jusqu’à ton retour,
    dès maintenant et pour toujours !
    Gloire au Père, au Fils, au Saint-Esprit,
    maintenant, et toujours, pour les siècles des siècles !
    Amen.
    (Confiance, Départ, Sépulture)
