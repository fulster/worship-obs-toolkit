numero: "51-04"
titre: "Tous ensemble, amis"
couplets:
  - |
    Canon
    (1) Tous ensemble, amis, chantons d’un cœur joyeux,
    Oui, chantons, louons notre Dieu !
    (2) Tous ensemble et d’un cœur joyeux,
    Oui, chantons, louons notre Dieu !
    (3) Oui, chantons, louons notre Dieu ! (bis)
    (4) Oui, chantons, louons notre Dieu !
    Amen, amen, alléluia !
credits: "Claire-Lise de Benoit 1917-2008 — © Ligue pour la Lecture de la Bible, Chemin de Bérée 70, CH – 1010 Lausanne, avec autorisation (45)"
