numero: "64-65"
titre: "Ouverture 5"
couplets:
  - |
    Seigneur, ouvre nos lèvres
    	et nos bouches annonceront ta louange.
    Nous t’invoquons car tu nous exauces, ô Dieu.
    	Incline vers nous ton oreille, entends notre prière.
    A toi, Seigneur, nous élevons nos cœurs,
    	en toi, Seigneur, nous mettons notre confiance.
    Béni soit le règne du Père, du Fils et du Saint-Esprit,
    	maintenant, toujours et aux siècles des siècles. Amen.
    (Tous les temps)
