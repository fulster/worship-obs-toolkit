numero: "45-04"
titre: "Viens habiter dans notre âme"
couplets:
  - |
    Viens habiter dans notre âme,
    Fais-nous vivre par la foi !
    Viens, Seigneur, et nous enflamme
    De l'amour qui vient de toi !
    Que toujours et malgré tout
    L'espérance vive en nous !
  - |
    Tu nous vois souvent, ô Père,
    Dans l'angoisse et les soucis.
    Puisqu'en toi tout est lumière,
    Viens dissiper notre nuit !
    Fais-nous vivre désormais
    Dans la joie et dans la paix !
  - |
    Garde-nous dans l'assurance
    De ton éternel amour,
    Même au jour où la souffrance
    Nous éprouve à notre tour.
    Dans les peines, les revers,
    Montre-nous le ciel ouvert !
credits: "d'après Cantiques spirituels Strasbourg 1824"
