numero: "49-60"
titre: "Donne à tout être qui vit"
couplets:
  - |
    Donne à tout être qui vit sa nourriture ;
    Par ta Parole, nourris nos âmes qui t’appartiennent ;
    Mets dans nos cœurs la reconnaissance ! Amen.
