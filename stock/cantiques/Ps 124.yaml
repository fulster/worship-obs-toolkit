numero: "Ps 124"
titre: "Sans le Seigneur qui nous a protégés"
couplets:
  - |
    Sans le Seigneur qui nous a protégés
    Dans ce péril, nous attendions la mort.
    Comme Israël pourrait le dire encor !
    Mais quand Dieu vint et nous eut dégagés,
    Hors du filet, nous prîmes notre essor.
  - |
    Les ennemis venaient comme un torrent,
    Quand il déborde et fonce devant lui,
    En ravageant les champs hors de son lit.
    Sans le Seigneur, que faisions-nous devant ?
    Les grandes eaux nous eussent engloutis.
  - |
    Nous bénissons le bras du Tout-Puissant
    Qui nous sauva de nos persécuteurs,
    Hors de leurs dents, soustraits à leur fureur.
    Il a rompu les pièges des méchants :
    Notre secours est au nom du Seigneur.
credits: "Théodore de Bèze 1519-1605 / Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
