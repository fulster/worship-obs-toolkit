numero: "31-25"
titre: "Viens, ô Jésus, régner sur cette terre"
couplets:
  - |
    Viens, ô Jésus ! Régner sur cette terre.
    Viens te montrer puissant et glorieux.
    Nous t’attendons, reviens du haut des cieux
    Pour mettre un terme à toutes nos misères. (bis)
  - |
    Ne laisse pas plus longtemps notre terre
    Livrée au mal, à la haine, à l’erreur :
    N’entends-tu point le cri de sa douleur ?
    Ah ! dans sa nuit fais briller ta lumière. (bis)
  - |
    Nos faibles mains se lassent de combattre,
    Nos tristes cœurs se lassent d’espérer.
    Viens sans retard ; oh ! viens nous délivrer !
    Notre courage est si prompt à s’abattre. (bis)
  - |
    Viens donc, ô Dieu ! faire éclater ta gloire.
    Que tout pécheur, prosterné devant toi,
    Te rende honneur, comme à son divin Roi,
    Et plein d’amour, célèbre ta victoire. (bis)
credits: "Str. 1 et 4 : Henriette Lutteroth (XIXe) / str. 2-3 : Auguste Decoppet 1836-1906"
