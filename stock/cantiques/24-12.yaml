numero: "24-12"
titre: "Seigneur, tu nous partages"
couplets:
  - |
    Seigneur, tu nous partages ton corps et ton sang, (bis)
    Et nous allons tout joyeux vers toi en chantant :
    Tu es le Dieu fidèle, éternellement. (bis)
  - |
    L’amour que tu nous donnes nous a libérés, (bis)
    Et nous marchons vers la sainteté de ton nom.
    Tu es le Dieu fidèle, éternellement. (bis)
  - |
    Tu as tracé la route qui nous mène à toi, (bis)
    Et nous allons invitant le monde à la joie :
    Tu es le Dieu fidèle, éternellement. (bis)
credits: "Odette Vercruysse 1925-2000 — © Studio SM, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne"
