numero: "48-01"
titre: "Il est pour le fidèle"
couplets:
  - |
    Il est pour le fidèle,
    Au-delà du tombeau,
    Une terre nouvelle
    Qu'éclaire un jour plus beau,
    Où l'éternel bonheur
    Est celui de la grâce
    Où la douleur s'efface
    Sous la main du Seigneur.
  - |
    Celui qu'en sa puissance
    Jésus ramène au port
    Ne craint plus la souffrance,
    Le péché ni la mort.
    Là cesse la douleur,
    Là cessent les alarmes
    Et s'apaisent les larmes
    Sous la main du Seigneur.
  - |
    Dans la pleine lumière,
    Dans la pleine beauté
    De la nouvelle terre,
    De la neuve cité,
    Quand le Seigneur fera
    Toutes choses nouvelles,
    De la vie éternelle,
    Chaque vie brillera.
  - |
    Toi qui vins sur la terre
    Jésus, vivre et mourir,
    Vivant auprès du Père,
    Tu es notre avenir ;
    Donne-nous chaque jour
    La force de ta grâce
    Et que ta main nous fasse
    Revivre ton amour.
credits: "E. Megnin 1818-1900, rév. 1977 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)"
