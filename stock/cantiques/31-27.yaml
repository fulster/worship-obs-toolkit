numero: "31-27"
titre: "Soleil de justice"
couplets:
  - |
    Soleil de justice,
    Jésus, bon Sauveur !
    Sois à tous propice,
    Sauve le pécheur !
    Que ta connaissance
    Couvre l’univers,
    Comme l’onde immense
    L’abîme des mers !
  - |
    Nous voyons l’aurore
    Eclairer les cieux,
    Mais la nuit encore
    Règne en bien des lieux.
    Céleste lumière
    De la vérité,
    Sur toute la terre
    Répands ta clarté !
  - |
    Jour de délivrance
    Longtemps attendu,
    Jour où la souffrance
    Aura disparu,
    O jour salutaire
    Où Dieu règnera,
    Notre âme t’espère,
    Notre œil te verra !
  - |
    La terre soupire,
    Seigneur, après toi,
    Elle te désire,
    Saint et juste Roi.
    A toi la victoire,
    O Dieu de bonté !
    A toi seul la gloire
    Pour l’éternité !
credits: "Psalmodie morave 1785"
