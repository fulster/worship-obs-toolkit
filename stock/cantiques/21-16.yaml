numero: "21-16"
titre: "Avec toi, Seigneur, tous ensemble"
source: "Les strophes en rouge ne figurent pas dans le recueil imprimé"
refrain: |
  Avec toi, Seigneur, tous ensemble,
  Nous voici, joyeux
  Et sûrs de ton amour.
  Tu nous as rassemblés
  Dans la joie de ta présence
  Et c’est toi qui nous unis.
couplets:
  - |
    C’est toi qui nous unis,
    Ton amour a fait de nous des frères,
    Tu es vivant au milieu de nous.
  - |
    Les mains tendues vers toi,
    Nous venons t’offrir notre prière,
    Tu es vivant au milieu de nous.
  - |
    Venus à ton appel,
    Nous voulons entendre ta Parole,
    Tu es vivant au milieu de nous.
  - |
    Seigneur, nous avons faim,
    Que ton corps soit notre nourriture,
    Tu es vivant au milieu de nous.
  - |
    O Christ ressuscité !
    Nous chantons la vie que tu nous donnes,
    Tu es vivant au milieu de nous.
  - |
    Tu donnes ton amour,
    Ton Esprit fait vivre ton Eglise,
    Tu es vivant au milieu de nous.
  - |
    Venus à ton festin,
    Que ce vin déride nos visages,
    Tu es vivant au milieu de nous.
credits: "Abbé Maurice Debaisieux (†1994) — © Studio SM, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne (68)"
