numero: "47-14"
titre: "Prends ma main dans la tienne"
source: "So nimm denn meine Hände"
couplets:
  - |
    Prends ma main dans la tienne
    Et qu'en tout lieu
    Ta droite me soutienne,
    Seigneur, mon Dieu !
    Comment donc sans ton aide
    Me diriger,
    Si je ne te possède
    Dans le danger ?
  - |
    Que ta main me dispense
    Joie ou douleur,
    Paisible en ta présence
    Garde mon cœur ;
    Je ne sais qu'une chose,
    Moi, ton enfant :
    Dans ta main je repose,
    Calme et confiant.
  - |
    Mais si l'orage gronde,
    Si tout m'est pris,
    Si la mer est profonde
    Et le ciel gris,
    Que ta voix me soutienne
    Même en ce lieu,
    Que ma main dans la tienne
    Reste, ô mon Dieu !
credits: "Julie von Hausmann 1825-1901 / Mme E. Roehrich 1908"
