numero: "24-06"
titre: "C’est toi, Seigneur, le pain rompu"
couplets:
  - |
    C’est toi, Seigneur, le pain rompu,
    Livré pour notre vie.
    C’est toi, Seigneur, notre unité,
    Jésus ressuscité !
  - |
    Jésus, nous rappelons ta mort
    Et ta résurrection,
    Et dans la foi nous attendons
    Le jour de ton retour.
  - |
    Nous partageons un même pain
    Dans une même foi,
    Et nous formons un même corps,
    L’Eglise de Jésus.
  - |
    Voici venir le temps de Dieu,
    Il faut nous préparer.
    C’est maintenant le temps de Dieu,
    Il faut changer nos cœurs.
  - |
    Si nous souffrons en Jésus-Christ,
    En lui nous régnerons.
    Si nous mourons en Jésus-Christ,
    En lui nous revivrons.
credits: "Jean-Paul Lécot *1947 — © Méta-Editions, c/o SECLI 05/004, Abbaye Sainte Scholastique, F-81110 Dourgne"
