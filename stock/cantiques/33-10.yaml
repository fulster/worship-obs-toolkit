numero: "33-10"
titre: "Jésus-Christ, notre espérance"
couplets:
  - |
    Jésus-Christ, notre espérance,
    Aux pécheurs est livré.
    Dans la souffrance,
    Il porte nos offenses.
    Seigneur, Seigneur, aie pitié.
  - |
    Sa mort fut notre baptême,
    Notre mort au péché.
    Vivons fidèles,
    La vie enfin nouvelle.
    Seigneur, Seigneur, aie pitié.
  - |
    Jésus-Christ, le Seigneur, règne,
    Il a tout dans sa main,
    Grâce et détresse,
    La vie et la mort même.
    Seigneur, Seigneur, aie pitié.
  - |
    Jésus-Christ est notre fête,
    Nous voici délivrés,
    Car la lumière
    Sur le peuple se lève.
    Seigneur, Seigneur, aie pitié.
  - |
    Gloire soit à Dieu le Père,
    A l’Esprit de clarté.
    Gloire éternelle
    A toi qui nous éveilles,
    Le Christ est ressuscité.
