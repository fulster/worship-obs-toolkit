numero: "32-16"
titre: "D’un arbre séculaire"
couplets:
  - |
    D’un arbre séculaire,
    Du vieux tronc d’Isaï,
    Durant l’hiver austère,
    Un frais rameau jaillit.
    Et sur le sol durci,
    Dans la nuit calme et claire,
    Une rose a fleuri.
  - |
    Dieu, par la voix fervente
    De nombreux serviteurs,
    A son peuple en attente
    Promettait un Sauveur.
    Il vient, suprême honneur,
    Chez une humble servante,
    Toute à son pur bonheur.
  - |
    Pauvre et sans apparence,
    O Jésus notre roi,
    Tu portes nos souffrances
    En mourant sur la croix.
    Heureux celui qui croit !
    ll trouve l’espérance
    Et l’amour dans la foi.
    d’après Louis Monastier 1871-1953
credits: "© On Jordan’s Banks Music Publishing Lutheran Book of Worship, Augsburg Fortress (56)"
traductions:
  - langue: "de"
    couplets:
      - |
        Es ist ein Ros entsprungen
        aus einer Wurzel zart,
        wie uns die Alten sungen,
        von Jesse kam die Art
        und hat ein Blümlein bracht
        mitten im kalten Winter,
        wohl zu der halben Nacht.
      - |
        Das Blümlein, das ich meine,
        davon Jesaja sagt,
        hat uns gebracht alleine
        Marie, die reine Magd ;
        aus Gottes ewgem Rat
        hat sie ein Kind geboren,
        welches uns selig macht.
      - |
        Das Blümelein so kleine,
        das duftet uns so süss ;
        mit seinem hellen Scheine
        vertreibt’s die Finsternis.
        Wahr’ Mensch und wahrer Gott,
        hilft uns aus allem Leide,
        rettet von Sünd und Tod.
      - |
        O Jesu, bis zum Scheiden
        aus diesem Jammertal
        lass dein Hilf uns geleiten
        hin in den Freudensaal,
        in deines Vaters Reich,
        da wir dich ewig loben ;
        o Gott, uns das verleih !
        Str. 1-2 Trêves 1567 / str. 3-4 Fridrich Layriz 1808-1859
  - langue: "en"
    couplets:
      - |
        Lo, how a rose is growing,
        a bloom of finest grace ;
        the prophets had foretold it :
        a branch of Jesse’s race
        would bear one perfect flower
        here in the cold of winter
        and darkest midnight hour.
      - |
        The rose of which I’m singing,
        Isaiah had foretold.
        He came to us through Mary
        who sheltered him from cold.
        Through God’s eternal will
        this child to us was given
        at midnight calm and still.
      - |
        The shepherds heard the story
        the angels sang that night :
        how Christ was born of Mary ;
        he was the Son of light.
        To Bethlehem they ran
        to find him in the manger
        as angel heralds sang.
      - |
        This flower, so small and tender,
        with fragrance fills the air ;
        his brightness ends the darkness
        that kept the earth in fear.
        True God and yet true man,
        he came to save his people
        from earth’s dark night of sin.
