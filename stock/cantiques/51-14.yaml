numero: "51-14"
titre: "Quand l’Esprit de Dieu habite en moi"
couplets:
  - |
    Quand l’Esprit de Dieu habite en moi, Je chante comme David, (bis)
    Je chante, je chante, je chante comme David. (bis)
  - |
    Quand l’Esprit de Dieu habite en moi, / Je prie comme David, (bis)
    Je prie, je prie, je prie comme David. (bis)
  - |
    Quand l’Esprit de Dieu habite en moi, / Je loue comme David, (bis)
    Je loue, je loue, je loue comme David. (bis)
  - |
    Quand l’Esprit de Dieu habite en moi, / Je danse comme David, (bis)
    Je danse, je danse, je danse comme David. (bis)
credits: "Auteur inconnu"
