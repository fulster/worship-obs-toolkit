numero: "47-03"
titre: "Dans toutes nos détresses"
couplets:
  - |
    Dans toutes nos détresses,
    Dieu nous protégera.
    Soyons dans l'allégresse,
    Le Malin s'enfuira.
    Il est perdu d'avance
    Malgré fureurs et cris,
    Car la Toute-puissance
    A pour nom Jésus-Christ.
  - |
    Il promet la victoire,
    Le Seigneur, le Dieu fort,
    Et son règne de gloire
    Triomphe de la mort.
    Si l'enfer plein de haine
    Redouble de fureur,
    Bientôt sa force vaine
    Connaîtra son erreur.
  - |
    Croyons en la parole
    Du Dieu de vérité ;
    C'est lui qui nous console,
    Nous rend la liberté.
    Il nous montre la route
    De justice et de paix,
    Et malgré tous nos doutes
    Nous fait siens à jamais.
  - |
    Pleins de reconnaissance,
    Louons notre Seigneur ;
    Peuple de son alliance,
    Ayons la joie au cœur !
    Il est toujours le même,
    Hier, aujourd'hui, demain.
    Il combattra lui-même,
    Nous sommes dans sa main.
    Georges Casalis1917-1987
    © Auteur (110)
credits: "Friedrich Weyermüller 1810-1877"
traductions:
  - langue: "de"
    couplets:
      - |
        Es muss uns doch gelingen,
        denn Gott ist unser Schutz ;
        drum lasst uns fröhlich singen
        dem bösen Feind zum Trutz.
        Er muss doch unterliegen
        mit aller Macht und List ;
        der Stärkre hilft uns siegen,
        er heisset Jesus Christ.
      - |
        Das Reich muss uns doch bleiben,
        hier ist Immanuel ;
        er wehrt dem wilden Treiben,
        er macht das Dunkel hell.
        Wer will ihm widerstehen ?
        Mit Allmacht angetan,
        geht er auf lichten Höhen
        die majestät'sche Bahn.
      - |
        Wir glauben seinem Worte,
        wir baun auf seine Treu.
        Er macht an jedem Orte
        sein armes Häuflein frei ;
        er führt's auf rechter Strassen
        zu seines Namens Ruhm ;
        er kann uns nicht verlassen,
        wir sind sein Eigentum.
      - |
        Drum auf und singe fröhlich,
        wer immer singen kann.
        Die Taten sind unzählig,
        die er an uns getan ;
        und wie in alten Zeiten,
        so tut er immerdar.
        Der Herr wird für uns streiten,
        das ist gewisslich wahr.
