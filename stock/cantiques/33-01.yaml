numero: "33-01"
titre: "O Jésus, notre frère"
couplets:
  - |
    O Jésus, notre frère,
    Tu gravis le calvaire,
    Et pour nous tu souffris.
    Accorde-nous toi-même
    Le nom de ceux qui t’aiment,
    Au nom de ton amour meurtri.
  - |
    Tu sais notre faiblesse,
    Nous savons ta tendresse,
    Ramène-nous vers toi ;
    Ecoute nos prières,
    O Jésus, notre frère,
    Qui pour nous mourus sur la croix.
  - |
    Jésus, que ta souffrance
    Apporte l’espérance
    Au monde en son malheur ;
    Que ton amour fidèle
    A l’amour nous appelle,
    Que ta paix soit notre bonheur.
credits: "Commission d'hymnologie de la Fédération protestante de France 1974 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04"
