numero: "33-22"
titre: "O Jésus, par tes blessures"
couplets:
  - |
    O Jésus, par tes blessures,
    Tes angoisses et ta mort,
    Le salut, tu me l’assures :
    Tu me rends toujours plus fort.
  - |
    La lutte est inachevée
    Au-dedans comme au-dehors,
    Mais ton aide est assurée,
    Et je suis toujours plus fort.
  - |
    Que jusqu’à la dernière heure,
    Dans la lutte avec la mort,
    Mon espoir en toi demeure ;
    Ton pouvoir est le plus fort.
    4 En Christ est mon espérance,
    Et je lui remets mon sort.
    Dans la mort et la souffrance,
    Mon Sauveur me rend plus fort.
credits: "Psautier Laufer / Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
