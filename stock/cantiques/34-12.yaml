numero: "34-12"
titre: "Jour triomphal du Fils de Dieu"
couplets:
  - |
    Jour triomphal du Fils de Dieu,
    Où Christ se lève glorieux !
    Alléluia ! alléluia !
    Pour nous, il est ressuscité
    Et de la mort il tient les clés.
    Alléluia ! alléluia !
  - |
    Jésus vainqueur nous rend les cieux,
    Avec nos droits d’enfants de Dieu.
    Alléluia ! alléluia !
    Le ciel, la terre sont unis
    Pour célébrer l’œuvre accompli.
    Alléluia ! alléluia !
  - |
    Au Père, au Dieu de majesté,
    Louange pour l’éternité !
    Alléluia ! alléluia !
    Louange au Fils, le Rédempteur,
    Au Saint-Esprit, le Défenseur !
    Alléluia ! alléluia !
credits: "d’après Richard Paquier 1905-1985"
