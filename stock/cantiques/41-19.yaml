numero: "41-19"
titre: "A Dieu seul nous rendons gloire"
couplets:
  - |
    A Dieu seul nous rendons gloire,
    Il est notre Créateur ;
    En lui seul nous voulons croire,
    Du monde il est le Sauveur ;
    Il protège avec tendresse
    L’orphelin qui crie à lui ;
    Il est notre unique appui,
    Nous vivons de sa promesse :
    Tout finit, mais sa bonté
    Dure pour l’éternité.
  - |
    Douterons-nous qu’il nous aime ?
    De son Fils il nous fait don,
    Qui va, jusqu’à la mort même,
    Attester de son pardon.
    O mystère impénétrable,
    Insondable jusqu’au fond !
    C’est l’amour le plus profond,
    Seul parfait, seul véritable.
    Tout finit, mais sa bonté
    Dure pour l’éternité.
  - |
    Son Esprit qui nous console
    Nous délivre de la peur ;
    Il éclaire la Parole
    Au secret de notre cœur ;
    Par lui monte la prière,
    Par lui s’élèvent nos chants.
    Il fait de nous les enfants
    Bien-aimés d’un même Père.
    Tout finit, mais sa bonté
    Dure pour l’éternité.
  - |
    O Dieu, puisque ta tendresse
    Sans limite s’offre à nous,
    Nous voulons dans l’allégresse
    Célébrer tes dons partout.
    Rends-nous fermes par ta grâce,
    Attentifs et confiants,
    Dans l’attente du moment
    Où nous verrons face à face,
    Accueillis dans ta bonté
    Et dans ton éternité.
credits: "Paul Gerhardt 1607-1676 / Jean David Claudi (XVIIIe) / Henri Künzler *1931 — © Auteur (139)"
