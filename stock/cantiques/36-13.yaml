numero: "36-13"
titre: "Sur ton Eglise universelle"
couplets:
  - |
    Sur ton Eglise universelle
    Seigneur, tu veilles tous les jours.
    Tu veux que chacun puisse en elle
    Trouver ta joie et ton amour.
    Ton peuple cherche ta présence :
    Toi seul, tu peux changer les cœurs.
    Nous n'avons pas d'autre espérance :
    Sois au milieu de nous, Seigneur !
  - |
    Fais-nous marcher dans ta sagesse,
    Gardés du mal et de l'erreur.
    Dans ta parole est la promesse
    De ton pardon libérateur.
    Par l'Esprit saint tu nous éclaires,
    Tu fais de nous des serviteurs.
    Nous t'appelons dans nos prières :
    Sois au milieu de nous, Seigneur !
  - |
    Que l'Evangile se répande
    Par notre exemple et par nos soins !
    Que tous les hommes qui l'entendent
    Soient à leur tour nouveaux témoins !
    Que ton amour les renouvelle,
    Pleins d'espérance et pleins de foi,
    Afin qu'au monde ils te révèlent,
    Toi, seul Seigneur et Roi des rois !
credits: "Jean-Maximilien de Carbon-Ferrières 1778-1858 / Edmond Pidoux 1908-2004 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
