numero: "14-09"
titre: "Cherchez d’abord le Royaume de Dieu"
couplets:
  - |
    Cherchez d’abord le Royaume de Dieu,
    Cherchez d’abord sa justice !
    Et toutes choses vous seront données en plus,
    Allélu, alléluia !
    Alléluia ! (4 x)
  - |
    Vous ne vivrez pas de pain seulement
    Mais bien de toute Parole
    Qui sortira de la bouche du Seigneur,
    Allélu, alléluia !
    Alléluia ! (4 x)
    © Maranatha Music, LTC, Créteil (50)
traductions:
  - langue: "en"
    couplets:
      - |
        Seek ye first the Kingdom of God
        And his righteousness,
        And all these things shall be added unto you.
        Allelu, alleluia !
        Alleluia ! (4 x)
      - |
        Man shall not live by bread alone
        But by every word
        That proceeds from the mouth of the Lord ;
        Allelu, alleluia !
        Alleluia ! (4 x)
        Karen Lafferty (XXe),
        © Maranatha Music, LTC, Créteil (50)
  - langue: "de"
    couplets:
      - |
        Trachtet zuerst nach Gottes Reich
        Und seiner Gerechtigkeit,
        Und alles andere fällt euch damit zu.
        Hallelu, halleluja !
        Halleluja ! (4 x)
      - |
        Nein, spricht der Herr, ihr lebt nicht vom Brot allein,
        Sondern ihr lebt von dem Worte,
        Das aus dem Mund eures Herrn und Gottes geht.
        Hallelu, halleluja !
        Halleluja ! (4 x)
        Nederlands
  - langue: "xx"
    couplets:
      - |
        Zoekt eerst het Koninkrijk van God
        En zijn gerechtigheid.
        En alles wordt u bovendien geschonken.
        Hallelu, hallelujah !
        Hallelujah ! (4 x)
      - |
        Alleen van brood zal de mens niet leven,
        Maar van het Woord,
        Dat door God wordt gesproken
        Hallelu, hallelujah !
        Hallelujah ! (4 x)
