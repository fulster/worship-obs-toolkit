numero: "43-05"
titre: "Je veux répondre, ô Dieu"
couplets:
  - |
    Je veux répondre, ô Dieu ! C’est ta voix qui m’appelle ;
    Je veux t’appartenir et te donner mon cœur ;
    Mais tu sais mon péché, je t’en prie, Dieu fidèle,
    Prends donc pitié de moi, viens m’affermir, Seigneur !
  - |
    Que de fois j’ai promis sans tenir ma promesse !
    Que de fois j’ai voulu me consacrer à toi ;
    Et toujours j’ai senti les doutes et la faiblesse
    Qui m’empêchaient de croire et de garder ta Loi.
  - |
    C’est toi seul, ô mon Dieu, qui peux dans ta sagesse
    M’apprendre à te servir, à dominer mon cœur ;
    Sans toi, je ne suis rien, je n’ai que ma faiblesse ;
    Viens me donner ta force, à moi qui suis pécheur !
  - |
    Les saints et les martyrs reçurent ta puissance,
    La force de l’Esprit qui soutenait leur foi.
    Sur moi répands aussi ta grâce en abondance,
    Pour vivre sur la terre en m’appuyant sur toi.
credits: "d’après Louis Roehrich 1811-1893"
