numero: "62-24"
titre: "O Père qui es dans les cieux"
couplets:
  - |
    O Père qui es dans les cieux,
    Que ton nom soit sanctifié,
    Et que ton règne vienne !
    Que chaque jour ta volonté
    Soit faite sur la terre,
    Comme elle est faite dans le ciel.
  - |
    Donne-nous le pain de ce jour.
    Pardonne nos offenses,
    Comme nous pardonnons aussi
    A ceux qui nous ont offensés ;
    Garde-nous de la tentation
    Et nous délivre du Malin !
credits: "Psaumes, Cantiques et Textes 1976 d’après Mt 6,9-13 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
