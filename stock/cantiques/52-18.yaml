numero: "52-18"
titre: "Je suis la lumière"
refrain: |
  Le monde est plein d'ombre :
  Brillons, brillons bien,
  Toi dans ton coin sombre,
  Et moi dans le mien !
couplets:
  - |
    " Je suis la lumière, "
    A dit le Seigneur ;
    Avec moi, mon frère,
    Ouvre-lui ton cœur.
  - |
    Si la pure flamme
    Parfois baisse un peu,
    Veillons sur notre âme,
    Ravivons le feu.
  - |
    Quand le jour se voile
    Au clair firmament,
    La plus humble étoile
    Brille doucement.
credits: "Théodore Monod 1836-1921"
