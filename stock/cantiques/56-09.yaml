numero: "56-09"
titre: "Seigneur, souviens-toi"
source: "Do, Lord, remember me"
couplets:
  - |
    Seigneur, ô Seigneur, oh ! souviens-toi de moi ! (ter)
    Tout là-haut dans le ciel !
  - |
    Aux heur’s d’épreuve, oh ! souviens-toi de moi ! (ter)
    Tout là-haut dans le ciel !
  - |
    A l’heur’ dernière, oh ! souviens-toi de moi ! (ter)
    Tout là-haut dans le ciel !
  - |
    J’irai là-haut, j’irai (*) dans ton pays (ter)
    Tout là-haut dans le ciel !
    (*) frapper des mains
    Répertoire commun protestant francophone 2001
    © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)
traductions:
  - langue: "en"
    couplets:
      - |
        Do Lord, oh, do Lord, oh, do remember me ! (ter)
        way beyond the blue.
      - |
        When I’m in trouble, oh, Lord remember me ! (ter)
        way beyond the blue.
      - |
        When I’m dying, oh, Lord remember me ! (ter)
        way beyond the blue.
      - |
        I gotta home in glory land that (*) outshines the sun, (ter)
        way beyond the blue.
         (*) hand clapping
