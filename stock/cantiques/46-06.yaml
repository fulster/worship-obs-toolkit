numero: "46-06"
titre: "Jésus, c'est toi que, dans la foi"
couplets:
  - |
    Jésus, c'est toi, que dans la foi,
    Nous avons pris pour maître.
    C'est ton Esprit qui nous conduit :
    En nous, fais-le paraître.
    Tu nous apprends, Seigneur, comment
    On peut changer la terre :
    Nous servons Dieu comme il le veut
    Quand nous servons nos frères.
  - |
    Si nous cherchons, si nous suivons
    La vérité des hommes,
    Un jour viendra, qui montrera
    La folie où nous sommes.
    Mais, par la foi, Seigneur, c'est toi
    Qui viens dans nos faiblesses
    Nous inspirer et nous donner
    Ta force et ta sagesse.
credits: "Edmond Pidoux 1908-2004 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
