numero: "62-80"
titre: "Dans ces jours qui viennent"
couplets:
  - |
    Dans ces jours qui viennent,
    Et quoi qu’il advienne,
    Dieu nous maintienne
    A jamais en paix !
    Que par nos prières
    Notre vie entière
    Soit, à sa lumière,
    A jamais en paix !
credits: "Alain Burnand *1925 — © Auteur (108)"
