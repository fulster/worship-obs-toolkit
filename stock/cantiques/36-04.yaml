numero: "36-04"
titre: "Dieu fait de nous en Jésus Christ"
couplets:
  - |
    Dieu fait de nous en Jésus-Christ
    Des hommes libres ;
    Tout vient de lui, tout est pour lui :
    Qu'il nous délivre !
  - |
    Peuple choisi pour témoigner
    De l'Evangile,
    Laisse ta vie se ranimer
    Aux sources vives !
  - |
    Peuple choisi pour exister
    Dans la prière,
    Prends en tes mains le monde entier
    Et sa misère !
  - |
    Peuple choisi pour l'unité
    De tous tes frères,
    Ouvre tes bras et reconnais
    Les dons du Père !
