numero: "42-07"
titre: "Je veux te louer"
refrain: |
  Tu as rempli ma vie de joie et d’harmonie,
  Oh ! merci !
couplets:
  - |
    Je veux te louer, toi qui m’as aimé.
    Comment m’exprimer pour te remercier ?
  - |
    Je veux te louer, toi qui m’as cherché.
    Hors de tout sentier, toi, le bon berger !
  - |
    Je veux te louer, toi qui m’as trouvé,
    Ranimé, pansé, quand j’étais tombé.
  - |
    Je veux te louer et tout te donner,
    Pour toi tout quitter et tout retrouver.
credits: "Str. 1 : Jeunesse en Mission / str. 2-4 : Henri Künzler *1931 — © Jeunesse en Mission (39) et  Auteur (139)"
