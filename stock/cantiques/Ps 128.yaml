numero: "Ps 128"
titre: "Dieu bénit ceux qui l’aiment"
couplets:
  - |
    Dieu bénit ceux qui l’aiment,
    Qui suivent ses chemins :
    L’orge ou le blé qu’ils sèment
    Pour tous donne du pain ;
    Leur épouse est la vigne
    Qui orne leur maison ;
    Leurs garçons et leurs filles
    Autour d’eux s’assiéront.
  - |
    Ceux que tes mains bénissent
    Reçoivent le bonheur,
    Attendent la justice
    De ta cité, Seigneur.
    Ils voient leur descendance
    Vivre de tes bienfaits,
    Former en espérance
    Le peuple de la paix.
credits: "Clément Marot 1496-1544 / Roger Chapal 1912-1997 — © Fédération Musique et Chant de la Réforme, c/o Olivétan, BP 4464, F-69241 LYON Cedex 04"
