numero: "31-30"
titre: "Nous avons vu les pas de notre Dieu"
source: "Refrains modifiés à la demande de l’auteur, Michel Scouarnec"
refrain: |
  Reviendra-t-il marcher sur nos chemins,
  Changer nos cœurs de pierre ?
  Reviendra-t-il semer au creux des mains
  L’amour et la lumière ?
couplets:
  - |
    Nous avons vu les pas de notre Dieu
    Croiser les pas hommes,
    Nous avons vu brûler comme un grand feu
    Pour la joie de tous les pauvres.
  - |
    Nous avons vu fleurir dans nos déserts
    Les fleurs de la tendresse ;
    Nous avons vu briller sur l’univers
    L’aube d’une paix nouvelle.
  - |
    Nous avons vu danser les malheureux
    Comme aux jours de la fête,
    Nous avons vu renaître au fond des yeux
    L’espérance déjà morte.
  - |
    Nous avons vu le riche s’en aller
    Le cœur et les mains vides,
    Nous avons vu le pauvre se lever,
    Le regard plein de lumière.
  - |
    Nous avons vu se rassasier de pain
    Les affamés du monde,
    Nous avons vu entrer pour le festin
    Les mendiants de notre terre.
  - |
    Nous avons vu s’ouvrir les bras de Dieu
    Devant le fils prodigue,
    Nous avons vu jaillir du cœur de Dieu
    La fontaine de la vie.
    Refrain final
    Il reviendra au terme du chemin
    Nous prendre en sa lumière.
    Il reviendra nous prendre par la main
    Pour vivre auprès du Père.
    Michel Scouarnec *1934
    © Studio SM, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne (68)
credits: "Diethard Zils *1935 / Dieter Trautwein *1928 — © Strube Verlag, Pettenkoferstr. 24, D-80336 München"
traductions:
  - langue: "en"
    couplets:
      - |
        We have seen God’s own footsteps with our eyes / on roads which we
        have travelled, / seen so much love and warmth in the cold world, / hope
        that almost had unravelled.
        Chorus
        Look ! Sign and wonders right before our eyes / in days long past yet
        living. / God will go with us where the journey leads, / strength to us each
        day giving !
      - |
        Blossoming trees appearing in the place / where no one dreamed them
        growing, / bound ones who passed through water to be free, / God the
        captors overthrowing. Chorus
      - |
        Poor ones and lame ones dancing one and all, / the speechless we heard
        speaking, / through window holes there pours the streaming light, /
        darkness of the night now breaking. Chorus
      - |
        We saw the rich, their empty hands and hearts, / into the dark night
        falling, / light sudd’nly shining bright upon the poor, / grateful, glad and
        God’s name calling. Chorus
      - |
        We saw the hungry people in our world, / their fill of bread now taking, /
        saw how they came rejoicing at the feast, / God his blessing on them
        speaking. Chorus
      - |
        We saw God’s arms before us op’ning wide, / his love down to us
        bending, / felt our hearts stir, love made in us a home, / spring of life, joy
        never ending. Chorus
        Jeffrey T. Myers
        © 149
  - langue: "de"
    couplets:
      - |
        Wir haben Gottes Spuren festgestellt / auf unsern Menschenstrassen,
        Liebe und Wärme in der kalten Welt, / Hoffnung, die wir fast vergassen.
        Kehrvers
        Zeichen und Wunder sahen wir geschehn / in längst vergangnen Tagen,
        Gott wird auch unsre Wege gehen, / uns durch das Leben tragen !
      - |
        Blühende Bäume haben wir gesehn, / wo niemand sie vermutet,
        Sklaven, die durch das Wasser gehn, / das die Herren überflutet. Kehrvers
      - |
        Bettler und Lahme sahen wir beim Tanz, / hörten, wie Stumme sprachen,
        durch tote Fensterhöhlen kam ein Glanz, / Strahlen, die die Nacht
        durchbrachen. Kehrvers
      - |
        Wir sah’n, wie Reiche leer an Herz und Hand / tief in der Nacht
        versanken, / wie um die Armen helles Licht entstand, / Blicke strahlend,
        voller Danken. Kehrvers
      - |
        Wir sah’n die Hungernden in unsrer Welt / endlich vom Brot sich nähren,
        sah’n, wie sie froh zum Fest sich eingestellt. / Gott will alle Bettler ehren. Kehrvers
      - |
        Wir sahen Gottes Arme offen stehn, / lief, um uns aufzuheben. / Wir
        haben ihm ins Herz hinein gesehn, / Quelle, sprudelnd voller Leben. Kehrvers
