numero: "32-06"
titre: "O Seigneur de la terre"
couplets:
  - |
    O Seigneur de la terre,
    Fils éternel de Dieu,
    Tu nais parmi nos peines,
    Pauvre, sans feu ni lieu.
    C’est toi qui nous libères,
    Des peines, des misères,
    Tu viens combler nos vœux.
  - |
    La nuit offre une étoile,
    Le ciel son plus beau chant.
    Les bergers et les mages
    Vont porter leurs présents.
    Pour fêter ta naissance
    Tout l’univers s’assemble,
    Jésus, soleil levant.
  - |
    Tu es l’ami des hommes,
    Tu viens donner la paix.
    Tu vois ce que nous sommes,
    Ton amour nous connaît.
    Ta bonté sans mesure
    Sauva la multitude
    Dès lors et à jamais.
credits: "Frère Pierre-Etienne *1922 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04"
