numero: "36-08"
titre: "O Jésus, tu nous appelles"
couplets:
  - |
    O Jésus, tu nous appelles
    A former un même corps,
    A rester toujours fidèles
    Tous unis dans nos efforts.
    Que jamais rien ne sépare
    Ceux qui veulent te servir,
    Mais que ton amour s'empare
    De nos cœurs pour les unir !
  - |
    O Jésus, c'est ton sang même
    Qui scella notre unité.
    Apprends-nous comment on aime :
    Donne-nous ta charité !
    Que l'on trouve en ton Eglise
    Le modèle de la paix ;
    Pour que rien ne la divise,
    Rends-nous frères pour jamais !
  - |
    O Jésus, priant le Père
    Pour tous ceux qu'il t'a donnés,
    Tu rassembles sur la terre
    Un seul peuple racheté.
    Nous qui te prenons pour maître
    En témoins obéissants,
    En aimant, faisons paraître
    Que nous sommes tes enfants !
    Psalmodie morave 1846
credits: "d'après Nikolaus Ludwig von Zinzendorf 1700-1760"
traductions:
  - langue: "de"
    couplets:
      - |
        Herz und Herz vereint zusammen
        sucht in Gottes Herzen Ruh.
        Lasset eure Liebesflammen
        lodern auf den Heiland zu.
        Er das Haupt, wir seine Glieder,
        er das Licht und wir der Schein,
        er der Meister, wir die Brüder,
        er ist unser, wir sind sein.
      - |
        Legt es unter euch, ihr Glieder,
        auf so treues Lieben an,
        dass ein jeder für die Brüder
        auch das Leben lassen kann.
        So hat uns der Freund geliebet,
        so vergoss er dort sein Blut ;
        denkt doch, wie es ihn betrübet,
        wenn ihr euch selbst Eintrag tut.
      - |
        Lass uns so vereinigt werden,
        wie du mit dem Vater bist,
        bis schon hier auf dieser Erden
        kein getrenntes Glied mehr ist,
        und allein von deinem Brennen
        nehme unser Licht den Schein ;
        also wird die Welt erkennen,
        dass wir deine Jünger sein.
