numero: "48-06"
titre: "Seigneur, que je reste en ta paix"
couplets:
  - |
    Seigneur, que je reste en ta paix
    Quand sonnera ma dernière heure !
    Que ton amour soit à jamais,
    Pour nous passants, ce qui demeure !
    Quand se flétrit la fleur des champs
    Et que bientôt mes jours s'achèvent,
    Par ta Parole, ô Dieu vivant,
    Qu'un jour nouveau pour moi se lève !
  - |
    Jésus, tu nous as précédés
    Dans les angoisses de la tombe,
    Mais de la mort tu t'es levé ;
    Dès lors cet ennemi succombe.
    Toi qui sais mon infirmité,
    Tu veux m'accueillir dans ta gloire ;
    Mourant dans ma fragilité,
    Je crois, Seigneur en ta victoire.
  - |
    Heureux qui se confie en toi !
    Tu rends l'espoir à ceux qui pleurent.
    Celui qui croit en toi vivra :
    Tu le promets à ceux qui meurent.
    Mon Dieu, protège encore les miens
    Dans leur travail et dans leur peine,
    Enrichis-les de tous tes biens
    Et rends leur fin douce et sereine !
credits: "Johann Rist 1607-1667 / Paul Junod 1923-1994 — © Auteur (137)"
