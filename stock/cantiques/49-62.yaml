numero: "49-62"
titre: "Pour les champs de blé, merci !"
couplets:
  - |
    Pour les champs de blé, merci !
    L’herbe ensoleillée, merci !
    L’eau des ruisselets, merci !
    Que grâces te soient rendues !
  - |
    Pour toute beauté, merci !
    Pour toute bonté, merci !
    Pour toute amitié, merci !
    Que grâces te soient rendues !
credits: "Francine Cockenpot 1918-2001 — © Auteur (114a)"
