numero: "13-05"
titre: "Si mon peuple s’humilie"
couplets:
  - |
    Si mon peuple s’humilie,
    S’il prie en cherchant ma face,
    Se détourne de sa voie impure,
    Je l’exaucerai des cieux.
    Si mon peuple s’humilie,
    S’il prie en cherchant ma face,
    Se détourne de sa voie impure,
    Son péché j’effacerai,
    Son pays je guérirai.
credits: "© Ligue pour la Lecture de la Bible, Chemin de Bérée 70, CH – 1010 Lausanne, avec autorisation (45)"
