numero: "33-24"
titre: "Quel Sauveur merveilleux"
source: "Attaché à la croix pour moi"
refrain: |
  Attaché à la croix pour moi, (bis)
  Il a pris mon péché, il m’a délivré,
  Attaché à la croix pour moi.
couplets:
  - |
    Quel Sauveur merveilleux je possède !
    Il se livre à la mort pour moi ;
    Et sa vie innocente, il la cède
    En souffrant sur l’infâme bois.
  - |
    La rançon que jamais un esclave
    Dans ses liens ne pourra verser,
    La rançon qui défait mes entraves,
    Mon Sauveur voulut la payer.
  - |
    Dans le monde, on s’attache à soumettre,
    Dominer, se faire obéir,
    Mais il est le Seigneur et le maître
    Parmi nous venu pour servir.
  - |
    Pour aimer jusqu’au don de sa vie,
    Jusqu’à nous Christ est descendu.
    Qu’à mon tour je me donne et m’oublie,
    Proclamant le Seigneur Jésus.
credits: "Str. 1 : Algot Edlund (XXe) / str. 2-4 : Henri Künzler *1931 — © Auteur (139)"
