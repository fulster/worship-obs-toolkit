numero: "44-01"
titre: "Louange à toi, Jésus Sauveur"
couplets:
  - |
    Louange à toi, Jésus Sauveur,
    Reçois notre humble offrande :
    Elle est un don venu du cœur,
    Tant notre joie est grande.
  - |
    Louange à toi, Jésus Sauveur !
    Daigne accepter nos vies,
    En inspirant tes serviteurs
    Pour qu'ils te glorifient !
credits: "Edmond Pidoux 1908-2004 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
