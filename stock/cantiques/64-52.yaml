numero: "64-52"
titre: "Le cantique de Zacharie"
source: "Antienne parlée"
couplets:
  - |
    Béni soit le Seigneur, car il a visité son peuple ! (verset 68)
  - |
    Sur ceux qui vivent au pays des ténèbres, une lumière resplendit. (Es 9,1)
    Antienne chantée : 64-11
    Loué soit le Seigneur, le Dieu du peuple d’Israël,
    parce qu’il est intervenu en faveur de son peuple et l’a délivré.
    Il a fait apparaître un puissant Sauveur, pour nous,
    parmi les descendants du roi David, son serviteur.
    C’est ce qu’il avait annoncé depuis longtemps par ses saints prophètes :
    il avait promis qu’il nous délivrerait de nos ennemis
    et du pouvoir de tous ceux qui nous veulent du mal.
    Il a manifesté sa bonté envers nos ancêtres
    et n’a pas oublié sa sainte alliance.
    En effet, Dieu avait fait serment à Abraham, notre ancêtre,
    de nous libérer du pouvoir des ennemis
    et de nous permettre ainsi de le servir sans peur,
    pour que nous soyons saints
    et justes devant lui tous les jours de notre vie.
    Notre Dieu est plein de tendresse et de bonté :
    il fera briller sur nous une lumière d’en haut,
    semblable à celle du soleil levant,
    pour éclairer ceux qui se trouvent dans la nuit
    et dans l’ombre de la mort,
    pour diriger nos pas sur le chemin de la paix.
    (Luc 1,68-79)
