numero: "33-02"
titre: "Voici l’annonce du salut"
couplets:
  - |
    Voici l’annonce du salut,
    L’aurore de la grâce :
    Le Fils unique est descendu
    Souffrir à notre place.
    Jésus partage notre sort,
    Pour que le mal, avec la mort,
    Devant l’amour s’effacent.
  - |
    En vain l’on cherche à mériter
    La grâce qui pardonne.
    La foi peut seule en hériter,
    Et non les œuvres bonnes.
    Mais Dieu permet que, par l’Esprit,
    De notre cœur, portant ses fruits,
    L’amour du Christ rayonne.
  - |
    La gloire soit au Tout-Puissant,
    A Dieu, Seigneur et Père !
    La gloire soit au Fils vivant,
    Jésus, Sauveur et frère !
    La gloire soit au Saint-Esprit,
    Qui nous assure en Jésus-Christ
    La grâce salutaire !
