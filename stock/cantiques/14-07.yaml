numero: "14-07"
titre: "L’oiseau ne sème, il ne moissonne"
couplets:
  - |
    L’oiseau ne sème, il ne moissonne,
    Il n’amasse rien sous les cieux ;
    Il vit de ce que Dieu lui donne,
    Il est confiant, libre et joyeux.
  - |
    Aux champs, la plus humble semence
    Fleurit chaque année de nouveau.
    Salomon même, en sa puissance,
    N’eut pas de vêtement plus beau.
  - |
    Si Dieu habille ainsi les plantes,
    S’il nourrit les oiseaux des airs,
    Il sait répondre à ton attente,
    Tous les jours, été comme hiver.
credits: "Frédéric Humber (*1945) d’après Mt 6,25-34 — © Auteur (134)"
traductions:
  - langue: "xx"
    couplets:
      - |
        Homme angoissé, Dieu te rassure :
        Pourquoi t’inquiéter vainement ?
        Tu recevras ta nourriture,
        Et, pour ton corps, le vêtement.
      - |
        A ton Dieu, pour qu’il te bénisse,
        Remets ta vie jour après jour ;
        Cherche son règne et sa justice
        Et tu vivras de son amour.
