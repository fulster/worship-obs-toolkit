numero: "53-05"
titre: "Marche en ma présence"
refrain: |
  Mon Dieu, mon Dieu, que veux-tu de moi ?
  Tu m'appelles, je ne te vois pas.
  Mon Dieu, mon Dieu, toi, tu me connais ;
  Dis-moi, dis-moi quel est ton secret.
couplets:
  - |
    Marche en ma présence,
    Je suis avec toi.
    Lorsque tu avances,
    Je prends ton chemin.
    Marche en ma présence,
    Je te tiens la main,
    Chaque jour qui passe,
    Chaque nuit qui vient.
  - |
    Marche en ma présence,
    Je suis avec toi.
    Le Dieu de l'alliance
    N'oublie pas les siens.
    Marche en ma présence,
    Je te tiens la main,
    Dans ce qui te peine,
    Dans le moindre rien.
  - |
    Marche en ma présence,
    Je suis avec toi.
    Donne ta confiance,
    Tu sais que j'y tiens.
    Marche en ma présence,
    Je te tiens la main ;
    Ouvre-moi ta porte,
    Tu n'auras plus faim.
  - |
    Marche en ma présence,
    Je suis avec toi.
    Entre dans la danse,
    N'attends pas demain.
    Marche en ma présence,
    Je te tiens la main ;
    Je deviens ton frère,
    Je deviens ton pain.
credits: "Christiane Gaud *1937 — © Groupe Fleurus-Mame, autorisation SECLI 09/002 (33)"
