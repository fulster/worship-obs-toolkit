numero: "54-12"
titre: "Rédempteur du monde"
refrain: |
  Merci, notre Père,
  Tu as donné ton Fils,
  Tu fais briller ta lumière
  Par le Saint-Esprit.
couplets:
  - |
    Rédempteur du monde,
    Jésus, Fils de Dieu,
    Ta joie et ta paix m’inondent,
    Toi, l’Agneau venu des cieux.
  - |
    Rédempteur du monde,
    Pour nous crucifié,
    Ton amour, ta grâce abondent,
    O glorieux Ressuscité !
  - |
    Un jour dans la gloire,
    Enfin je verrai
    De Dieu, mon Seigneur, la face ;
    Sans fin je le servirai.
credits: "Louise Neuenschwander (XXe) / Répertoire commun protestant francophone 2001 — © Utilisé avec permission, LTC, 16, av. de la République, F-94000 Créteil (47)"
