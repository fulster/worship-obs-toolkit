numero: "41-37"
titre: "Père, je t’adore"
source: "Canon"
couplets:
  - |
    Père, je t’adore,
    Je te donne ma vie,
    Je t’aime tant. *
  - |
    Jésus, je t’adore,
    Je te donne ma vie,
    Je t’aime tant. *
  - |
    Saint-Esprit, je t’adore,
    Je te donne ma vie,
    Je t’aime tant. *
    * variante : Je t’appartiens
