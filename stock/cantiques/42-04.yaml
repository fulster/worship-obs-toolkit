numero: "42-04"
titre: "Au Seigneur rendons grâce"
couplets:
  - |
    Au Seigneur rendons grâce,
    Qu’en notre cœur repassent
    Les dons de sa promesse,
    Ses immenses largesses.
  - |
    C’est lui qui nous confie
    L’esprit, le corps, la vie ;
    C’est lui qui les restaure
    Et c’est lui qu’ils honorent.
  - |
    Dieu dans sa main nous porte,
    Son Esprit nous conforte ;
    De pain il nous fait vivre,
    Sa grâce nous délivre.
  - |
    Il veut, la croix dressée,
    Changer nos destinées,
    Qu’aucun de nous périsse,
    Que tout humain guérisse.
  - |
    Que notre chant l’acclame
    Et que nos voix proclament
    Le vivant Evangile
    Dans notre corps fragile.
  - |
    Par le pain de la cène
    Et par l’eau du baptême,
    Par l’Esprit de lumière
    Nous confessons le Père.
  - |
    Tu combles notre attente,
    Notre prière ardente,
    Tu nous gardes fidèles
    Pour la vie éternelle.
  - |
    Maintiens-nous véridiques
    Hors des chemins obliques !
    Que même en la tourmente,
    Ton peuple uni te chante !
credits: "Henri Künzler *1931 — © Auteur (139)"
