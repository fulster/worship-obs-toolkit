numero: "61-84"
titre: "Je crois au Dieu vivant, il est le Créateur"
source: "Credo"
couplets:
  - |
    Je crois au Dieu vivant : il est le Créateur,
    Il est mon Père et mon espérance, mon seul Seigneur.
  - |
    Je crois en Jésus-Christ mort et ressuscité ;
    Il est pour moi le chemin, la vie et la vérité.
  - |
    Je crois en l’Esprit saint, invisible et présent ;
    C’est lui qui donne force et victoire à tous les croyants.
  - |
    Le Seigneur, dans l’Eglise, nous a tous appelés
    A vivre dans la foi, l’espérance et la charité.
credits: "Roger Trunk *1930 — © Auteur (162)"
