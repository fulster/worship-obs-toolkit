numero: "12-13"
titre: "Je chanterai le nom du Seigneur"
source: "d’après les psaumes 9, 59 et 90"
refrain: |
  Je chanterai le nom du Seigneur toujours et partout.
couplets:
  - |
    Oui, je veux jouer, je veux chanter pour le Seigneur
    Et de tout mon cœur lui rendre grâces
    Pour sa grandeur, pour sa beauté, pour ses bienfaits :
    Toute ma vie je chanterai son nom.
  - |
    Il est mon soutien, ma forteresse, mon appui,
    Il est mon rempart et mon refuge,
    Lui, le rocher sur lequel j’ai fondé ma vie,
    Il me protège et j’ai confiance en lui.
  - |
    Il m’a délivré des ennemis qui m’encerclaient
    En criant comme des chiens féroces ;
    Il m’a guéri, il m’a tiré de mon malheur,
    Mon cœur exulte et je lui dis : merci.
  - |
    Mes amis, venez, criez de joie pour le Seigneur,
    Allez tous à lui en rendant grâces
    Et ne fermez pas votre cœur à son amour,
    Chantez pour lui et bénissez son nom !
credits: "Noël Colombier (*1932) — © Air Libre, autorisation SECLI 09/002 (01)"
