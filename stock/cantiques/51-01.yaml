numero: "51-01"
titre: "Je chanterai l’Eternel"
couplets:
  - |
    Je chanterai l’Eternel tant que je vivrai, / Je chanterai l’Eternel. / Je célébrerai mon Dieu tant que j’existerai, / Je célébrerai mon Dieu. (bis)
    Que mes paroles lui soient agréables, / Lui soient agréables, / Lui soient agréables ! / Je veux me réjouir en l’Eternel.
    Je chanterai l’Eternel tant que je vivrai, / Je chanterai l’Eternel. / Je célébrerai mon Dieu tant que j’existerai, / Je célébrerai mon Dieu.
    d’après Ps 104,33-34 / John van den Hogen (XXe)
