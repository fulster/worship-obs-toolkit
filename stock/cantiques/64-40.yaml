numero: "64-40"
titre: "Psaume 130"
source: "Antienne parlée"
couplets:
  - |
    Du fond de la détresse, je t’appelle au secours, Seigneur. (verset 1)
  - |
    Le Seigneur guérit ceux qui ont le cœur brisé. (Psaume 147,3)
    Antienne chantée : 61-17
    Du fond de la détresse,
    je t’appelle au secours, Seigneur.
    Ecoute mon appel,
    sois attentif quand je te supplie !
    Si tu voulais épier nos fautes,
    Seigneur, qui pourrait survivre ?
    Mais c’est toi qui disposes du pardon,
    c’est pourquoi tu dois être respecté.
    De toute mon âme, je compte sur le Seigneur,
    et j’attends ce qu’il va dire.
    Je compte sur le Seigneur plus qu’un soldat de garde n’attend le matin ;
    oui, plus qu’un soldat de garde n’attend le matin.
    Peuple d’Israël, compte sur le Seigneur, car il est bon,
    il a mille moyens de te délivrer.
    C’est lui qui te délivrera de toutes tes fautes.
    Gloire au Père, au Fils, au Saint-Esprit,
    comme il était au commencement, maintenant et toujours,
    pour les siècles des siècles ! Amen.
    (Epreuve, Repentance, Pardon, Espérance)
