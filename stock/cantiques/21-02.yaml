numero: "21-02"
titre: "Nous t’invoquons, ô Seigneur"
couplets:
  - |
    Nous t’invoquons, ô Seigneur,
    Toi qui nous écoutes :
    Vers ton règne et ta splendeur
    Dirige nos routes !
    Comme passe chaque jour
    S’éteint sa lumière,
    Mais le feu de ton amour
    Sans fin nous éclaire.
  - |
    Pour le monde tout entier
    Ta sagesse est folle ;
    Mais la seule vérité
    Est dans ta Parole.
    Ton Eglise fonde en toi
    Sa ferme assurance
    Et découvre dans ta croix
    L’unique espérance.
  - |
    Nous cherchons joie et bonheur
    Dans les jours qui passent ;
    Que ta paix et ta douceur
    En tout les dépassent !
    Sur notre ombre et nos clartés
    Vienne ton aurore
    Pour que, dans ta royauté,
    L’univers t’adore !
