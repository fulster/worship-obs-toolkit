numero: "45-21"
titre: "Trouver dans ma vie ta présence"
refrain: |
  Trouver dans ma vie ta présence,
  Tenir une lampe allumée,
  Choisir avec toi la confiance,
  Aimer et se savoir aimé.
couplets:
  - |
    Croiser ton regard dans le doute,
    Brûler à l'écho de ta voix,
    Rester pour le pain de la route,
    Savoir reconnaître ton pas.
  - |
    Brûler quand le feu devient cendre,
    Partir vers celui qui attend,
    Choisir de donner sans reprendre,
    Fêter le retour d'un enfant.
  - |
    Ouvrir quand tu frappes à ma porte,
    Briser les verrous de la peur,
    Savoir tout ce que tu m'apportes,
    Rester et devenir veilleur. Refr.
    Le refrain peut aussi se chanter par dessus les couplets
credits: "Jean-Claude Gianadda *1944 — © Studio SM, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne"
