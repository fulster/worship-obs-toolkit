numero: "12-20"
titre: "Rendez grâce au Seigneur, car il est bon"
source: "Psaume 136 A. Rendez grâce au Seigneur, car il est bon, car il est bon, Car éternel est son amour, car éternel est son amour. B. Lui seul fait des merveilles, car il est bon, car il est bon, Car éternel est son amour, car éternel est son amour. Doxologie Gloire au Père et au Fils, au Saint-Esprit, car il est bon, Car éternel est son amour, car éternel est son amour. Abel Nkuinji (*1941) © 152 Paroles supplémentaires pour les quelles on peut réaliser différentes mises en œuvre, en groupant ou non les vers et en utilisant les strophes A ou B comme antienne."
couplets:
  - |
    Dieu seul fit l’univers dans sa splendeur, car il est bon !
  - |
    Il donna son éclat au firmament, car il est bon !
  - |
    Il posa sur les eaux les continents, car il est bon !
  - |
    Il créa et la lune et le soleil, car il est bon !
  - |
    Le soleil pour régner sur chaque jour, car il est bon !
  - |
    Les étoiles pour régner sur chaque nuit, car il est bon !
  - |
    Il fit l’homme à sa gloire et son honneur, car il est bon !
  - |
    Lui donna en son nom tant de pouvoir, car il est bon !
  - |
    Yahvé sauve Israël et pour toujours, car il est bon !
  - |
    Il le sort du filet de l’ennemi, car il est bon !
credits: "Yves Kéler (*1939) — © 138"
