numero: "41-08"
titre: "Célébrons Dieu notre Père"
couplets:
  - |
    Célébrons Dieu, notre Père,
    Qui fit les astres et la terre
    Et le monde infini des cieux.
    C'est lui qui fit les espaces
    Et tous les temps devant sa grâce,
    Et toute vie devant ses yeux.
    Louange, gloire, honneur
    A toi, puissant Sauveur,
    Alléluia !
    Gloire à ton nom, Seigneur et roi,
    Toi qui fais naître en nous la foi.
  - |
    Célébrons Christ, notre frère,
    Lui qui est venu sur la terre
    Pour vivre et lutter avec nous.
    Que nos cœurs tous glorifient
    Celui qui nous donna sa vie
    Et ressuscita parmi nous.
    Louange, gloire, honneur
    A toi, puissant Sauveur,
    Alléluia !
    Gloire à ton nom, ô Fils de Dieu,
    Qui règnes ici et dans les cieux.
  - |
    Chantons l'Esprit de lumière
    Car sa présence reste entière
    En chacun des cœurs visités.
    Par lui s'ouvre l'Evangile,
    Et notre esprit devient paisible
    Et joyeux dans la vérité.
    Louange, gloire, honneur
    A l'Esprit créateur,
    Alléluia !
    Gloire à l'Esprit, à l'Esprit saint
    Qui nous éclaire et nous soutient.
