numero: "32-37"
titre: "Réjouis-toi, voici ton Roi"
source: "Joy to the world"
couplets:
  - |
    Réjouis-toi, voici ton Roi !
    La terre a son Seigneur !
    Chez vous qu’il trouve un gîte,
    Qu’en vos cœurs il habite !
    (2e voix Et que partout Il soit chez vous !)
    Le ciel, la terre en chœur, (bis)
    En fête chantent sa grandeur.
    (2e voix Tous chantent sa grandeur. )
  - |
    Réjouis-toi, voici ton roi !
    La terre a son Sauveur !
    Les bois et la campagne,
    Les torrents, la montagne,
    (2e voix Prés et forêts, Torrents, sommets)
    Tressaillent de bonheur, (bis)
    Ensemble chantent sa faveur.
    (2e voix Et chantent sa faveur. )
  - |
    Aucun péché, aucun chagrin,
    Ivraie en son jardin ,
    N’attristeront la terre ;
    Délivrée, elle espère
    (2e voix Ne pousseront ; Nous espérons )
    Que sa bénédiction (bis)
    Apporte notre guérison.
    (2e voix Soit notre guérison )
  - |
    Sous son pouvoir, la paix revit.
    On voit mûrir ses fruits :
    Justice et délivrance,
    Sagesse et connaissance ;
    (2e voix Car justifiés Et délivrés)
    Et tous sont étonnés (bis)
    De son inépuisable amour.
    (2e voix De son fidèle amour.)
    Henri Künzler *1931
    © Auteur (139)
credits: "Isaac Watts 1674-1748"
traductions:
  - langue: "en"
    couplets:
      - |
        Joy to the world ! the Lord is come :
        let earth receive her King ;
        let every heart prepare him room; (bis)
        and heaven and nature sing, (bis)
        and heaven, and heaven and nature sing.
      - |
        Joy to the world ! the Saviour reigns :
        Let us our songs employ ;
        while fields and floods, rocks, hills and plains (bis)
        repeat the sounding joy, (bis)
        repeat, repeat the sounding joy.
      - |
        No more let sins and sorrows grow,
        nor thorns infest the ground ;
        he comes to make his blessing flow (bis)
        far as the curse is found, (bis)
        far as, far as the curse is found.
      - |
        He rules the world with truth and grace
        and makes the nations prove
        the glories of his righteousness, (bis)
        and wonders of his love, (bis)
        and wonders, wonders of his love.
