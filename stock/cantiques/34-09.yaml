numero: "34-09"
titre: "Jésus triomphe de la mort"
couplets:
  - |
    Jésus triomphe de la mort :
    Célébrons sa victoire !
    Vivant, de son sépulcre il sort,
    Tout rayonnant de gloire.
    Nous saluons le Roi des rois,
    Et par nos chants, et par nos voix,
    Nous fêtons sa victoire.
  - |
    Que peut la mort et ses terreurs ?
    Jésus nous en délivre.
    Il est vivant, il est vainqueur
    Et nous appelle à vivre.
    Dès aujourd’hui son règne saint
    Peut commencer parmi les siens :
    Sa grâce nous délivre.
  - |
    Nous t’adorons, divin Sauveur :
    Nos âmes te bénissent.
    Tes rachetés, d’un même cœur,
    En toi se réjouissent.
    Louange au Christ ressuscité !
    Il règne pour l’éternité.
    Nos âmes le bénissent.
credits: "d’après James Siordet 1870-1941 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
