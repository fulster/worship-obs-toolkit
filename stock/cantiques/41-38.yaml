numero: "41-38"
titre: "Louange et gloire à ton nom"
refrain: |
  Gloire à Dieu, gloire à Dieu
  Au plus haut des cieux !
couplets:
  - |
    Louange et gloire à ton nom,
    Alléluia, alléluia !
    Seigneur, Dieu de l’univers,
    Alléluia, alléluia !
  - |
    Venez, chantons notre Dieu,
    Alléluia, alléluia !
    C’est lui notre créateur,
    Alléluia, alléluia !
  - |
    Pour nous, il fit des merveilles,
    Alléluia, alléluia !
    Eternel est son amour,
    Alléluia, alléluia !
  - |
    Je veux chanter pour mon Dieu,
    Alléluia, alléluia !
    Tous les jours de ma vie,
    Alléluia, alléluia !
credits: "Elisabeth Baranger *1954 — © Audio Vidéo Media, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne"
