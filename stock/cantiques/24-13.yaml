numero: "24-13"
titre: "Seigneur Jésus, par ton Esprit"
couplets:
  - |
    Seigneur Jésus, par ton Esprit,
    Viens nous apprendre à t’adorer !
    Tu es le pain, tu es la vie,
    De toi j’ai faim, par toi je prie.
  - |
    Seigneur Jésus, par ton Esprit,
    Viens nous apprendre à partager !
    Tu es le pain, tu es la vie
    De toi j’ai faim, par toi je prie.
credits: "Colette Chanas *1948 — © Auteur (112)"
