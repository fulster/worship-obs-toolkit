numero: "47-23"
titre: "Sur nous, merveille !"
couplets:
  - |
    Sur nous, merveille ! des puissances veillent,
    Sans peur nous avançons vers l'avenir ;
    Dieu, près de nous, de l'aube au soir demeure,
    Fidèle, chaque jour qui doit venir.
  - |
    Le lourd passé encore nous tourmente ;
    Nos cœurs en sont restés tout accablés.
    Que ton salut s'empare de nos âmes,
    Seigneur, puisque tu nous l'as préparé.
  - |
    La coupe amère, si tu la présentes,
    Et tu proposes le calice plein,
    Nous l'acceptons sans crainte, rendant grâce,
    O Dieu, de ta si bonne et tendre main.
  - |
    Si tu nous donnes ton soleil encore,
    La joie des hommes dans ce monde-ci,
    Nous en gardons entière la mémoire
    Afin de te remettre notre vie.
  - |
    Quand nous oppresse le trop grand silence,
    Fais-nous entendre au fond du firmament
    L'accord puissant du monde de louange
    Où chantent, invisibles, tes enfants.
    Jacqueline Frédéric Frié (XXe)
    © Service national de pastorale liturgique et sacramentelle, Paris (16)
credits: "Fred Pratt Green 1903-2000 et Keith Clements (XXe) — © Oxford University Press, Great Clarendon Street, Oxford OX2 6DP, UK (58)"
traductions:
  - langue: "de"
    couplets:
      - |
        Von guten Mächten wunderbar geborgen,
        erwarten wir getrost, was kommen mag.
        Gott ist bei uns am Abend und am Morgen
        und ganz gewiss an jedem neuen Tag.
      - |
        Noch will das alte unsre Herzen quälen,
        noch drückt uns böser Tage schwere Last.
        Ach Herr, gib unsern aufgeschreckten Seelen
        das Heil, für das du uns geschaffen hast.
      - |
        Und reichst du uns den schweren Kelch, den bittern
        des Leids, gefüllt bis an den höchsten Rand,
        so nehmen wir ihn dankbar ohne Zittern
        aus deiner guten und geliebten Hand.
      - |
        Doch willst du uns noch einmal Freude schenken
        an dieser Welt und ihrer Sonne Glanz,
        dann wolln wir des Vergangenen gedenken,
        und dann gehört dir unser Leben ganz.
      - |
        Wenn sich die Stille nun tief um uns breitet,
        so lass uns hören jenen vollen Klang
        der Welt, die unsichtbar sich um uns weitet,
        all deiner Kinder hohen Lobgesang.
        Dietrich Bonhoeffer 1906-1945
        © Gütersloher Verlagshaus GmbH, Verlagsgruppe Random House, Carl-Miele-Str. 214, D-33311 Gütersloh (35)
  - langue: "en"
    couplets:
      - |
        By gracious powers so wonderfully sheltered
        and confidently waiting, come what may,
        we know that God is with us night and morning,
        and never fails to meet us each new day.
      - |
        Yet our hearts by their old foe tormented :
        still evil days bring burdens hard to bear ;
        O give our frightened souls the sure salvation
        for which, O Lord, you taught us to prepare.
      - |
        And when the cup you give is filled to brimming
        with bitter suffering, hard to understand,
        we take it gladly, trusting though with trembling,
        out of so good and so beloved a hand.
      - |
        If once again, in this mixed world, you give us
        the joy we had, the brightness of your sun,
        we shall recall what we have learned through sorrow,
        and dedicate our lives to you alone.
      - |
        Now as your silence deeply spreads around us,
        open our ears to hear your children raise
        from all the world, from every nation round us,
        to you their universal hymn of praise.
