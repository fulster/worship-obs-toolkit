numero: "36-32"
titre: "Sur les chemins du monde"
refrain: |
  Sur les chemins du monde,
  Le Seigneur a semé le bon grain,
  Et dans le cœur des hommes
  Il viendra récolter sa moisson.
couplets:
  - |
    Ne ferme pas l'oreille,
    Ne ferme pas ton cœur !
    Ecoute le Seigneur :
    Ton blé mûrira.
  - |
    Arrache les épines,
    Arrache les buissons !
    Ecoute le Seigneur :
    Ton blé mûrira.
  - |
    Méprise ta richesse,
    Méprise ton argent !
    Ecoute le Seigneur :
    Ton blé mûrira.
  - |
    Résiste à la tempête,
    Résiste à tous les vents !
    Ecoute le Seigneur :
    Ton blé mûrira.
  - |
    Réveille ton courage,
    Laboure bien ton champ !
    Ecoute le Seigneur :
    Ton blé mûrira.
credits: "Michel Scouarnec *1934 — © Studio SM, c/o SECLI 05/004, Abbaye Sainte Scholastique, F-81110 Dourgne"
