numero: "21-05"
titre: "Jour du Seigneur"
couplets:
  - |
    Jour du Seigneur,
    Viens dans nos cœurs,
    Répandre ta lumière !
    Jour merveilleux
    Où tout joyeux,
    Je t’offre ma prière.
  - |
    Dieu tout-puissant,
    Dieu bienfaisant,
    Je vis par ta promesse ;
    Eclaire-moi,
    Soutiens ma foi ;
    Tu connais ma faiblesse.
  - |
    La vérité,
    La charité,
    Inspirent ta Parole
    En nous montrant
    Quel Dieu vivant
    Nous sauve et nous console.
  - |
    A tes côtés,
    Par ta bonté,
    Je marche en confiance.
    Tous mes péchés
    Sont pardonnés,
    J’en ai pleine assurance.
  - |
    Que ton Esprit,
    O Jésus-Christ,
    Nous touche de sa flamme !
    Jour après jour,
    Que ton amour
    Rayonne dans nos âmes !
credits: "d’après Matthias Engel 1753-1815 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
