numero: "43-01"
titre: "Je crie à toi, Seigneur Jésus"
couplets:
  - |
    Je crie à toi, Seigneur Jésus,
    Toi seul Sauveur du monde !
    On jugeait le pécheur perdu :
    Par toi la grâce abonde.
    Je reconnais devant ta loi
    Mes désobéissances,
    Mes offenses ;
    Mais regardant ta croix,
    Je trouve l’espérance.
  - |
    Je crie à toi, Ressuscité,
    Environné de gloire,
    Qui, sur la mort et le péché,
    Nous donnes la victoire.
    Ne comptant que sur ton pardon,
    Pour toi je veux revivre
    Et te suivre
    En bénissant ton nom,
    Ta grâce qui délivre.
  - |
    Je crie à toi, Jésus Seigneur,
    Humanité nouvelle !
    Nous implorons, dans la douleur,
    Qu’enfin tu te révèles !
    Viennent justice et sûreté,
    Repos et délivrance,
    Renaissance,
    Sur la terre habiter !
    En toi j’ai confiance.
credits: "Ida Chalière-Salgat 1862-1933 / Henri Künzler *1931 — © Auteur (139)"
