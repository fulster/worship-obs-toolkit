numero: "45-13"
titre: "Si vous saviez quel Sauveur"
refrain: |
  Mon Sauveur vous aime ;
  Ah ! cherchez en lui
  Votre ami suprême
  Et votre seul appui !
couplets:
  - |
    Si vous saviez quel Sauveur je possède
    Il est l'ami le plus tendre de tous ;
    Pour nous devant le Père il intercède
    Et sur la croix il a souffert pour nous. .
  - |
    Si vous saviez la paix douce et profonde
    Que le Sauveur dans ma vie apporta,
    Divine paix que rejette le monde :
    Elle jaillit pour vous de Golgotha.
  - |
    Si vous saviez quelle grande espérance
    Le Dieu de paix fait rayonner des cieux !
    Combien sa voix sait calmer la souffrance
    Et son regard rendre le cœur joyeux !
  - |
    Quand vous saurez combien Jésus vous aime,
    Quand vous saurez combien son joug est doux,
    Ne gardez pas ce trésor pour vous-mêmes,
    Mais, avec moi, dites autour de vous :
credits: "Ruben Saillens 1855-1942 — © Institut Biblique, Grand'Rue 39, F-94130 Nogent-sur-Marne (37)"
