numero: "41-11"
titre: "Célébrons le Seigneur"
couplets:
  - |
    Célébrons le Seigneur,
    Notre Dieu et notre Père,
    Tout-puissant créateur
    Et des cieux et de la terre.
    Ce Dieu d'amour
    De ses enfants chaque jour
    Veut exaucer la prière.
  - |
    Célébrons le Seigneur,
    Le Christ, le chef de l'Eglise !
    Et qu'à sa volonté
    Toute nation soit soumise.
    Notre Sauveur,
    Sur la croix pour les pécheurs,
    Acquit la grâce promise.
  - |
    Célébrons le Seigneur,
    L'Esprit qui, sur notre terre,
    Assemble les croyants
    Et de ses dons les éclaire
    Et les unit
    En un seul corps qu'il bénit
    Dans la joie et la lumière.
credits: "Charles Pfender 1834-1914, rév. 1977 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)"
