numero: "62-23"
titre: "Notre Père"
couplets:
  - |
    Notre Père qui es aux cieux,
    que ton nom soit sanctifié,
    que ta volonté soit faite
    sur la terre comme au ciel !
    Donne-nous aujourd’hui notre pain de ce jour.
    Pardonne-nous nos offenses,
    comme nous pardonnons aussi
    à ceux qui nous ont offensés.
    Et ne nous soumets pas à la tentation
    mais délivre-nous du mal !
    Car c’est à toi qu’appartiennent
    le règne, la puissance et la gloire
    aux siècles des siècles. Amen.
    Unser Vater im Himmelreich,
    hoch geheiligt der Name dein.
    Deine Herrschaft komme
    und dein Wille werde kund
    im Himmel und in unsrer Welt.
    Gib das tägliche Brot, das zum Leben uns dient.
    Vater, erlass uns die Schulden,
    so wie auch wir vergeben dem,
    der ungerecht ist gegen uns.
    Bewahre uns, wenn böse Versuchung uns droht;
    halte uns vom Bösen fern.
    Dein ist das Reich und die Herrschaft,
    die Ehre und die Macht, so wie heute
    auch morgen und ewig. Amen.
credits: "Gerhard P. Michael 1936-2008"
