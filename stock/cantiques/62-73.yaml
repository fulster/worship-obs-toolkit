numero: "62-73"
titre: "Que le Seigneur, tournant vers nous sa face"
couplets:
  - |
    Que le Seigneur, tournant vers nous sa face,
    Sous son regard nous tienne dans sa grâce !
    Que le Seigneur nous garde tous les jours
    Dans son amour !
credits: "d’après Jules Amiguet 1867-1946 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
