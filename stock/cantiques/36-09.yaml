numero: "36-09"
titre: "Jésus-Christ, tu nous envoies"
couplets:
  - |
    Jésus-Christ, tu nous envoies
    Pour porter beaucoup de fruits :
    Ton amour, ta paix, ta joie,
    Tous les fruits de ton Esprit ;
    Mais vers toi nos bras s'élèvent
    Tels des sarments décharnés :
    Renouvelle en nous la sève,
    Vois ta vigne desséchée !
  - |
    Notre cœur est sec, ô Père,
    Comment pourrions-nous aimer ?
    Sans consolation, nos terres
    N'ont plus que leur volonté.
    Révoltés par l'injustice
    De ce monde d'oppression,
    D'inutiles sacrifices,
    Où trouver la compassion ?
  - |
    Sur ta vigne desséchée
    D'Israël et des Gentils,
    Fais descendre ta rosée,
    Oui, ta pluie, ô Saint-Esprit !
    Père de miséricorde,
    Viens répandre en nous l'amour :
    Que ta grâce nous accorde
    Pentecôte chaque jour !
  - |
    Garde-nous dans la prière,
    Espérant, sans parti pris,
    Et portés par le mystère
    De l'action de ton Esprit.
    Que priant, priant sans cesse
    Pour l'Eglise sous la croix,
    Nous portions dans la tendresse
    Tous les tiens unis en toi !
credits: "Christian Glardon *1938 — © Auteur (129)"
