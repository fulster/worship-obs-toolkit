numero: "41-15"
titre: "Anges du Très-Haut"
couplets:
  - |
    Anges du Très-Haut, louez le Seigneur !
    Du Dieu trois fois saint chantez la splendeur !
    Dans les cieux immenses, vous ses serviteurs,
    Criez la louange du Dieu créateur !
  - |
    Témoins et martyrs, saints et bienheureux,
    Vous qui contemplez déjà dans les cieux
    Le jour du Royaume, clair et lumineux,
    Acclamez sans cesse Jésus, Fils de Dieu !
  - |
    Saisis par l'Esprit, nous joignons nos chants
    Aux multiples voix des cieux triomphants :
    Nous, le peuple en marche du Dieu tout-puissant,
    Nous chantons sa gloire au cœur de ce temps.
  - |
    Gloire soit au Père, au Fils, à l'Esprit
    Qui était hier, qui est aujourd'hui
    Et sera le même Dieu trois fois béni
    Aux siècles des siècles : Gloire soit à lui !
credits: "Eugène Bersier 1831-1889 / Répertoire commun protestant francophone 1999 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)"
