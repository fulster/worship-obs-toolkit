numero: "64-63"
titre: "Ouverture 3"
couplets:
  - |
    Seigneur, ouvre nos lèvres,
    	et nos bouches annonceront ta louange.
    Seigneur, tu ne veux pas la mort du pécheur,
    	mais qu’il se convertisse et qu’il vive.
    Donne-nous, Seigneur, un cœur nouveau,
    	mets en nous, Seigneur, un esprit nouveau.
    Voici maintenant le temps favorable,
    	voici maintenant le jour du salut.
    (Carême-Passion)
