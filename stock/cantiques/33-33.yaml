numero: "33-33"
titre: "C’est toi, Jésus, qu’ils ont chanté"
couplets:
  - |
    C’est toi, Jésus, qu’ils ont chanté,
    Tous ceux qui t’ont reçu pour roi,
    Alléluia ! alléluia !
    Accueille aussi nos chants de joie,
    Toi qui nous rends la liberté.
    Alléluia ! alléluia !
  - |
    Tu as changé notre destin ;
    Le monde immense est dans tes mains.
    Alléluia ! alléluia !
    Les dieux sont morts, tu es vivant,
    Par toi l’amour est triomphant.
    Alléluia ! alléluia !
  - |
    Nous chanterons nos grands espoirs
    Car ils sont tous liés à toi.
    Alléluia ! alléluia !
    Le jour se lève en notre nuit
    Et ta promesse en notre vie.
    Alléluia ! alléluia !
  - |
    Quand tu viendras au dernier jour
    Nous rassembler dans ton amour,
    Alléluia ! alléluia !
    Nous redirons en un seul chant
    Que tous par toi sont triomphants.
    Alléluia ! alléluia !
credits: "Commission d'hymnologie de la Fédération protestante de France 1974 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04"
