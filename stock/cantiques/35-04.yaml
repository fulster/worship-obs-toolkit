numero: "35-04"
titre: "Esprit de Dieu, la force est en toi"
couplets:
  - |
    Esprit de Dieu, la force est en toi !
    Viens en nous, augmente-nous la foi !
    Si, dans la détresse, le mal nous presse,
    Affermis nos cœurs et les rends vainqueurs,
    Saint-Esprit !
  - |
    Esprit de Dieu, l'espoir est en toi !
    Dans la nuit d'un monde obscur et froid !
    Viens et nous éclaire de ta lumière,
    Aujourd'hui, demain, sur tous nos chemins,
    Saint-Esprit !
  - |
    Esprit de Dieu, l'amour est en toi !
    C'est l'amour du Christ offert en croix !
    Qu'il mette en notre âme la vive flamme
    De la vérité dans la charité,
    Saint-Esprit !
credits: "James Siordet 1870-1941 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
