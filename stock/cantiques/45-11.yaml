numero: "45-11"
titre: "J'ai l'assurance de mon salut"
source: "Blessed assurance"
refrain: |
  C'est mon histoire, c'est là mon chant :
  Pour mon Seigneur vivre chaque instant.
couplets:
  - |
    J'ai l'assurance de mon salut
    Par la présence du Seigneur Jésus.
    Car par son sang il m'a racheté,
    Et l'Esprit saint m'a régénéré.
  - |
    L'obéissance à notre Sauveur
    Toujours redonne la paix à mon cœur.
    Dans la prière j'attends son jour
    Et ne me fie qu'à son amour.
credits: "Frances Jane (Fanny) Crosby 1820-1915 / d'après J. Vala"
