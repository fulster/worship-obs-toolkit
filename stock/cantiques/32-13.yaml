numero: "32-13"
titre: "Nuit lumineuse"
couplets:
  - |
    Nuit lumineuse, nuit bienheureuse,
    Nuit où Christ descend des cieux !
    O saint mystère : il vient sur terre,
    Jésus-Christ, le Fils de Dieu !
    Chante mon âme, chante et proclame
    L’immense joie que Dieu t’envoie :
    Christ est ton maître. Alléluia !
    Plus de tristesse, plus de détresse,
    Sois sans alarme, sèche tes larmes :
    Vois-le paraître. Alléluia !
  - |
    Paix sur la terre : Dieu notre Père
    Donne aux siens l’enfant Jésus.
    Gloire et louange, chantent les anges,
    Gloire, honneur au Fils élu !
    Nuit mémorable, dans une étable
    Pâtres et mages, pauvres et sages
    Sont là qui prient. Alléluia !
    Plein de tendresse, plein d’allégresse,
    Peuple fidèle, quand Dieu t’appelle,
    Jubile et crie : alléluia !
credits: "Mia Dénéréaz 1892-1971 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
