numero: "33-14"
titre: "Jésus, voyant venir la mort"
couplets:
  - |
    Jésus, voyant venir
    La mort qu’il doit subir,
    Le cœur saisi de crainte,
    Laisse échapper sa plainte.
    La face contre terre,
    Il prie ainsi son Père :
  - |
    « Mon Père, écoute-moi !
    Mon âme est dans l’effroi !
    Eloigne, je te prie,
    La coupe d’agonie !
    Mais s’il faut que j’accepte,
    Ta volonté soit faite !»
  - |
    Jésus, dans le jardin,
    Est oublié des siens.
    En vain ils l’accompagnent,
    Un lourd sommeil les gagne.
    – Ah! que durant ma vie,
    Avec Jésus je prie !
  - |
    Il offre sa douleur,
    Du sang, de la sueur,
    En les versant d’avance
    Pour moi, pour mes offenses.
    – Ah ! que durant ma vie
    Jamais je ne l’oublie !
  - |
    Il dit encore deux fois :
    « Mon Père, écoute-moi !
    Retiens, s’il est possible,
    Une heure aussi terrible !
    Mais s’il faut me soumettre,
    Ta volonté soit faite !»
  - |
    Alors, il dit aux siens :
    « Réveillez-vous enfin !
    Voyez ! voici le traître
    Qui vient livrer son Maître ! »
    Oh ! Christ, je veux te suivre,
    Pour toi, mourir et vivre !
  - |
    Je ne puis rien sans toi,
    Viens soutenir ma foi !
    Je veux veiller sans cesse :
    Je cède à ma faiblesse.
    Viens me garder fidèle
    Pour la vie éternelle !
