numero: "47-06"
titre: "Mon vrai trésor"
couplets:
  - |
    Mon vrai trésor sur terre et mon seul bien,
    O Jésus-Christ à qui j'appartiens,
    Tu es mon espérance ;
    Dans le bonheur
    Et le malheur,
    En toi j'ai placé ma confiance.
  - |
    Ton saint amour et ta fidélité
    Subsisteront pour l'éternité
    Et rien sur cette terre,
    A cet amour,
    Jour après jour,
    Seigneur, ne pourrait me soustraire.
  - |
    Le jour décline, ô Christ, mon vrai trésor.
    Auprès de moi, Seigneur, reste encore.
    Déjà le soir s'avance ;
    Que nul péché
    N'ose voiler
    En moi l'éclat de ta présence !
  - |
    Je trouve un sûr repos près de mon Dieu.
    En sa paix, je puis fermer les yeux ;
    Vers toi, vers ton Royaume,
    Le jour, la nuit,
    Tu me conduis,
    Seigneur et Dieu de tous les hommes.
credits: "Auteur inconnu"
