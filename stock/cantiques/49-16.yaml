numero: "49-16"
titre: "Levée première, brille l’aurore"
source: "Morning has broken"
couplets:
  - |
    Levée première,
    Brille l’aurore ;
    Le merle encore
    Lance son chant.
    Pour la lumière,
    L’oiseau qui joue,
    Tout en moi loue
    Dieu qui surprend.
  - |
    La pluie si douce
    Tombe et ruisselle,
    L’eau étincelle,
    Perles de feu.
    Et sur la mousse
    Reste une empreinte,
    La trace sainte
    Des pas de Dieu.
  - |
    Tu nous confies
    L’eau de la vie
    Et la lumière
    Du premier jour !
    De joie je crie :
    La terre est belle !
    Dieu se révèle
    Dans son amour.
credits: "Eleanor Farjeon 1881-1965 / Henri Künzler *1931 — © Auteur (139)"
