numero: "44-13"
titre: "Mon Dieu, par ta lumière"
couplets:
  - |
    Mon Dieu, par ta lumière, tu viens déchirer ma nuit.
    Mon Dieu, par ta lumière, tu viens éclairer ma vie.
    Mon Dieu, par ta lumière, tu me rends la liberté :
    Ma vie s'ouvre sur un chemin de clarté.
  - |
    Jésus, par ta Parole, tu viens transformer ma vie.
    Jésus, par ta Parole, tu viens mettre en moi ta vie.
    Jésus, par ta Parole, tu me rends ma dignité :
    C'est toi, Seigneur, que désormais je suivrai.
  - |
    Esprit, par ta puissance, tu viens pour me fortifier.
    Esprit, par ta puissance, tu m'appelles à partager.
    Esprit, par ta puissance, tu viens pour nous rassembler :
    Du Christ, tu nous fais témoins et messagers.
credits: "d'après Colette Chanas *1948 — © Auteur (112)"
