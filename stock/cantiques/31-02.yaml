numero: "31-02"
titre: "Le Sauveur va naître"
couplets:
  - |
    Le Sauveur va naître,
    Un enfant paraître :
    Humble et secourable,
    Il est l’Admirable !
    Il vient comme un frère
    Porter nos misères.
  - |
    Sa tendresse appelle
    Jusqu’aux plus rebelles,
    Et jamais sa grâce
    D’aucun ne se lasse :
    Charité profonde,
    Inconnue au monde !
  - |
    Sa brebis perdue,
    Il l’a secourue,
    Laissant tout pour elle
    En berger fidèle,
    N’ayant point de joie
    Qu’il ne la revoie.
  - |
    O Jésus que j’aime,
    Ta bonté suprême
    De sa joie éclaire
    La nuit de la terre.
    Viens saisir ma vie
    Et me sanctifie !
credits: "d’après Marc Du Pasquier 1883-1967 — © Cantate Domino, rue Michel-Servet 18, CH-1206 Genève"
