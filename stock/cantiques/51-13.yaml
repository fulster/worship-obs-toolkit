numero: "51-13"
titre: "Dieu, ma joie"
couplets:
  - |
    Dieu, ma joie, Dieu, mon bonheur,
    Dieu, mon allégresse, je te chante.
    Alléluia, alléluia !
  - |
    Dieu très beau, Dieu de clarté,
    Dieu toute lumière, je te chante.
    Alléluia, alléluia !
  - |
    Dieu très grand, Dieu tout-puissant,
    Dieu de gloire immense, je te chante.
    Alléluia, alléluia !
credits: "Anne-Yvonne Bouts *1927 — © Groupe Fleurus-Mame, autorisation SECLI 09/002 (33)"
