numero: "42-09"
titre: "Merci, pour ce matin de vie"
couplets:
  - |
    Merci pour ce matin de vie,
     Merci pour chaque jour nouveau,
     Merci, car à toi je confie
     Soucis et fardeaux.
  - |
    Merci pour le prochain que j’aime,
     Merci pour l’autre rencontré,
     Merci, car à l’ennemi même
     Je peux pardonner.
  - |
    Merci pour le travail, la peine,
     Merci pour les simples bonheurs.
     Merci pour la chanson sereine
     Reprise avec cœur.
  - |
    Merci quand passe la tristesse,
     Merci du mot qui me soutient.
     Merci, toi qui dans ta tendresse,
     Me tiens par la main.
  - |
    Merci, car j’entends ta Parole,
     Merci, car elle est ma clarté.
     Merci, ton Esprit me console,
     Fort à mes côtés.
  - |
    Merci, ce mot joyeux résonne,
     Merci, car ferme est ton salut,
     Merci, car ton amour étonne
     Même tes élus.
    Henri Künzler *1931
    © Auteur (139)
traductions:
  - langue: "de"
    couplets:
      - |
        Danke für diesen guten Morgen,
        danke für jeden neuen Tag,
        danke, dass ich all meine Sorgen
        auf dich werfen mag.
      - |
        Danke für alle guten Freunde,
        danke, o Herr, für jedermann,
        danke, wenn auch dem grössten Feinde
        ich verzeihen kann.
      - |
        Danke für meine Arbeitsstelle,
        danke für jedes kleine Glück,
        danke für alles Frohe, Helle
        und für die Musik.
      - |
        Danke für manche Traurigkeiten,
        danke für jedes gute Wort,
        danke, dass deine Hand mich leiten
        will an jedem Ort.
      - |
        Danke, dass ich dein Wort verstehe,
        danke, dass deinen Geist du gibst.
        danke, dass in der Fern und Nähe
        du die Menschen liebst.
      - |
        Danke, dein Heil kennt keine Schranken,
        danke, ich halt mich fest daran.
        danke, ach Herr, ich will dir danken,
        dass ich danken kann.
        Martin Gotthard Schneider *1930
        © Gustav Bosse Verlag, Heinrich-Schütz-Allee 35, D-34131 Kassel (34)
  - langue: "en"
    couplets:
      - |
        Thank you for every bright new morning,
        thank you for every fresh new day,
        thank you that I may cast my burdens
        wholly on to you.
      - |
        Thank you for every friend I have, Lord,
        thank you for everyone I know ;
        thank you when I can feel forgiveness
        to my greatest foe.
      - |
        Thank you for school and work and leisure,
        thank you for joys and every turn,
        thank you that in the hardest trials
        I can sing and learn.
      - |
        Thank you for every pain and sorrow,
        thank you for comfort in your word,
        thank you that I am guided by you
        everywhere I go.
      - |
        Thank you for grace to share your Gospel,
        thank you for all your Spirit’s power,
        thank you for your unfailing love which
        reaches far and near.
      - |
        Thank you for free and full salvation,
        thank you for grace to hold it fast ;
        thank you, O Lord, I want to thank you,
        thankful as I am.
        Walter van der Haas (XXe)
