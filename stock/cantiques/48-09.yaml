numero: "48-09"
titre: "L’amour du Seigneur est lumière"
refrain: |
  L’amour du Seigneur est lumière, il est partout et toujours présent. (bis)
couplets:
  - |
    Ouvre-toi à sa vie, donne-lui tout ton cœur.
  - |
    Dieu peut changer le monde, créer l’homme nouveau.
  - |
    L’avenir est mystère, mais Dieu est près de nous.
  - |
    Car ce Dieu qui nous aime a pour nom Jésus-Christ. Refr.
    Roger Trunk *1930
    © Auteur (162)
credits: "Roger Trunk *1930 — © Auteur (162)"
traductions:
  - langue: "de"
    couplets:
      - |
        Streck dich ihr entgegen, nimm sie in dich auf. Kehrvers
      - |
        Sie kann alles verändern, macht das Leben ganz neu. Kehrvers
      - |
        Nichts kann uns von ihr scheiden, was auch immer es sei. Kehrvers
      - |
        Denn der Herr dieser Liebe, Christus Jesus, ist treu. Kehrvers
