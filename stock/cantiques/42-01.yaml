numero: "42-01"
titre: "O mon âme, magnifie le Seigneur"
couplets:
  - |
    O mon âme, magnifie
    Le Seigneur, le roi des cieux !
    Il t’a sauvée, affranchie
    Par son pardon généreux.
    Alléluia ! alléluia !
    Chante son nom glorieux !
  - |
    Bénis sa main favorable,
    Prévenante en ses bontés,
    Et la grâce incomparable
    De ce Dieu de charité.
    Alléluia ! alléluia !
    Chante sa fidélité !
  - |
    Près des anges qui l’adorent
    Dans l’éclat de sa splendeur,
    Les saints prosternés l’honorent
    Et contemplent sa grandeur.
    Alléluia ! alléluia !
    Tous, adorons le Seigneur !
credits: "Richard Paquier 1905-1985"
