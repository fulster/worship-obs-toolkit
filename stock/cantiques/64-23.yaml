numero: "64-23"
titre: "Psaume 22 A"
source: "Antienne parlée"
couplets:
  - |
    Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné ? (verset 2)
  - |
    Le Christ s’est montré obéissant jusqu’à la mort, la mort sur une croix. (Ph 2,8b)
    Antienne chantée : 64-03
    Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné ?
    Pourquoi restes-tu si loin,
    sans me secourir,
    sans écouter ma plainte ?
    Mon Dieu, le jour je t’appelle au secours,
    mais tu ne réponds pas ;
    et la nuit encore est sans repos.
    Pourtant tu sièges sur ton trône,
    toi, l’unique vrai Dieu,
    qu’Israël ne cesse de louer.
    Nos ancêtres t’ont fait confiance,
    et tu les as mis à l’abri ;
    ils t’ont appelé au secours,
    et tu les as délivrés ;
    ils t’ont fait confiance,
    et tu ne les as pas déçus.
    Les gens m’insultent, tout le monde me méprise.
    Tous ceux qui me voient se moquent de moi.
    Ils disent de moi : « Il a remis son sort au Seigneur,
    eh ! bien, que le Seigneur le tire d’affaire !
    Le Seigneur l’aime, eh bien, qu’il le sauve ! »
    Seigneur, tu as été mon Dieu.
    Ne reste donc pas loin de moi,
    maintenant que le danger est proche
    et que personne ne vient m’aider.
    Ma force s’en va comme l’eau qui s’écoule,
    je ne tiens plus debout.
    Mon courage fond en moi comme la cire.
    J’ai la gorge complètement sèche,
    ma langue se colle à mon palais.
    Tu m’as placé au bord de la tombe.
    Une bande de malfaiteurs m’encercle,
    ces chiens ne me laissent aucune issue ;
    ils m’ont lié pieds et mains.
    Mes adversaires me regardent fixement,
    ils se partagent mes habits,
    ils tirent au sort mes vêtements.
    Mais toi, Seigneur, ne reste pas si loin ;
    toi qui es ma force, viens vite à mon secours !
    Gloire au Père, au Fils, au Saint-Esprit,
    comme il était au commencement,
    maintenant et toujours, pour les siècles des siècles !
    Amen.
    (Passion, Vendredi saint, Epreuve)
