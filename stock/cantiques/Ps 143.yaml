numero: "Ps 143"
titre: "Seigneur, écoute ma prière"
couplets:
  - |
    Seigneur, écoute ma prière,
    Mes cris et mes larmes amères ;
    Dans ta justice réponds-moi !
    O Dieu saint, ne sois pas sévère,
    Car nul n’est juste devant toi.
  - |
    On m’a frappé, jeté à terre,
    On m’a traîné dans la poussière,
    Enfermé dans l’obscurité
    Mon cœur égaré désespère ;
    Aie pitié du persécuté !
  - |
    Le passé dans mon âme chante,
    Je pense à ton œuvre étonnante ;
    Vers ton amour je tends les mains.
    Mon corps languit comme la plante
    Pour qui jamais la pluie ne vient.
  - |
    Je suis à bout, réponds-moi vite !
    Si ton œil se voile ou s’irrite,
    Je suis comme un mort oublié.
    Dès le matin viens et m’invite
    A partager ton amitié !
  - |
    Ouvre pour moi la route libre
    Où mon désir est de te suivre,
    Enseigne-moi ta volonté.
    Par ton Esprit saint fais-moi vivre,
    Qu’il me conduise en sûreté !
  - |
    Ton amour détruit leur violence,
    Ta justice est ma délivrance ;
    Par ton nom je vivrai, Seigneur.
    Maintiens-moi dans ton alliance,
    Puisque je suis ton serviteur !
