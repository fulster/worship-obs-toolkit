numero: "Ps 134"
titre: "Bénissons Dieu, le seul Seigneur"
couplets:
  - |
    Bénissons Dieu, le seul Seigneur,
    Nous qu’il choisit pour serviteurs.
    Levons nos mains dans sa maison
    Pour bénir et louer son nom.
  - |
    Ne cessons pas de le prier ;
    Demandons pour le monde entier,
    Pour tous ceux qui le chercheront
    La paix qui nous vient de Sion.
    Doxologie
  - |
    Gloire à Dieu, notre créateur,
    Gloire à l’Esprit consolateur,
    Au Fils unique Jésus-Christ,
    Au Dieu sauveur qui nous bénit.
credits: "Théodore de Bèze 1519-1605 / Roger Chapal 1912-1997 — © Fédération Musique et Chant de la Réforme, c/o Olivétan, BP 4464, F-69241 LYON Cedex 04"
