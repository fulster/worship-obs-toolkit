numero: "Ps 100B"
titre: "Vous tous qui la terre habitez"
couplets:
  - |
    Vous tous qui la terre habitez,
    Chantez à votre Dieu, chantez !
    Venez à lui pour le servir,
    Et de tout cœur vous réjouir.
  - |
    Sachez qu'il est le Dieu très haut,
    Et nous, son peuple et son troupeau.
    Il nous créa pour être à lui :
    Sa main nous garde et nous conduit.
  - |
    Venez à lui, chantez son nom,
    Célébrez-le dans sa maison,
    Car sa bonté ne finit point
    Et d'âge en âge il nous maintient.
  - |
    Pour toi, Seigneur, que notre amour
    Se renouvelle chaque jour ;
    Ta bonté, ta fidélité
    Demeurent pour l'éternité.
    Théodore de Bèze 1519-1605 / Edmond Pidoux 1908-2004
    © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2
credits: "Willem Barnard *1920 — © Interkerkelijke Stichtung woor het Kerklied, Leidschendam © Interkerkelijke Stichtung woor het Kerklied, DS K. Holverda, Stenen Beer, NL-1035 JN Amsterdam"
traductions:
  - langue: "de"
    couplets:
      - |
        Nun jauchzt dem Herren, alle Welt !
        Kommt her, zu seinem Dienst euch stellt ;
        kommt mit Frohlocken, säumet nicht,
        kommt vor sein heilig Angesicht.
      - |
        Erkennt, dass Gott ist unser Herr,
        der uns erschaffen ihm zur Ehr,
        und nicht wir selbst : durch Gottes Gnad
        ein jeder Mensch sein Leben hat.
      - |
        Dankt unserm Gott, lobsinget ihm,
        rühmt seinen Nam'n mit lauter Stimm ;
        lobsingt und danket allesamt !
        Gott loben, das ist unser Amt.
      - |
        Er ist voll Güt und Freundlichkeit,
        voll Lieb und Treu zu jeder Zeit ;
        sein Gnad währt immer dort und hier
        und seine Wahrheit für und für.
        Cornelius Becker 1561-1604 / David Denicke 1603-1680
  - langue: "en"
    couplets:
      - |
        Rejoice in God, all earthly lands ;
        Lift up your hearts in song and prayer.
        Delight to live by God's commands
        Sing joyful praises everywhere.
      - |
        Know this : we serve the Holy One,
        To whom our restless souls belong.
        We have our breath through God alone,
        To whom we raise our grateful song.
      - |
        Like sheep, we wander without aim,
        Unless our gentle Shepherd lead,
        In trust, we call upon God's name
        For grace and hope, and daily bread.
      - |
        On God our Maker we depend
        For love that's gracious, strong and sure
        God's faithfulness shall never end,
        From age to age it shall endure.
        © Ruth Duck (121a)
        Español
  - langue: "xx"
    couplets:
      - |
        Oh pueblos todos alabad
        En alta voz a Dios cantad,
        Regocijáos en su honor
        Servid alegres al Señor.
      - |
        Et soberano Creador
        De nuestra vida es el autor,
        El pueblo suyo somos ya,
        Rebaño que El pastoreará.
      - |
        A su santuario pues entrad,
        Y vuestras vidas ofrendad,
        Al nombre augusto dad loor
        Que al mundo llena de esplendor.
        4 Incomparable es su bondad,
        Y para siempre su verdad ;
        De bienes colma nuestro ser
        Su gracia no ha de fenecer.
        © Féderico Jose Pagura (153)
        Italiano
  - langue: "xx"
    couplets:
      - |
        Tutta la terra canti a te,
        Dio dell'universo,
        Tutto il creato viene a te,
        Annuncia la tua gloria.
      - |
        Unico Dio sei par noi
        Fatti dalla tua mano ;
        Padre, noi siamo figli tuoi,
        Popolo che tu guidi.
      - |
        Nella tua casa accoglierai
        L'inno delle nazioni.
        A chi ti cerca tu darai
        Di lodarti per sempre.
      - |
        Sì, ogni uomo lo dirà :
        " Buono è il Signore Dio,
        L'amore suo è verità,
        Nei secoli fedele. "
        © Eugenio Costa (116)
        Nederlands
  - langue: "xx"
    couplets:
      - |
        Juicht Gode toe, bazuint en zingt.
        Treedt nader tot gij Hem omringt,
        gij aard' alom, zijn rijksdomein,
        zult voor den HEER dienstvaardig zijn.
      - |
        Roept uit met blijdschap : " God is Hij.
        Hij schiep ons, Hem behoren wij,
        zijn volk, de schapen die Hij hoedt
        en als beminden weidt en voedt ".
      - |
        Treedt statig binnen door de poort.
        Hier staat zijn troon, hier woont zijn Woord.
        Heft hier voor God uw lofzang aan :
        Gebenedijd zijn grote naam.
      - |
        Want God is overstelpend goed,
        die ons in vrede wonen doet.
        Zijn goedheid is als morgendauw :
        elk nieuw geslacht ervaart zijn trouw.
