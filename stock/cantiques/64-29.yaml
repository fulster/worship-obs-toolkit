numero: "64-29"
titre: "Psaume 46"
couplets:
  - |
    Antienne parlée
    Le Seigneur de l’univers est avec nous,
    le Dieu de Jacob est notre forteresse. (verset 8)
    Antienne chantée : 64-17
    Dieu est pour nous un abri sûr,
    un secours toujours prêt dans la détresse.
    C’est pourquoi nous n’avons rien à craindre,
    même si la terre se met à trembler,
    si les montagnes s’écroulent au fond des mers,
    si les flots grondent, bouillonnent, se soulèvent
    et secouent les montagnes.
    Un cours d’eau répand la joie dans la cité de Dieu,
    dans la plus sacrée des demeures du Très-Haut.
    Dieu est dans la cité, elle tiendra bon ;
    dès que le jour se lève, il lui apporte son secours.
    Les nations grondent, les empires s’ébranlent,
    mais Dieu donne de la voix, et la terre vacille.
    Le Seigneur de l’univers est avec nous,
    le Dieu de Jacob est notre forteresse.
    Venez voir ce que le Seigneur a fait,
    les actes stupéfiants qu’il accomplit sur terre :
    il met fin aux combats jusqu’au bout du monde,
    il casse les arcs de guerre,
    il brise les lances, il met le feu aux boucliers.
    « Arrêtez, crie-t-il, et reconnaissez que je suis Dieu !
    Je domine les nations, je domine la terre. »
    Gloire au Père, au Fils, au Saint-Esprit,
    comme il était au commencement, maintenant et toujours,
    pour les siècles des siècles !
    Amen.
    (Eglise, Epreuve)
