numero: "64-67"
titre: "Le Décalogue"
couplets:
  - |
    Je suis le Seigneur ton Dieu qui t’ai libéré de l’esclavage.
    Tu n’auras pas d’autres dieux que moi.
    Tu ne te feras pas d’images pour te prosterner devant elles et
    pour les servir, car je suis le Seigneur ton Dieu.
    Tu ne prononceras pas à tort le nom du Seigneur ton Dieu.
    Souviens-toi du jour du repos pour le sanctifier.
    Honore ton père et ta mère.
    Tu ne commettras pas de meurtre.
    Tu ne commettras pas d’adultère.
    Tu ne commettras pas de vol.
    Tu ne porteras pas de faux témoignage contre ton prochain.
    Tu ne convoiteras rien de ce qui appartient à ton prochain.
    (d’après Exode 20)
