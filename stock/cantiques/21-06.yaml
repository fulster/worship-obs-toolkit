numero: "21-06"
titre: "Voici ton jour, Seigneur"
couplets:
  - |
    Voici ton jour, Seigneur ! le jour de la lumière,
    Où tu créas d’un mot le ciel avec la terre,
    Où l’univers entier sortit de son néant,
    Où l’homme fut créé pour être ton enfant.
  - |
    Voici ton jour, Seigneur ! le jour de la victoire,
    Où Jésus triomphant vint partager ta gloire !
    Premier parmi les morts, il est ressuscité.
    Il a vaincu le mal pour nous en délivrer.
  - |
    Voici ton jour, Seigneur ! Ta grâce nous appelle.
    L’Esprit a visité l’Eglise des fidèles.
    Nous l’attendons aussi : qu’il vienne dans nos cœurs,
    Qu’il fasse rayonner la gloire du Sauveur !
  - |
    Voici ton jour, Seigneur ! Sois béni d’âge en âge !
    Heureux qui te reçoit, la joie est son partage.
    Il marche dans la foi, la force habite en lui,
    Jusqu’au jour éternel que tu nous as promis.
credits: "Louis Roehrich 1811-1893 / Jean Anderfuhren (*1926) — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
