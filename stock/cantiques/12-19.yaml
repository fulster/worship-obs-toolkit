numero: "12-19"
titre: "Des lieux profonds je crie à toi"
source: "Psaume 130"
couplets:
  - |
    Des lieux profonds je crie à toi,
    Seigneur, Dieu secourable !
    Oh ! prends pitié, quand tu me vois
    Si faible et misérable !
    Qui, devant toi, peut subsister,
    Si ta justice veut compter
    Les fautes des coupables ?
  - |
    Seigneur, ce n’est jamais en vain
    Que tes enfants t’implorent.
    J’espère en toi, comme au matin
    La garde attend l’aurore.
    Oh ! daigne entendre mon appel,
    Et, comme au peuple d’Israël,
    Me pardonner encore !
credits: "Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
