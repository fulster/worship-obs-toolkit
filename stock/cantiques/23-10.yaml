numero: "23-10"
titre: "Nos cœurs pleins de reconnaissance"
couplets:
  - |
    Nos cœurs pleins de reconnaissance
    A toi s’élèvent, Dieu d’amour.
    Nous bénissons ton alliance,
    O toi qui veilles sur nos jours.
  - |
    Dans ta bonté toujours la même,
    Tu nous connais par notre nom.
    Marqués du sceau de ton baptême,
    En Jésus, nous t’appartenons.
  - |
    Tu as voulu dès notre enfance
    Nous accueillir en ta bonté.
    Maintiens en nous cette assurance
    Que Jésus-Christ nous a sauvés !
credits: "Louis Roehrich 1811-1893, rév. 1977 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04"
