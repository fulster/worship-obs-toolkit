numero: "47-16"
titre: "Dieu nous aime comme un père"
couplets:
  - |
    Dieu nous aime comme un père :
    Il écoute nos prières ;
    Dans les heures difficiles,
    Il est notre sûr asile.
  - |
    Dieu nous aime comme un père :
    Face à tous nos adversaires,
    Il nous garde et nous assure,
    Nous guérit de nos blessures.
  - |
    Dieu nous aime comme un père :
    Il nous guide et nous éclaire.
    Jésus-Christ est notre frère,
    Du péché il nous libère.
  - |
    Dieu nous aime comme un père :
    Sur cette terre étrangère,
    Nos épreuves sont légères,
    Et nos peines passagères.
credits: "Alfred Kuen *1921 — © Joie de Vivre, 2-4 rue des Magasins, F-67000 Strasbourg (40)"
