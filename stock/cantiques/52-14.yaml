numero: "52-14"
titre: "J’ai pris le train ce matin"
refrain: |
  J’ai pris le train ce matin,
  Le train des amis, le train de la vie.
  J’ai pris le train ce matin,
  Le train du bonheur, le train du Seigneur.
couplets:
  - |
    Entrez dans la ronde, venez avec moi
    Pour ce tour du monde : entrez dans la joie !
  - |
    Pauvres de la terre, ne restez pas là,
    Car dans la lumière il vous conduira.
  - |
    Laissez vos bagages de banalité,
    Pour ce beau voyage vers la liberté.
  - |
    Nous aurons la vie éternellement ;
    Montez, je vous prie : le train vous attend !
credits: "Frère Didier Mouque 1926-2007 — © Auteur (148)"
