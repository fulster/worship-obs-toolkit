numero: "Ps 066"
titre: "Vous, tous les peuples de la terre"
couplets:
  - |
    Vous, tous les peuples de la terre,
    Acclamez Dieu, chantez de joie.
    Louez le Dieu en qui espère,
    Sur qui s'appuie tout homme droit.
    Seigneur dont la force est terrible,
    Tes œuvres nous ont étonnés ;
    Ceux qui se croyaient invincibles
    Tu les contrains à s'incliner.
  - |
    Dieu a changé en terre ferme
    La mer où son peuple a passé.
    A l'oppression il a mis terme :
    Redressez-vous, applaudissez !
    L'autorité que Dieu exerce
    Sans se lasser veille en tous lieux,
    Pour déjouer l'œuvre perverse,
    Pour abaisser les orgueilleux.
  - |
    Quand tu veux éprouver notre âme
    Comme au creuset l'or ou l'argent,
    Tu nous fait traverser la flamme,
    Tu fais déborder les torrents.
    Mais, Seigneur, tu maintiens nos têtes
    Au-dessus des flots déchaînés.
    Dans le fracas de la tempête
    Tu soutiens nos cœurs effrayés.
  - |
    Seigneur, accepte mon offrande,
    Ces mains levées en ton honneur.
    Je veux que partout l'on entende
    L'œuvre de mon libérateur :
    Béni sois-tu, Dieu secourable,
    Toi qui jamais n'as écarté
    Le moindre appel du misérable,
    Mais près de lui t'es arrêté.
    Théodore de Bèze 1519-1605 / Roger Chapal 1912-1997
    © Fédération Musique et Chant de la Réforme, c/o Olivétan, BP 4464, F-69241 LYON Cedex 04
credits: "Matthias Jorissen 1739-1823"
traductions:
  - langue: "de"
    couplets:
      - |
        Jauchzt, alle Lande, Gott zu Ehren,
        rühmt seines Namens Herrlichkeit,
        und feierlich ihn zu verklären,
        sei Stimm und Saite ihm geweiht.
        Sprecht : Wunderbar sind deine Werke,
        O Gott, die du hervorgebracht ;
        Auch Feinde fühlen deine Stärke
        Und zittern, Herr, vor deiner Macht.
      - |
        Ins Trockne wandelt er die Meere,
        gebot dem Strom, vor uns zu fliehn ;
        wir freuten uns der Macht und Ehre,
        die uns hiess durch die Fluten ziehn.
        Gott herrschet allgewaltig immer,
        da er auf alle Völker schaut.
        Vor ihm gelingt's Empörern nimmer,
        es stürzet, wer auf Menschen baut.
      - |
        Du läuterst uns durch heisses Leiden,
        wie Silber rein wird in der Glut,
        durch Leiden führst du uns zu Freuden ;
        ja, alles was du tust, ist gut.
        Oft wollten wir den Mut verlieren
        im Feuer und in Wassersnot,
        doch kamst du, uns herauszuführen,
        und speistest uns mit Himmelsbrot.
      - |
        Ich will zu deinem Tempel wallen,
        dort bring ich mein Opfer dar,
        bezahl mit frohem Wohlgefallen
        Gelübde, dich ich schuldig war,
        Gelübde, die in banger Stunde -
        an allem, nicht an dir verzagt -
        ich dir, o Gott, mit meinem Munde
        so feierlich hab zugesagt.
