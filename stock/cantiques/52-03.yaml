numero: "52-03"
titre: "Quand mon cœur est lourd"
refrain: |
  Je me dis tout bas pour reprendre courage :
  Le Seigneur reviendra,
  Oui, le Seigneur reviendra !
couplets:
  - |
    Quand mon cœur est lourd et que mon ciel est noir,
    Quand je vis des jours sans espoir,
    Je me dis tout bas pour reprendre courage :
    Un jour ça changera !
    Quand je n’en peux plus, quand je suis dégoûté
    Et que je commence à douter,
  - |
    Quand je vois l’argent dessécher notre cœur
    En nous promettant le bonheur,
    Je me dis tout bas pour reprendre courage :
    Un jour ça changera !
    Et puis quand je vois, malgré tous nos efforts,
    Triompher le mal et la mort,
  - |
    Quand résonne au loin le tocsin dans la nuit,
    Quand j’entends la guerre et son bruit,
    Je me dis tout bas pour reprendre courage :
    Un jour ça changera !
    Et quand le démon, comme un lion rugissant,
    Rôde autour de nous, menaçant,
  - |
    Venez, compagnons, il nous faut proclamer
    Toutes nos raisons d’espérer.
    Le Seigneur est là pour nous rendre courage,
    Alors tout changera !
    Et quand brillera le soleil du grand jour,
    Quand nous fêterons ton retour,
    Et quand nous aurons terminé notre ouvrage,
    Alors tu reviendras,
    Oui, Seigneur, tu reviendras !
credits: "Alain Burnand *1925 — © Auteur (108)"
