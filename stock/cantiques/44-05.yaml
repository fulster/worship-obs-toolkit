numero: "44-05"
titre: "C'est mon joyeux service"
source: "1ère mélodie"
refrain: |
  Accepte mon offrande,
  O Jésus, Fils de Dieu,
  Et que sur moi descende
  Le Saint-Esprit de Dieu !
couplets:
  - |
    C'est mon joyeux service
    D'offrir à Jésus-Christ
    En vivant sacrifice,
    Mon corps et mon esprit.
  - |
    Qu'un feu nouveau s'allume
    Par ton amour en moi,
    Et dans mon cœur consume
    Ce qui n'est pas à toi.
  - |
    Viens, Jésus, sois mon maître,
    Toi qui m'as racheté,
    A toi seul je veux être,
    Et pour l'éternité.
credits: "d'après Théodore Monod 1836-1921"
