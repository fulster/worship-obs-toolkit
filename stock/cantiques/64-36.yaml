numero: "64-36"
titre: "Psaume 100"
source: "Antienne parlée"
couplets:
  - |
    Nous sommes son peuple, le troupeau dont il est le berger. (verset 3)
  - |
    Oui, le Seigneur est bon, et son amour n’a pas de fin. (verset 5)
    Antienne chantée : 64-07
    Gens du monde entier,
    faites une ovation au Seigneur !
    Offrez-lui un culte joyeux,
    présentez-vous à lui avec des cris de joie !
    Sachez-le: c’est le Seigneur qui est Dieu,
    c’est lui qui nous a faits, et nous sommes à lui.
    Nous sommes son peuple,
    le troupeau dont il est le berger.
    En entrant dans son temple, acclamez-le ;
    dans la cour intérieure, exprimez vos louanges !
    Louez le Seigneur,
    remerciez-le d’être votre Dieu !
    Oui, le Seigneur est bon,
    et son amour n’a pas de fin ;
    de siècle en siècle il reste fidèle.
    Gloire au Père, au Fils, au Saint-Esprit,
    maintenant, et toujours, pour les siècles des siècles !
    Amen.
    (Ouverture, Louange, Eglise)
