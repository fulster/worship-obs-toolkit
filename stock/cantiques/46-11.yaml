numero: "46-11"
titre: "Ne mets pas ta piété en vitrine"
source: "Antienne pour commencer \" Ne mets pas ta piété en vitrine, Si c'est pour moi \", dit Dieu, \" Ni les cris, ni les pleurs en sourdine, Ils sont pour moi\", dit Dieu."
couplets:
  - |
    Car jeûner pour de bon signifie
    Pour ton bonheur et ton bien,
    Qu'avant tout, sans tarder, tu délivres
    Ton débiteur pour rien.
  - |
    En ce jour, sois heureux, sacrifie
    Quelque repas de roi
    Et nourris l'affamé dont la vie
    S'épuisera sans toi.
  - |
    L'exilé sans papiers je confie
    A ton accueil, dit Dieu,
    Souviens-toi, tu étais sans patrie,
    Errant sans feu ni lieu.
  - |
    C'est alors qu'en ce jour ta lumière
    Resplendira partout,
    Et ma paix, comme l'eau sur la terre,
    Se répandra sur vous.
    Antienne pour conclure
    Qui dira à quoi sert la prière ?
    " Je répondrai ", dit Dieu ;
    " Sans tarder, près de toi, comme un père,
    Je reviendrai ", dit Dieu.
credits: "Henri Künzler *1931 — © Auteur (139)"
