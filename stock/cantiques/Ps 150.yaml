numero: "Ps 150"
titre: "Dans son temple"
couplets:
  - |
    Dans son temple, louez Dieu !
    Ce qu’il fait est merveilleux ;
    Il est fort, il est vainqueur.
    Que tout dise sa grandeur,
    Que pour lui les orgues chantent !
    Joignez aux plus belles voix
    La trompette et le hautbois,
    Les cymbales éclatantes !
  - |
    Chantez sous le firmament
    Avec tous vos instruments.
    Au rythme du tambourin,
    Dansez pour le roi qui vient,
    Lui que l’univers désire !
    Exaltez le Seigneur Dieu,
    Chantez son nom glorieux
    Avec tout ce qui respire !
