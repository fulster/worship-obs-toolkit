numero: "34-31"
titre: "Jésus entre dans son règne"
couplets:
  - |
    Jésus entre dans son règne,
    Que tous les puissants le craignent
    Et lui rendent tout honneur.
    Dieu a tenu sa promesse
    Et toute langue confesse :
    Jésus-Christ est le Seigneur !
  - |
    Lui qui est venu sur terre,
    Lui qui s'est fait notre frère,
    Aujourd'hui il est vainqueur.
    Il a porté notre peine,
    Il a surmonté la haine :
    Jésus-Christ est le Seigneur !
  - |
    En lui est la délivrance,
    Le pardon de nos offenses,
    Il est notre Rédempteur.
    En lui est la vie nouvelle,
    Libre, pacifiée, plus belle :
    Jésus-Christ est le Seigneur !
  - |
    Il se tient devant son Père,
    Il lui porte nos prières,
    Il est notre intercesseur.
    Remettons-lui nos souffrances,
    Notre monde et ses violences :
    Jésus-Christ est le Seigneur !
  - |
    Il veille sur son Eglise,
    Par son sang se l'est acquise,
    Il en est le défenseur.
    Travaillons pour son Royaume,
    Pour l'amour de tous les hommes :
    Jésus-Christ est le Seigneur !
  - |
    Il est la fin du voyage
    Et, bientôt, de son visage,
    Nous connaîtrons la douceur.
    Avec les saints et les anges,
    Déjà chantons sa louange :
    Jésus-Christ est le Seigneur !
