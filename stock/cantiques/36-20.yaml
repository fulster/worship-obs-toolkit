numero: "36-20"
titre: "Parmi les hommes répandus"
couplets:
  - |
    Parmi les hommes répandus
    Sur tous les continents,
    Jésus rassemble ses élus,
    Le peuple des croyants.
    L'Esprit de Dieu les met d'accord :
    Il les unit en un seul corps,
    Pour confesser d'un même cœur
    Que Jésus-Christ est le Seigneur
    Et le Sauveur
    Des hommes, tous pécheurs.
  - |
    Baptisé d'eau et d'Esprit saint
    Au nom du Seigneur Dieu,
    Se partageant un même pain,
    Venu du haut des cieux,
    Ce peuple n'a qu'un seul amour :
    C'est d'écouter jour après jour
    Jésus venu pour le chercher,
    Pour l'avertir, le consoler,
    Et le combler
    De toute vérité
  - |
    Le Christ lui-même l'a formé
    En mourant sur la croix,
    Ce peuple uni pour témoigner
    Du salut par la foi.
    Qu'il soit puissant, qu'il soit petit,
    Couvert d'honneur ou de mépris,
    Jésus-Christ l'ayant racheté,
    Il est certain de subsister
    Et de durer
    Jusqu'en l'éternité.
credits: "Jean Anderfuhren *1926 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
