numero: "36-17"
titre: "L'Eglise universelle, fondée en Jésus-Christ"
source: "The Church's one foundation"
couplets:
  - |
    L'Eglise universelle,
    Fondée en Jésus-Christ,
    Est la maison nouvelle
    Vivant de son Esprit.
    Du ciel il vint lui-même
    Pour être son époux,
    Le Rédempteur suprême
    Donnant son sang pour nous.
  - |
    Partout dans la prière,
    L'Eglise unit les cœurs
    Pour invoquer le Père,
    Un même et seul Seigneur.
    Aux ordres de son maître,
    Rompant le même pain,
    L'Eglise fait connaître
    A tous l'amour divin. .
  - |
    Le monde la méprise,
    Il cherche à la briser.
    Des luttes la divisent,
    Son temps paraît compté.
    Mais elle, dans l'épreuve,
    Reçoit de Jésus-Christ
    Des forces toujours neuves,
    Le don de son Esprit.
  - |
    Déjà sur cette terre
    Elle est unie à Dieu,
    Et par un grand mystère,
    Aux rachetés des cieux.
    Car la vie éternelle
    Est pour tous ceux de nous
    Dont Christ est le modèle
    Dans un cœur humble et doux.
    Richard Paquier 1905-1985 / Edmond Pidoux 1908-2004
    © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)
credits: "Willem Barnard *1920"
traductions:
  - langue: "en"
    couplets:
      - |
        The Church's one foundation
        is Jesus Christ her Lord;
        she is his new creation
        by water and the word :
        from heav'n he came and sought her
        to be his holy bride ;
        with his own blood he bought her,
        and for her life he died.
      - |
        Call'd out from every nation,
        yet one through all the earth ;
        her charter of salvation -
        one Lord, one faith, one birth:
        one holy name she blesses,
        and shares one holy food,
        as to one hope she presses
        with ev'ry grace endued.
      - |
        We see her long divided
        by heresy and sect;
        yet she by God is guided -
        one people, one elect ;
        her vigil she is keeping,
        her cry goes up, "How long?"
        and soon the night of weeping
        shall be the dawn of song.
      - |
        Yet she on earth has union
        with God the Three-in-One;
        and mystic, sweet communion
        with those whose rest is won ;
        O happy ones and holy !
        Lord, grant to us your grace,
        with them the meek and lowly ,
        in heav'n to see your face.
        Samuel John Stone 1839-1900
  - langue: "de"
    couplets:
      - |
        Die Kirche steht gegründet
        allein auf Jesus Christ,
        sie, die des grossen Gottes
        erneute Schöpfung ist.
        Vom Himmel kam er nieder
        und wählte sie zur Braut,
        hat sich mit seinem Blute
        ihr ewig angetraut.
      - |
        Erkorn aus allen Völkern,
        doch als ein Volk gezählt,
        ein Herr ist's und ein Glaube,
        ein Geist, der sie beseelt,
        und einen heilgen Namen
        ehrt sie, ein heilges Mahl,
        und eine Hoffnung teilt sie
        kraft seiner Gnadenwahl.
      - |
        Verfolg und angefochten
        in heissem Kampf und Strauss,
        schaut nach der Offenbarung
        die Friedenszeit sie aus ;
        sie harrt, bis sich ihr Sehen
        erfüllt in Herrlichkeit
        und nach den grossen Siegen
        beginnt die Ruhezeit.
      - |
        Schon hier ist sie verbunden
        mit dem, der ist und war,
        hat selig Gemeinschaft
        mit der Erlösten Schar.
        Ihr hochbeglückten Geister,
        zu Jesus rufen wir,
        dass wir mit euch den Meister
        dort preisen für und fûr.
        Anna Thekla von Weling 1837-1900
        Nederlands
  - langue: "xx"
    couplets:
      - |
        Eén naam is onze hope
        één grond heeft Christus' Kerk
        zij rust in éne dope,
        en is zijn scheppingswerk.
        Om haar als bruid te werven
        kwam Hij ten hemel af
        Hij was 't, die door zijn sterven
        aan haar het leven gaf.
      - |
        Vergaard uit alle streken
        in heel de wereld één
        werd dit haar zalig teken,
        dat allen is gemeen,
        Eén bede vouwt de handen,
        één zegen breekt het brood,
        één vuurbaak staat te branden
        in 't duister van de dood.
