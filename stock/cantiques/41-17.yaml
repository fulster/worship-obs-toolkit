numero: "41-17"
titre: "Les cieux et la terre"
couplets:
  - |
    Les cieux et la terre
    Célèbrent en chœur
    La gloire du Père,
    Du Dieu créateur.
    Qu’il est redoutable
    Dans sa majesté !
    Qu’il est admirable
    Dans sa charité !
  - |
    C’est lui qui nous donne
    Le printemps joyeux,
    Les fruits de l’automne,
    L’été radieux.
    Largesse infinie
    Que rien ne tarit !
    Sa main rassasie
    Tout être qui vit.
  - |
    La vive lumière
    Des cieux enflammés,
    L’ombre et le mystère
    Des bois embaumés,
    Le flot qui murmure,
    La fleur qui sourit,
    Tout dans la nature
    Nous parle de lui.
  - |
    Mais, ô Dieu suprême,
    Plus que tous tes dons,
    C’est ton amour même
    Que nous adorons.
    O source éternelle
    De grâce et de paix,
    Ton peuple fidèle
    Te loue à jamais !
credits: "Edmond-Louis Budry 1854-1932"
