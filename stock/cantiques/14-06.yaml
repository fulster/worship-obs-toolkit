numero: "14-06"
titre: "Bienheureux les pauvres en esprit"
source: "Les Béatitudes (Antienne) Souviens-toi de nous, Seigneur, au jour où tu régneras."
couplets:
  - |
    Bienheureux les pauvres en esprit,
    Car le royaume des cieux est à eux.
  - |
    Bienheureux les affligés,
    Car ils seront consolés.
  - |
    Bienheureux ceux qui sont doux,
    Car ils hériteront la terre.
  - |
    Bienheureux ceux qui ont faim et soif de justice,
    Car ils seront rassasiés.
  - |
    Bienheureux les miséricordieux,
    Car ils obtiendront miséricorde.
  - |
    Bienheureux ceux qui ont le cœur pur,
    Car ils verront Dieu.
  - |
    Bienheureux les ouvriers de paix,
    Car ils seront appelés fils de Dieu.
  - |
    Bienheureux les persécutés pour la justice,
    Car le royaume des cieux est à eux.
  - |
    O vous tous, tressaillez de joie,
    Votre récompense est grande dans les cieux.
    Mt 5,2-12
