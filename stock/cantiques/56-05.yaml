numero: "56-05"
titre: "Le Christ est ressuscité"
couplets:
  - |
    Le Christ est ressuscité, alléluia ! / Comme il l’avait annoncé, alléluia ! (bis)
  - |
    Il nous a donné sa joie, alléluia ! / La souffrance de la croix, alléluia ! (bis)
  - |
    Pour chaque homme chaque jour, alléluia ! / Il donne son pain d’amour, alléluia ! (bis)
  - |
    Près de son Père il attend, alléluia ! / Ceux qui gardent un cœur d’enfant, alléluia ! (bis)
