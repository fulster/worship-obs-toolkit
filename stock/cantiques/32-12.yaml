numero: "32-12"
titre: "L’enfant qui naît à Bethléem"
couplets:
  - |
    L’enfant qui naît à Bethléem, alléluia !
    Réjouira Jérusalem. Alléluia ! alléluia !
  - |
    Pour lui l’étoile a rayonné, alléluia !
    Un ange au ciel l’a proclamé. Alléluia ! alléluia !
  - |
    Vers lui s’empressent les bergers, alléluia !
    Les pauvres gens vont l’adorer. Alléluia ! alléluia !
  - |
    Il vient des mages d’Orient, alléluia !
    Pour l’honorer de leurs présents. Alléluia ! alléluia !
  - |
    Et nous, rendons hommage à Dieu, alléluia !
    Pour Christ, le roi venu des cieux ! Alléluia ! alléluia !
    Imité de Puer natus in Bethleem
