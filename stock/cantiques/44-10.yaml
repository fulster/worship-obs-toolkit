numero: "44-10"
titre: "Je te suivrai, Jésus"
couplets:
  - |
    Je te suivrai, Jésus, toi dont la voix m'appelle
    A être le témoin de ta bonne nouvelle ;
    Je ne le pourrais pas, mais c'est toi qui choisis :
    La grâce d'obéir est en toi, Jésus-Christ.
  - |
    Je te suivrai, Jésus, sans regard en arrière,
    Les yeux tournés vers toi qui nous conduis au Père.
    Tu traces le sillon où le grain porte fruit :
    Notre seul horizon, c'est toi, ô Jésus-Christ.
  - |
    Je te suivrai, Jésus, si dure soit la route ;
    La croix que doit porter qui t'aime, qui t'écoute,
    Tu la portes avec nous, tu donnes ton Esprit :
    La force pour marcher est en toi, Jésus-Christ.
