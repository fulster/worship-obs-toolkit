numero: "53-04"
titre: "O Seigneur, dans mon cœur je t'écoute"
refrain: |
  O Seigneur, dans mon cœur je t'écoute.
  Ta Parole est une lampe sur ma route.
couplets:
  - |
    Nous voulons chercher
    Tout ce qui peut te plaire,
    Mais pour le trouver,
    Il nous faut ta lumière.
  - |
    Tu nous dis d'aimer
    Tous les autres, nos frères,
    Mais pour les aider,
    Il nous faut ta lumière.
  - |
    Nous voulons chanter
    Notre Dieu, notre Père,
    Mais pour lui parler,
    Il nous faut ta lumière.
  - |
    Tu aimes écouter
    Tous nos chants, nos prières,
    Mais pour te louer,
    Il nous faut ta lumière.
  - |
    Viens pour éclairer
    Notre vie, notre terre,
    Car en vérité,
    Il nous faut ta lumière.
credits: "Christiane Gaud *1937 — © Groupe Fleurus-Mame, autorisation SECLI 09/002 (33)"
