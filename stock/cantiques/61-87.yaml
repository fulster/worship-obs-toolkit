numero: "61-87"
titre: "Je crois, Seigneur, tu es source de vie"
couplets:
  - |
    Credo
    Officiant
    Confessons la foi chrétienne en chantant :
    « Je crois, Seigneur, tu es source de vie. »
    Assemblée
    Je crois, Seigneur, tu es source de vie.
    Officiant
    Je crois en Dieu, le Père de tous les hommes, créateur de tout l’univers
    et de tout ce qui vit. Il a fait l’homme à son image.
    Assemblée
    Je crois, Seigneur, tu remplis l’univers.
    Officiant
    Je crois en son Fils Jésus-Christ, notre Seigneur, né d’une femme en notre condition humaine, mort et ressuscité pour nous faire partager sa vie. Toujours vivant parmi nous, il est l’espérance du monde.
    Assemblée
    Je crois, Seigneur, tu es source de vie.
    Officiant
    Je crois en l’Esprit du Père et de Jésus qui renouvelle nos vies par la force de son amour. Il nous rassemble en un seul peuple et dans l’unique Eglise.
    Assemblée
    Je crois, Seigneur, ton amour nous unit.
    Officiant
    Je crois qu’aimés de Dieu nous sommes tous frères et que notre amour doit s’étendre à tout homme. Je crois que, sauvés du mal et de la mort, nous sommes dans la vie nouvelle qui n’aura pas de fin.
    Assemblée
    Je crois, Seigneur, tu nous donnes la vie
credits: "Abbé Maurice Debaisieux (†1994) — T : © Studio SM, autorisation SECLI 09/002 (68)"
