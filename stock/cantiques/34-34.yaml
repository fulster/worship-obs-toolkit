numero: "34-34"
titre: "Pourquoi fixer le ciel ?"
refrain: |
  Pourquoi fixer le ciel ?
  Pourquoi pleurer sa mort ?
  Pourquoi pleurer ?
  Je sais qu'il est vivant,
  Il est vivant !
couplets:
  - |
    Sa tombe est vide,
    Le ciel est vide,
    Mais notre cœur est plein de lui,
    Dieu vivant
    Mais notre cœur est plein de lui.
  - |
    Nos mains sont vides,
    Nos yeux sont vides,
    Mais nos chemins mènent vers lui,
    Dieu vivant,
    Mais nos chemins mènent vers lui.
  - |
    Longue est la route,
    Dure est la route,
    Mais notre pain parle de lui,
    Dieu vivant,
    Mais notre pain parle de lui.
credits: "Michel Scouarnec *1934 — © Studio SM, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne"
