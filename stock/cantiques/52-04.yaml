numero: "52-04"
titre: "Notre Dieu règne encor !"
couplets:
  - |
    God is still on the throne
    Notre Dieu règne encor !
    Jamais son amour ne s’endort.
    Le vent se déchaîne,
    Nos cœurs sont en peine,
    Mais Dieu nous conduit jusqu’au port.
    Notre Dieu règne encor !
    Jamais son amour ne s’endort.
    Ce qu’il nous promet
    Reste vrai pour jamais :
    Notre Dieu règne encor !
credits: "Claire-Lise de Benoit 1917-2008 — © Ligue pour la Lecture de la Bible, Chemin de Bérée 70, CH – 1010 Lausanne, avec autorisation (45)"
