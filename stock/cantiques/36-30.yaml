numero: "36-30"
titre: "Tu nous appelles à t'aimer"
refrain: |
  Tu nous appelles à t'aimer en aimant le monde où tu nous envoies ;
  O Dieu fidèle, donne-nous en aimant le monde de n'aimer que toi !
couplets:
  - |
    Allez par les chemins,
    Criez mon Evangile ;
    Allez, pauvres de tout,
    Partagez votre joie !
  - |
    Soyez signes d'amour,
    De paix et de tendresse ;
    Ayez un cœur d'enfant ;
    Soyez simples et vrais !
  - |
    Pour être mes témoins,
    Veillez dans la prière ;
    Mon Royaume est en vous,
    Il attend votre cœur.
  - |
    L'Esprit vous conduira
    Sur des routes nouvelles :
    Allez, ne craignez pas,
    Je demeure avec vous.
