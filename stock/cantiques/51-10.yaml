numero: "51-10"
titre: "Laisse-nous, Seigneur, entrer"
refrain: |
  Laisse-nous, Seigneur,
  Entrer dans ta maison !
  Laisse-nous venir chez toi,
  Laisse-nous, Seigneur,
  Partager ta moisson,
  Laisse-nous chanter avec toi !
couplets:
  - |
    Printemps de fête, alléluia !
    Lumière est faite, alléluia !
  - |
    Soleil de joie, alléluia !
    Viens sous mon toit, alléluia !
  - |
    Vivons ensemble, alléluia !
    Dieu nous rassemble, alléluia !
  - |
    Nous sommes sauvés, alléluia !
    Ressuscités, alléluia !
credits: "Jean-Noël Klinguer *1949 — © Studio SM, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne (68)"
