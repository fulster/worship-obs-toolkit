numero: "32-03"
titre: "C’est jour de joie, jour merveilleux"
couplets:
  - |
    C’est jour de joie, jour merveilleux
    Sur toute la terre.
    C’est jour de joie pour tous les yeux,
    Jour plein de lumière.
    Pour tous les temps, pour tous les lieux,
    Voici que vient le Fils de Dieu,
    Il est né ce jour-là
    Et Marie tient dans ses bras
    Cet enfant qu’elle accepta,
    Ce si grand mystère.
  - |
    Bergers et mages sont venus,
    Oh ! grande merveille,
    Vers cette étable où ils ont vu
    Tes yeux qui s’éveillent.
    Par l’ange et l’astre dans la nue,
    Royal et faible ils t’ont connu,
    Toi qu’ils ont salué ;
    C’est à toi qu’ils ont voué
    Leurs dons et leurs cœurs mêlés,
    Oh ! joie sans pareille.
  - |
    Toujours nous chanterons, Seigneur,
    Cette nuit étrange
    Où vie et mort, peine et bonheur,
    Ton amour les change ;
    Où tu partageas ton honneur
    Avec nous tous, tes serviteurs.
    Viens en nos cœurs joyeux,
    Viens éclairer tous les yeux !
    Tous les temps et tous les lieux
    Chantent ta louange.
credits: "Henri Capieu 1909-1993 / Répertoire commun protestant francophone 2000 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)"
