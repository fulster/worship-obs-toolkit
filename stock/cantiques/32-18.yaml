numero: "32-18"
titre: "Vous les fleuves, les rivières"
couplets:
  - |
    Vous les fleuves, les rivières,
    Vous brillantes eaux des monts,
    Dansez pour le Fils de Dieu.
    Aujourd’hui naît la lumière,
    Aujourd’hui Dieu fait ce don
    Qui réjouit tous les yeux.
    Chante, chante la louange,
    De Jésus parmi la terre,
    Danse, danse la lumière
    De Jésus splendeur du monde !
  - |
    Monts et vous, forêts superbes,
    Qui tressaillez sous le vent,
    Chantez pour le Fils de Dieu.
    Il vient dans sa crèche d’herbe,
    Il sourit comme un enfant
    Pour éclairer tous les yeux.
    Chante, chante la louange,
    De Jésus parmi la terre,
    Danse, danse la lumière
    De Jésus splendeur du monde !
  - |
    Et vous toutes créatures,
    Et toi l’homme le premier,
    Vivez pour le Fils de Dieu.
    Sa présence nous assure
    De cette immense amitié
    Qui nous fait les fils de Dieu.
    Chante, chante la louange,
    De Jésus parmi la terre,
    Danse, danse la lumière
    De Jésus splendeur du monde !
    Antienne facultative
    Alléluia ! (12x)
