numero: "54-07"
titre: "C'est Noël aujourd'hui"
refrain: |
  C'est Noël aujourd'hui : jouez les pipeaux !
  Chantons tous au Seigneur un cantique nouveau !
couplets:
  - |
    Il vient dans une étable comme un berger
    Pour rassembler les hommes du monde entier.
  - |
    C'est l'étoile qui brille dans notre nuit,
    La lumière du monde qui nous conduit.
  - |
    C'est la tige nouvelle portant le grain
    Qui sera pain de vie pour notre faim.
  - |
    Ce n'est qu'une étincelle, ce nouveau-né,
    Qui vient brûler le monde de charité.
credits: "Noël Colombier *1932 — © Air Libre, Lorient (2)"
