numero: "49-61"
titre: "Tous les biens du monde"
couplets:
  - |
    Tous les biens du monde,
    Toute joie profonde
    Sont les dons de Dieu.
    1ère voix : Merci, merci, Seigneur !
    2e voix : Merci, merci, Seigneur !
    3e voix : Merci, Seigneur !
    Yves Kéler *1939
    © Auteur (138)
traductions:
  - langue: "de"
    couplets:
      - |
        Stimme : Dank sei dir dafür !
      - |
        Stimme : Dank, dank sei dir dafür !
      - |
        Stimme : Danke, danke !
