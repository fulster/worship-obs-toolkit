numero: "44-08"
titre: "Qu'il fait bon à ton service"
refrain: |
  Prends, ô Jésus, prends ma vie,
  Elle est toute à toi ;
  A ta grâce je confie
  Ma trop faible foi.
couplets:
  - |
    Qu'il fait bon à ton service,
    Jésus, mon Sauveur,
    Tu reçois le sacrifice
    De mon humble cœur.
  - |
    Pour qu'aujourd'hui je sois libre,
    Tu m'as racheté ;
    Je n'ai pour raison de vivre
    Que ta volonté.
  - |
    C'est pour marcher à ta suite
    Que je veux servir ;
    Que plus jamais ne me quitte
    La joie d'obéir !
  - |
    Travaux, luttes et souffrances,
    Que craindrais-je encor ?
    En toi est mon espérance
    Et mon seul trésor.
