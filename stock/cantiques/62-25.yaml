numero: "62-25"
titre: "Notre Père"
source: "Jour après jour Ostinato Notre Père qui es aux cieux, Que ton nom soit sanctifié, Notre Père qui es aux cieux, Que ton règne vienne ! Les strophes qui suivent se chantent sur l’ostinato"
couplets:
  - |
    Jour après jour, tu fais connaître
    Ta bonté, ton amour, ta volonté.
    Jour après jour, tu fais paraître
    Les bourgeons de l’humilité.
  - |
    Jour après jour ta main nous donne
    Notre pain pour la joie de partager.
    Jour après jour, tu nous pardonnes
    Pour nous apprendre à pardonner.
  - |
    Jour après jour, tu nous délivres
    Du Mal qui en tous lieux vient nous tenter
    Jour après jour, tu nous convies
    A préparer l’éternité.
credits: "Jean-Jacques Delorme *1955 — © Auteur (120)"
