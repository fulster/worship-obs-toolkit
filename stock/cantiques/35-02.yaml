numero: "35-02"
titre: "Esprit saint, Esprit créateur"
couplets:
  - |
    Esprit saint, Esprit créateur,
    O grâce qui surpasses tout,
    Viens habiter dans notre cœur !
    Saint-Esprit, visite-nous !
  - |
    Toi qui descends du Dieu très-haut,
    Consolateur promis aux siens,
    Baptise-nous d'un feu nouveau
    Et répands sur nous tes biens !
  - |
    O source de tout don parfait
    Et doigt de Dieu pour nous guider,
    Par ta présence tu permets
    Que les mots soient inspirés.
  - |
    Mets ta clarté dans nos esprits,
    Remplis nos cœurs de ton amour !
    Et que nos corps soient affermis
    De ta force, tous les jours !
  - |
    Au loin repousse l'ennemi !
    La paix descende enfin partout !
    Sois notre guide et notre appui :
    Loin du mal dirige-nous !
  - |
    Que Dieu le Père et Dieu le Fils
    Nous soient rendus présents par toi !
    Ensemble avec le Saint-Esprit,
    Qu'ils reçoivent notre foi !
  - |
    Louange au Père, au Créateur !
    Louange au Fils ressuscité !
    Au Saint-Esprit consolateur,
    Gloire pour l'éternité !
    Edmond Pidoux 1908-2004
    © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)
credits: "John Cosin 1594-1672, rév. 1982"
traductions:
  - langue: "de"
    couplets:
      - |
        Komm, Gott Schöpfer, Heiliger Geist,
        besuch das Herz der Menschen dein,
        mit Gnaden sie füll, denn du weisst,
        dass sie dein Geschöpfe sein.
      - |
        Denn du bist der Tröster genannt,
        des Allerhöchsten Gabe teu'r,
        ein geistlich Salb an uns gewandt,
        ein lebend Brunn, Lieb und Feu'r.
      - |
        Zünd uns ein Licht an im Verstand,
        gib uns ins Herz der Lieb Inbrunst,
        das schwach Fleisch in uns, dir bekannt,
        erhalt fest dein Kraft und Gunst.
      - |
        Du bist mit Gaben siebenfalt
        der Finger an Gotts rechter Hand ;
        des Vaters Wort gibst du gar bald
        mit Zungen in alle Land.
      - |
        Des Feindes List treib von uns fern,
        den Fried schaff bei uns deine Gnad,
        dass wir deim Leiten folgen gern
        und meiden der Seelen Schad.
      - |
        Lehr uns den Vater kennen wohl,
        dazu Jesus Christ, seinen Sohn,
        dass wir des Glaubens werden voll,
        dich, beider Geist, zu verstehn.
      - |
        Gott Vater sei Lob und dem Sohn,
        der von den Toten auferstand,
        dem Tröster sei dasselb getan
        in Ewigkeit alle Stund.
        Hrabanus Maurus 780- 856 /Martin Luther 1485-1546
  - langue: "en"
    couplets:
      - |
        Creator Spirit, come, inspire
        our lives with light and heavenly fire ;
        now make us willing to receive
        the sevenfold gifts you freely give.
      - |
        Your pure anointing from above
        is comfort, life, and fire of love ;
        so heal with your etemal light
        the blindness of our human sight.
      - |
        Anoint and cheer our saddened face
        with all the fullness of your grace ;
        remove our fears, give peace at home
        where you are guide, no harm can come.
      - |
        Teach us to know the Father, Son,
        and you with them the Three-in-One ;
        that through the ages all along
        this shall be our endless song.
