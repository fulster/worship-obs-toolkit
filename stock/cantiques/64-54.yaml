numero: "64-54"
titre: "Les Béatitudes"
couplets:
  - |
    Antienne chantée : 14-06
    Ils sont heureux,
    ceux qui ont un cœur de pauvre :
    le Royaume des cieux est à eux !
    Ils sont heureux,
    ceux qui pleurent :
    Dieu les consolera !
    Ils sont heureux,
    ceux qui sont doux :
    ils recevront la terre comme un don de Dieu !
    Ils sont heureux,
    ceux qui ont faim et soif d’obéir à Dieu :
    ils seront satisfaits !
    Ils sont heureux,
    ceux qui sont bons pour les autres :
    Dieu sera bon pour eux !
    Ils sont heureux,
    ceux qui ont le cœur pur :
    ils verront Dieu !
    Ils sont heureux,
    ceux qui font la paix autour d’eux :
    Dieu les appellera ses fils !
    Ils sont heureux,
    ceux qu’on fait souffrir parce qu’ils obéissent à Dieu :
    le Royaume des cieux est à eux !
    (Matthieu 5,3-10)
