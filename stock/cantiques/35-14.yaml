numero: "35-14"
titre: "Souffle du Dieu vivant, l'Esprit créateur"
couplets:
  - |
    Souffle du Dieu vivant,
    L'Esprit créateur, au début du monde,
    Souffle du Dieu vivant,
    L'Esprit créateur couvrait le chaos.
    Il planait sur les ondes
    Pour les rendre fécondes.
    Souffle du Dieu vivant,
    L'Esprit créateur planait sur les eaux.
  - |
    Souffle du Dieu vivant,
    L'Esprit créateur passe sur la plaine.
    Souffle du Dieu vivant,
    L'Esprit créateur réveille les morts.
    C'est lui qui nous fait vivre,
    C'est lui qui nous délivre,
    Souffle du Dieu vivant,
    L'Esprit créateur fait l'homme nouveau.
  - |
    Souffle du Dieu vivant,
    L'Esprit créateur rassemble les hommes.
    Souffle du Dieu vivant,
    L'Esprit créateur n'en fait qu'un seul corps.
    Au jour de Pentecôte,
    Enflammant les apôtres,
    Souffle du Dieu vivant,
    L'Esprit créateur emplit l'univers.
    J. Choupaut
