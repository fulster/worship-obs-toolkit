numero: "49-20"
titre: "Reste avec nous, Seigneur, car voici la nuit"
refrain: |
  Reste avec nous, Seigneur, car voici la nuit s’approche.
  Reste avec nous, Seigneur, tout au long de notre vie !
couplets:
  - |
    Car tu es la source de la vraie lumière,
    En toi nous saluons l’Etoile du matin.
  - |
    L’amour et la haine divisent notre être,
    En toi nous saluons le Prince de la paix.
  - |
    Tu es l’espérance de ceux qui te prient.
    En toi nous saluons le Sauveur des croyants.
    Refrain final
    Reste avec nous, Seigneur, car voici la nuit s’approche,
    Reste avec nous, Seigneur, au déclin de notre vie !
credits: "Roger Trunk *1930 — © Auteur (162)"
