numero: "41-22"
titre: "Louons Dieu le Créateur"
couplets:
  - |
    Louons Dieu le Créateur !
    Il sema partout des fleurs,
    Nous offrant le grand honneur
    D’être enfants de son lignage.
    Il nous pétrit de ses mains,
    Nous donna le beau jardin
    Où jouer nos lendemains
    D’hommes faits à son image.
  - |
    Louons Christ le Rédempteur !
    Qui vint pour chasser nos peurs,
    Nous donner le vrai bonheur
    Des enfants de son Royaume.
    Il s’égale aux plus petits,
    Les accueille et leur sourit,
    S’émerveille et les bénit
    Pour chanter la joie des psaumes.
  - |
    Appelons le Saint-Esprit
    Qui insuffle en nous la vie,
    Nous éclaire et nous conduit
    Pour aimer le nom du Père.
    Lui l’Esprit de liberté,
    Le chemin de vérité
    De qui vient toute unité
    Comblera ceux qui espèrent.
