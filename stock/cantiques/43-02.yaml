numero: "43-02"
titre: "Vers toi j’élève mon âme"
couplets:
  - |
    Vers toi j’élève mon âme,
    Mon Dieu, mon Père, et mon Roi !
    Mon Sauveur, j’ai soif de toi,
    Nuit et jour je te réclame :
    Mon fardeau et mon péché,
    Ma faim, mon infirmité,
    Les voici, Dieu secourable,
    Espérance des coupables ;
    Toi seul, amour admirable,
    Peux porter ce qui m’accable.
  - |
    Si devant toi nous ne sommes
    Que poussière et corruption,
    Immense est ta compassion :
    Tu voulus sauver les hommes,
    Tu nous donnas Jésus-Christ,
    Tu donnes le Saint-Esprit.
    Tu fais grâce au plus rebelle
    Dès qu’il te cherche et t’appelle.
    Que pour la vie éternelle
    Tu nous gardes, Dieu fidèle !
  - |
    Père, accepte nos louanges,
    Et permets que des pécheurs
    Te bénissent dans leurs cœurs.
    Répondant aux voix des anges,
    Notre chant, nos cris de joie
    Nuit et jour montent vers toi :
    Gloire soit à Dieu le Père !
    Gloire à son Fils, notre frère !
    A l’Esprit saint de lumière,
    Dans les cieux et sur la terre !
credits: "Théodore Monod 1836-1921 / Arc-en-ciel 1988 — © Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (25)"
