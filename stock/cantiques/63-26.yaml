numero: "63-26"
titre: "Gloria"
couplets:
  - |
    Version festive
    Gloire soit à Dieu au plus haut des cieux
    et paix sur la terre aux hommes qu’il aime !
    Nous te louons, nous te bénissons,
    nous t’adorons, nous te glorifions,
    nous rendons grâce à ta puissance !
    Seigneur Dieu, Roi céleste, Dieu le tout-puissant Père !
    O Seigneur Jésus-Christ, Fils unique, le Roi de gloire !
    Agneau de Dieu, le Fils du Père !
    Toi qui enlèves le péché du monde, aie pitié de nous !
    Toi qui enlèves le péché du monde, reçois notre prière !
    Toi qui règnes à la droite du Père, aie pitié de nous !
    Car toi seul tu es saint, toi seul es le Seigneur,
    Toi seul es le Très-haut, Jésus-Christ
    avec l’Esprit saint dans la gloire de Dieu le Père.
    Amen.
    Ehre sei Gott in der Höhe und auf Erden Fried,
    den Menschen ein Wohlgefallen. Wir loben dich, wir beten dich an,
    wir preisen dich, wir sagen dir Dank um deiner grossen Ehre willen,
    Herr Gott, himmlischer König, Gott, allmächtiger Vater.
    Herr, eingeborner Sohn, Jesu Christe, du Allerhöchster,
    Herr Gott, Lamm Gottes, ein Sohn des Vaters,
    der du hinnimmst die Sünd der Welt, erbarm dich unser;
    der du hinnimmst die Sünd der Welt, nimm an unser Gebet;
    der du sitzest zu der Rechten des Vatres, nimm an unser Gebet,
    denn du bist allein heilig, du bist allein der Herr, du bist allein der Höchst,
    Jesu Christe, mit dem Heilgen Geist, in der Herrlichkeit Gott des Vaters, Amen.
