numero: "42-08"
titre: "Toi qui disposes"
couplets:
  - |
    Toi qui disposes
    De toutes choses
    Et nous les donnes chaque jour,
    Reçois, ô Père,
    Notre prière
    De reconnaissance et d’amour.
  - |
    Le don suprême
    Que ta main sème,
    C’est le pardon, c’est notre paix ;
    Et ta présence,
    Trésor immense,
    Est le plus grand de tes bienfaits.
  - |
    Que, par ta grâce,
    L’instant qui passe
    Serve à nous rapprocher de toi ;
    Et qu’à chaque heure,
    Vers ta demeure,
    Nos cœurs s’élèvent par la foi.
credits: "Berthe Sautter 1850-1919"
