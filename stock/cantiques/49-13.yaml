numero: "49-13"
titre: "Reste avec nous"
couplets:
  - |
    Reste avec nous, Seigneur, le jour décline,
    La nuit s’approche et nous menace tous ;
    Mais près de toi toute ombre s’illumine :
    Reste avec nous, Seigneur, reste avec nous !
  - |
    En toi nos cœurs ont salué leur maître,
    Et nous voulons te suivre jusqu’au bout.
    Car, par toi seul, tout homme peut renaître :
    Reste avec nous, Seigneur, reste avec nous !
  - |
    Le temps s’enfuit et sans retour s’écoule,
    Et vers la mort son cours emporte tout.
    Quand tout chancelle et sous nos yeux s’écroule;
    Reste avec nous, Seigneur, reste avec nous !
  - |
    Jour après jour, il nous faut ta présence
    Pour nous garder du mal et de ses coups.
    Seuls, loin de toi, nous sommes sans défense
    Reste avec nous, Seigneur, reste avec nous !
  - |
    Rassure-nous à notre heure dernière,
    Que notre foi soit ferme jusqu’au bout !
    Pour nous conduire au seuil de ta demeure,
    Reste avec nous, Seigneur, reste avec nous !
    Pour la Cène
  - |
    Tu nous as dit : « Ce pain, c’est mon corps même,
    Ce vin mon sang que j’ai versé pour vous ! »
    Dans ce repas, rassemble ceux qui t’aiment :
    Reste avec nous, Seigneur, reste avec nous !
    d’après Francis Chaponnière 1842-1924
    Str. 3-5 : Richard Paquier 1905-1985 / str. 6 : André Schlemmer 1890-1973
    © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)
credits: "© Auteur (168)"
traductions:
  - langue: "en"
    couplets:
      - |
        Abide with me : fast falls the eventide ;
        the darkness deepens : Lord, with me abide ;
        when other helpers fail, and comforts flee,
        help of the helpless, O abide with me.
      - |
        Swift to its close ebbs out life’s little day ;
        earth’s joys grow dim, its glories pass away ;
        change and decay in all around I see :
        you never change, O Lord, abide with me.
      - |
        I need your presence every passing hour ;
        what but your grace can foil the tempter’s power ?
        Who like yourself my guide and stay can be ?
        Through cloud and sunshine, O abide with me.
      - |
        I fear no foe, with you at hand to bless ;
        ills have no weight, and tears no bitterness ;
        where, death, your sting? where, grave, your victory ?
        I triumph still if you abide with me.
      - |
        Hold now your cross before my closing eyes,
        shine through the gloom, and point me to the skies ;
        heaven’s morning breaks, and earth’s vain shadows flee :
        in life, in death, O Lord, abide with me.
        d’après Henry Francis Lyte 1793-1847
  - langue: "de"
    couplets:
      - |
        Bleib bei mir, Herr ! Der Abend bricht herein.
        Es kommt die Nacht, die Finsternis fällt ein.
        Wo fänd ich Trost, wärst du, mein Gott, nicht hier ?
        Hilf dem, der hilflos ist : Herr, bleib bei mir !
      - |
        Wie bald verebbt der Tag, das Leben weicht,
        die Lust verglimmt, der Erdenruhm verbleicht ;
        umringt von Fall und Wandel leben wir.
        Unwandelbar bist du : Herr, bleib bei mir !
      - |
        Ich brauch zu jeder Stund dein Nahesein,
        denn des Versuchers Macht brichst du allein.
        Wer hilft mir sonst, wenn ich den Halt verlier ?
        In Licht und Dunkelheit, Herr, bleib bei mir.
      - |
        Von deiner Hand geführt, fürcht ich kein Leid,
        kein Unglück, keiner Trübsal Bitterkeit.
        Was ist der Tod, bist du mir Schild und Zier ?
        Den Stachel nimmst du ihm : Herr, bleib bei mir !
      - |
        Halt mir dein Kreuz vor, wenn mein Auge bricht ;
        im Todesdunkel bleibe du mein Licht.
        Es tagt, die Schatten fliehn, ich geh zu dir.
        Im Leben und im Tod, Herr, bleib bei mir !
        Theodor Werner 1892-1973
        © Fédération luthérienne mondiale, CP 2100, CH-1211 Genève (31)
        Español
  - langue: "xx"
    couplets:
      - |
        Señor Jesús, la luz del sol se fue ;
        La noche cierra ; tú conmigo sé
        No hay otro amparo ten pues compasión.
        Y al desvalido da onción.
      - |
        Veloz se va la vida con su afán ;
        Su gloria, sus ensueños pasarán ;
        Mudanza y muerte veo en derredor ;
        Conmigo sé, bendito Salvador.
      - |
        Siempre tu gracia yo he menester ;
        ¿ Quien otro puede al tentador vencer ?
        Tan sólo en ti mi guía encontraré :
        En sombra y sol, Señor, conmigo sé.
      - |
        Cuando mis ojos cierren a la luz,
        Se alce ante mí la gloria de tu cruz ;
        Pasen las sombras, triunfe al fin la fe.
        Jesús, conmigo en vida y muerte sé.
        T. M. Westrup
