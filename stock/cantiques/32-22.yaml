numero: "32-22"
titre: "O peuple fidèle"
couplets:
  - |
    O peuple fidèle,
    Jésus vous appelle,
    Venez, triomphants, joyeux,
    Venez en ces lieux !
    O peuple fidèle,
    Venez voir le roi des cieux !
    Que votre amour l’implore,
    Que votre foi l’adore
    Et qu’elle chante encore
    Ce don précieux !
  - |
    Là, dans l’humble étable
    Froide et misérable,
    Des bergers le grand amour
    Lui forme une cour.
    Dans cette humble étable
    Accourez à votre tour.
    Que votre amour l’implore,
    Que votre foi l’adore
    Et qu’elle chante encore
    Sa gloire en ce jour !
  - |
    Esprits de lumière,
    Messagers du Père,
    Et vous, peuples en tous lieux,
    Entonnez, joyeux :
    Paix sur cette terre
    Et gloire à Dieu dans les cieux !
    Que votre amour l’implore,
    Que votre foi l’adore
    Et qu’elle chante encore
    Ce don précieux !
    Du latin Adeste fideles
credits: "Frederick Oakeley 1802-1880"
traductions:
  - langue: "de"
    couplets:
      - |
        Herbei, o ihr Gläub’gen, fröhlich triumphieret, / o kommet, o kommet nach
        Bethlehem ! / Sehet das Kindlein, uns zum Heil geboren ! / O lasset uns anbeten,
        / o lasset uns anbeten, / o lasset uns anbeten den König !
      - |
        Du König der Ehren, Herrscher der Heerscharen, / verschmähst nicht zu ruhen
        in Marien Schoss, / Gott, wahrer Gott von Ewigkeit geboren. / O lasset uns
        anbeten, / o lasset uns anbeten, / o lasset uns anbeten den König !
      - |
        Kommt, singet dem Herren, singt, ihr Engelchöre ! / Frohlocket, frohlocket, ihr Seligen : / « Ehre sei Gott im Himmel und auf Erden ! » / O lasset uns anbeten, o lasset uns anbeten, / o lasset uns anbeten den König !
        Friedrich Heinrich Ranke 1798-1876
  - langue: "en"
    couplets:
      - |
        O come, all ye faithful, joyful and triumphant, / O come ye, O come ye to
        Bethlehem ; / come and behold him born, the King of angels ; / O come, let us
        adore him, / O come, let us adore him, / O come, let us adore him, Christ the
        Lord.
      - |
        Sing, choirs of angels, sing in exultation, / Sing all ye citizens of heaven above / Glory to God in the highest : / O come, let us adore him, / O come, let us adore him, / O come, let us adore him, Christ the Lord.
      - |
        Yea, Lord, we greet Thee, born this happy morning ; / Jesus, to thee be glory
        given, / Word of the Father, now in flesh appearing : / O come, let us adore him,
        O come, let us adore him, / O come, let us adore him, Christ the Lord.
