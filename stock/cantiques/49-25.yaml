numero: "49-25"
titre: "Dieu, je t’en supplie"
couplets:
  - |
    Dieu, je t’en supplie,
    Que ma courte vie (bis)
    Ne se perde en vain.
  - |
    Que ce jour, ô Père,
    Ne voie ma colère (bis)
    Blesser mon prochain.
  - |
    Permets qu’à cette heure
    En toi je demeure (bis)
    Libre du souci.
  - |
    Qu’à toi je m’unisse,
    Que je ne trahisse (bis)
    Qui compte sur moi.
  - |
    En toi Dieu, j’espère,
    Afin que sur terre (bis)
    Je ne vive en vain.
    Henri Künzler *1931
    © Auteur (139)
credits: "Str. 1, 2, 4, 5 : Gustav Lohmann 1876-1967 / str. 3 : Markus Jenny *1924 — © Gustav Bosse Verlag, Heinrich-Schütz-Allee 35, D-34131 Kassel (34)"
traductions:
  - langue: "de"
    couplets:
      - |
        Hilf, Herr meines Lebens / dass ich nicht vergebens,
        dass ich nicht vergebens hier auf Erden bin.
      - |
        Hilf, Herr meiner Tage, / dass ich nicht zur Plage,
        dass ich nicht zur Plage meinem Nächsten bin.
      - |
        Hilf, Herr meiner Stunden, / dass ich nicht gebunden,
        dass ich nicht gebunden an mich selber bin.
      - |
        Hilf, Herr meiner Seele, / dass ich dort nicht fehle,
        dass ich dort nicht fehle, wo ich nötig bin.
      - |
        Hilf, Herr meines Lebens, / dass ich nicht vergebens,
        dass ich nicht vergebens hier auf Erden bin.
