numero: "31-24"
titre: "Le temps est court"
couplets:
  - |
    Le temps est court, hâtons-nous, l’heure avance.
    Dans la confiance préparons nos cœurs.
    Loué soit Dieu pour la ferme assurance
    Que nous avons en Jésus le Sauveur.
  - |
    Le temps est court pour la gloire du monde,
    Tout ici-bas va passer et périr.
    Mais dans le Règne de Dieu, joie profonde,
    Christ en sa grâce saura nous réunir.
  - |
    Le temps est court pour finir notre tâche:
    A l’œuvre donc puisqu’il fait encor jour.
    Prions, luttons, travaillons sans relâche;
    Le Maître vient, fêtons tous son retour !
credits: "Mary Lemire-Lassence †1852 / Roger Trunk *1930 — © Auteur (162)"
