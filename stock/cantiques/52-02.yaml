numero: "52-02"
titre: "Oui, nous faisons partie"
couplets:
  - |
    Oui, nous faisons partie de la famille de Dieu,
    Comme héritiers du Père,
    Nous partageons nos biens, nos joies et nos fardeaux,
    Nous sommes sœurs et frères.
    Rolf Schneider (XXe)
