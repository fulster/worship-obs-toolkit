numero: "46-04"
titre: "Veille et prie et sois fervent"
couplets:
  - |
    Veille et prie et sois fervent,
    Combats sans relâche !
    Lève-toi, va de l'avant,
    Accomplis ta tâche !
    Ne crains rien,
    Le Dieu saint
    Qui nous fortifie
    Protège ta vie.
  - |
    Veille et prie et sois aimant
    Par Jésus le frère,
    Attentif et accueillant
    A toute misère !
    Son amour,
    Chaque jour,
    Est notre mesure,
    Notre nourriture.
  - |
    Veille et prie et sois vivant,
    Que l'Esprit t'éclaire !
    Il inspire à chaque instant
    La joie qui libère.
    Avec lui
    Pour appui,
    Nous pouvons renaître,
    Le jour va paraître.
credits: "Henri Künzler *1931 — © Auteur (139)"
