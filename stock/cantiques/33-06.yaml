numero: "33-06"
titre: "Jérusalem est dans la nuit"
couplets:
  - |
    Jérusalem est dans la nuit,
    Jésus dans la tristesse.
    Seigneur, c’est toi qui le conduis
    Vers l’heure qui le blesse.
    Car ton Fils seul et prosterné,
    Au jardin de Gethsémané,
    Pour nous et par nous condamné,
    Doit souffrir nos détresses.
  - |
    Jésus te supplie à genoux,
    L’horreur le jette à terre.
    Tu veux qu’il goûte comme nous
    A cette coupe amère.
    « Loin de moi, Père, loin de moi
    Ce péché qui fait mon effroi ».
    Mais il agit selon ton choix,
    Reçu dans la prière.
  - |
    Seigneur, le Christ aux Oliviers
    M’apprend comment tu m’aimes ;
    Jésus, soumis, a délié
    Mon péché de moi-même.
    Réveille-moi dès aujourd’hui,
    Car ton Fils a vaincu ma nuit,
    Face à la mort, seul, sans appui,
    Offert à son baptême.
credits: "Fadiey Lovsky *1914 — © Auteur (146a)"
