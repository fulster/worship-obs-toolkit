numero: "31-17"
titre: "O mon peuple, prends courage"
couplets:
  - |
    O mon peuple, prends courage
    Et console enfin ton cœur !
    J'ai brisé ton esclavage,
    Moi, ton Dieu libérateur.
    Le salut s'est approché,
    Tes péchés sont pardonnés,
    Et celui qui les expie
    T'a donné deux fois la vie.
  - |
    Ecoutez la voix qui crie :
    Qu'un chemin lui soit ouvert !
    Préparez la route unie
    Devant lui dans le désert !
    Que les monts soient abaissés,
    Les vallons soient effacés !
    Dans sa gloire Dieu se montre :
    Soyez prêts pour sa rencontre.
  - |
    Ce n'est pas un sacrifice
    Que demande le Seigneur,
    Mais l'amour et la justice
    Dans l'humilité du cœur.
    Aujourd'hui, voici qu'il vient !
    Il rassemblera les siens
    Pour qu'ils marchent dans ses voies,
    Pour qu'ils vivent dans sa joie.
credits: "Edmond Pidoux 1908-2004 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
