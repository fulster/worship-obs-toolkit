numero: "Ps 047A"
titre: "Frappez dans vos mains"
couplets:
  - |
    Frappez dans vos mains,
    Vous, tous les humains !
    A cris redoublés,
    Peuples assemblés,
    Exultez de joie
    Car voici le Roi.
    Redoutable et doux,
    Dieu veille sur vous ;
    Son bras souverain,
    Sa puissante main
    Étend à jamais
    Son règne de paix.
  - |
    Si Dieu a choisi
    Israël pour fils,
    S’il l’a secouru,
    S’il l’a maintenu,
    C’est pour proclamer
    Par son bien-aimé :
    « En moi s’uniront
    Toutes les nations ;
    Il faut maintenant
    Que s’ouvre tout grand
    Partout, pour toujours,
    Mon règne d’amour ! »
  - |
    Peuple racheté,
    Viens ici chanter !
    De tes oppresseurs
    Voici le vainqueur !
    Fais sonner du cor,
    Dieu est juste et fort.
    Chantez tous, chantez
    Sa grande bonté.
    Il vient rétablir,
    Il fait resplendir
    Plus haut que les cieux
    Le règne de Dieu.
