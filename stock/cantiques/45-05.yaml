numero: "45-05"
titre: "O Jésus, ma joie"
couplets:
  - |
    O Jésus, ma joie,
    Toi que Dieu m'envoie,
    Mon Sauveur, mon Roi,
    Viens, à ma prière,
    Mettre ta lumière
    Et ta vie en moi.
    De mon cœur, sois le Seigneur :
    Hors de toi, seul adorable,
    Rien n'est désirable.
  - |
    Quand le mal menace,
    O Jésus, ta grâce
    S'offre à notre foi.
    Tu nous justifies,
    Tu promets la vie
    A celui qui croit.
    Ton amour est mon recours ;
    En lui seul je me confie.
    Veille sur ma vie !
  - |
    Seul Jésus m'attire,
    Seul il peut suffire
    Pour remplir mon cœur.
    Il est ma richesse :
    Tous les biens paraissent
    Pour moi sans valeur.
    Les terreurs, ni les douleurs,
    Ne méritent qu'on les craigne,
    Puisque Jésus règne !
  - |
    Sois le seul exemple
    Que mes yeux contemplent,
    O Jésus, mon Roi !
    Donne moi de vivre
    Pour t'aimer, te suivre,
    Et mourir en toi.
    Chaque jour, que ton amour
    Me soutienne dans ma voie,
    O Jésus, ma joie !
credits: "Johann Franck 1618-1677 / Edmond Pidoux 1908-2004 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
