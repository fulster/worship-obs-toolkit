numero: "45-22"
titre: "Toi qui aimes ceux qui s'aiment"
refrain: |
  Toi qui aimes ceux qui s'aiment,
  Car tu es l'amour,
  Dans nos vies comme un poème
  Fais chanter l'amour.
couplets:
  - |
    Porter à deux bonheur et misère,
    Tournés vers le même horizon,
    Les yeux éclairés d'une même lumière,
    Chanter une même chanson.
  - |
    Fais-nous briser barrières et murailles
    Avec la violence d'aimer,
    Chasser la haine sans armes ni batailles,
    Armés seulement d'amitié.
  - |
    Seigneur, bénis ceux qui, devant leurs frères,
    Se donnent l'un à l'autre leur foi,
    Pour que leur amour, tout comme une prière,
    Toujours les rapproche de toi.
  - |
    Esprit d'amour qui réchauffes le monde,
    Fais-nous vivre de charité.
    Et pour que nos vies soient belles et fécondes,
    Enseigne-nous à tout donner.
credits: "Noël Colombier *1932 — © Groupe Fleurus-Mame, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne (33)"
