numero: "Ps 119"
titre: "Heureux celui qui suit le bon chemin"
couplets:
  - |
    Heureux celui qui suit le bon chemin,
    Qui te recherche et garde tes préceptes,
    Qui fait de toi le plus grand de ses biens !
    Je veux aimer ta volonté parfaite :
    En la suivant, je ne rougirai point,
    Face à mon Dieu, des choses que j’ai faites.
  - |
    Viens m’inspirer, Seigneur dans ta bonté !
    Fais-moi toujours marcher dans la droiture,
    Sans convoiter richesse ou vanité.
    Prends dans mon cœur la place qui t’est due !
    Je veux chercher ta seule vérité,
    Et ne jamais en détourner ma vue.
  - |
    Oui, ta parole est un flambeau pour moi ;
    C’est, à mes pieds, la lampe qui m’éclaire.
    Je m’égarais en m’éloignant de toi,
    Je suis tombé le front dans la poussière ;
    Mais maintenant j’ai retrouvé ta loi
    Pour la garder durant ma vie entière.
credits: "Théodore de Bèze 1519-1605 / Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
