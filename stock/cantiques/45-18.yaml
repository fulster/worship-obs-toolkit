numero: "45-18"
titre: "Maître des grands espaces"
refrain: |
  Maître des grands espaces,
  De la mer et du vent,
  Que l'Esprit saint qui passe
  Transforme aussi ton enfant !
couplets:
  - |
    Maître des grands espaces,
    Qui fais souffler le vent,
    Viens en moi prendre place,
    Sois mon Seigneur vivant !
  - |
    Toi qui fais des merveilles
    Dans les prés et les bois,
    Entre, Seigneur, réveille
    Ma louange et ma voix !
  - |
    Toi qui remplis la terre
    D'eau fraîche et de chaleur,
    Ranime et désaltère
    Cette soif de mon cœur !
  - |
    Toi qui laisses l'espace
    Pour servir et mourir,
    Je veux suivre ta trace,
    Je veux t'appartenir. Refr.
    Pierre Westphal (XXe)
