numero: "64-33"
titre: "Psaume 91"
source: "Antienne parlée"
couplets:
  - |
    Tu es mon Dieu, j’ai confiance en toi. (verset 2)
  - |
    Rien ne pourra nous séparer de l’amour de Dieu. (Rm 8,39)
    Antienne chantée : 61-62
    Qui s’abrite auprès du Dieu très-haut
    et se met sous la protection du Très-Grand,
    celui-là dit au Seigneur :
    « Tu es la forteresse où je trouve refuge,
    tu es mon Dieu, j’ai confiance en toi. »
    – Oui, Seigneur, tu es pour moi un refuge. –
    Si tu as fait du Très-Haut ton abri,
    aucun mal ne t’atteindra,
    aucun malheur n’approchera de chez toi.
    Car le Seigneur donnera l’ordre à ses anges
    de te garder où que tu ailles.
    Ils te porteront sur leurs mains
    pour éviter que ton pied ne heurte une pierre.
    Tu marcheras sans risque sur le lion ou la vipère,
    tu pourras piétiner le fauve ou le serpent.
    « Il est attaché à moi, dit le Seigneur,
    je le mettrai donc à l’abri ;
    je le protégerai parce qu’il sait qui je suis.
    S’il m’appelle au secours, je lui répondrai.
    Je serai à ses côtés dans la détresse,
    je le délivrerai, je lui rendrai son honneur.
    Je lui donnerai une vie longue et pleine,
    et je lui ferai voir que je suis son sauveur. »
    Gloire au Père, au Fils, au Saint-Esprit,
    maintenant, et toujours, pour les siècles des siècles !
    Amen.
    (Confiance, Carême, Soir)
