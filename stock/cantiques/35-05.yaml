numero: "35-05"
titre: "Viens, ô Saint-Esprit du Seigneur"
couplets:
  - |
    Viens, ô Saint-Esprit du Seigneur,
    Nous embraser de ton ardeur
    Et nous animer de ferveur,
    D'amour et d'espérance !
    De l'Orient à l'Occident,
    Unis le peuple des croyants
    Pour qu'il témoigne en te servant,
    Et soit rempli de ta puissance,
    Alléluia ! alléluia !
  - |
    Viens, ô Saint-Esprit tout-puissant !
    Rends notre cœur obéissant,
    Et quand le monde est menaçant,
    Relève son courage !
    Aux jours d'épreuve ou de danger,
    En nous descends pour nous garder,
    Et loin du mal nous diriger
    Selon ta force juste et sage.
    Alléluia ! alléluia !
credits: "Roger Barilier 1914-2005 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
