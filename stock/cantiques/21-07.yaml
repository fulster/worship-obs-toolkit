numero: "21-07"
titre: "Qu’aujourd’hui toute la terre"
couplets:
  - |
    Qu’aujourd’hui toute la terre
    S’égaie au nom du Seigneur ;
    Qu’à Dieu monte sa prière,
    Par Jésus le Rédempteur.
  - |
    Qu’aujourd’hui son Evangile
    En tous lieux soit publié ;
    Qu’à porter son joug facile
    Tout pécheur soit convié.
  - |
    Qu’aujourd’hui beaucoup d’esclaves
    De l’erreur et de la mort
    Soient tirés de leurs entraves
    Par la grâce du Dieu fort.
  - |
    Qu’aujourd’hui, remplis de joie,
    En écoutant son appel,
    Bien des cœurs trouvent la voie
    Qui va de la terre au ciel.
  - |
    Qu’aujourd’hui la paix descende,
    Seigneur, sur tous tes enfants,
    Et que partout l’on entende
    Leurs hymnes reconnaissants.
    César Malan 1781-1864
credits: "Jonathan Friedrich Bahnmaier 1774-1841"
traductions:
  - langue: "de"
    couplets:
      - |
        Walte, walte nah und fern, / allgewaltig Wort des Herrn, /
        wo nur seiner Allmacht Ruf / Menschen für den Himmel schuf.
      - |
        Wort vom Vater, der die Welt / schuf und in den Armen hält /
        und der Sünder Trost und Rat / zu uns hergesendet hat;
      - |
        Wort von des Erlösers Huld, / der der Erde schwere /
        durch des heilgen Todes Tat / ewig weggenommen hat;
      - |
        Kräftig Wort von Gottes Geist, / der den Weg zum Himmel weist /
        und durch seine heilge Kraft / Wollen und Vollbringen schafft ;
      - |
        Wort des Lebens, stark und rein, / alle Völker harren dein; /
        walte fort, bis aus der Nacht / alle Welt zum Tag erwacht.
