numero: "Ps 113B"
titre: "Louez Dieu, vous ses serviteurs"
couplets:
  - |
    Louez Dieu, vous ses serviteurs,
    Louez Dieu, votre bienfaiteur,
    Car sa grandeur est sans mesure !
    Mais s’il demeure au plus haut lieu,
    Il veut bien abaisser les yeux
    Sur l’homme aussi, sa créature.
  - |
    Quand il voit l’indigent souffrir,
    Il s’émeut, prompt à compatir :
    De la misère il le retire.
    S’il voit le faible méprisé,
    Il prend plaisir à le hausser
    Parmi les grands que l’on admire.
  - |
    En tous lieux, en tous temps aussi,
    De l’aurore et jusqu’à la nuit,
    Louez, louez ce Dieu de gloire !
    Qui pourrait donc lui ressembler,
    Ou, de ses yeux, le contempler ?
    Il faut l’aimer, il faut le croire !
