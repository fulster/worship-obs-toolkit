numero: "41-33"
titre: "Seigneur, grand Dieu"
couplets:
  - |
    Seigneur, grand Dieu, ton pouvoir est immense ;
    Tu dis : du néant surgit l’univers.
    Rien ne subsiste que par ta puissance,
    Soleils de flamme et limite des mers.
    Le firmament et ses millions d’étoiles,
    Tout t’obéit au plus profond des cieux.
    Mon cœur s’émeut lorsque tu lui dévoiles
    Ta majesté, ton pouvoir glorieux.
  - |
    Seigneur, grand Dieu, profonde est ta sagesse,
    Qui se révèle dans la création.
    Tu fais de nous, malgré notre faiblesse,
    Par ton Esprit tes enfants d’adoption.
    Le mont superbe et le roseau qui plie
    Font éclater ta gloire, ô Dieu des cieux !
    C’est ébloui qu’humblement je te prie,
    Que je bénis ton savoir merveilleux.
  - |
    Seigneur, mon Dieu, ton amour est sublime ;
    Ton Fils vient ici-bas le révéler.
    Tu n’éteins pas le lumignon infime
    Qui fume encore et ne peut plus brûler.
    Mon fol orgueil me voilait ta tendresse :
    Tu l’as brisé sur la croix, mon Sauveur !
    Brûlant d’amour, je proclame sans cesse
    Ton sacrifice immense, ô Rédempteur !
credits: "Marguerite Wargenau-Saillens 1879-1951 / Répertoire commun protestant francophone 1999 — © Institut Biblique, Grand’Rue 39, F-94130 Nogent-sur-Marne (37)"
