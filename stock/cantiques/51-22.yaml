numero: "51-22"
titre: "Chantez, chantez au Seigneur"
refrain: |
  Alléluia, alléluia ! (bis)
  Alléluia, alléluia, alléluia !
couplets:
  - |
    Chantez, chantez au Seigneur de tout votre cœur, / Vous tous, habitants de la terre ! (bis)
  - |
    Frappez, frappez dans vos mains, éclatez de joie / Au rythme du chant de vos frères ! (bis)
  - |
    Donnez, donnez vos talents pour votre Seigneur ! / A lui tous vos chants, vos prières ! (bis)
  - |
    Marchez, marchez dans ses pas, suivez le Seigneur, / Vous les enfants de lumière ! (bis)
    Oliver Arnéra (XXe)
credits: "© Auteur (101b)"
