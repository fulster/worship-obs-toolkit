numero: "44-14"
titre: "Oh ! prends mon âme"
refrain: |
  Source de vie,
  De paix, d'amour,
  Vers toi je crie
  La nuit, le jour.
  Entends ma plainte,
  Sois mon soutien.
  Calme ma crainte,
  Toi, mon seul bien !
couplets:
  - |
    Oh ! prends mon âme,
    Prends-la, Seigneur,
    Et que ta flamme
    Brûle en mon cœur.
    Que tout mon être
    Vibre pour toi.
    Sois seul mon maître,
    O divin roi !
  - |
    Du mal perfide,
    Oh ! garde-moi.
    Viens, sois mon guide,
    Chef de ma foi.
    Quand la nuit voile
    Tout à mes yeux,
    Sois mon étoile,
    Brille des cieux !
  - |
    Voici l'aurore
    D'un jour nouveau.
    Le ciel se dore
    De feux plus beaux.
    Jésus s'apprête ;
    Pourquoi gémir ?
    Levons nos têtes :
    Il va venir !
credits: "Hector Arnéra 1890-1972 — © Auteur (101a)"
