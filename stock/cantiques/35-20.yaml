numero: "35-20"
titre: "Dieu qui nous appelles à vivre"
couplets:
  - |
    Dieu, qui nous appelles à vivre
    Aux combats de la liberté,
    Pour briser nos chaînes,
    Fais en nous ce que tu dis !
    Pour briser nos chaînes,
    Fais jaillir en nous l'Esprit !
  - |
    Dieu, qui nous apprends à vivre
    Aux chemins de la vérité,
    Pour lever le jour,
    Fais en nous ce que tu dis !
    Pour lever le jour,
    Fais jaillir en nous l'Esprit !
  - |
    Dieu, qui nous invite à suivre
    Le soleil du Ressuscité,
    Pour passer la mort,
    Fais en nous ce que tu dis !
    Pour passer la mort,
    Fais jaillir en nous l'Esprit !
  - |
    Dieu, qui as ouvert le livre
    Où s'écrit notre dignité,
    Pour tenir debout,
    Fais en nous ce que tu dis !
    Pour tenir debout,
    Fais jaillir en nous l'Esprit !
credits: "Michel Scouarnec *1934 — © Studio SM, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne"
