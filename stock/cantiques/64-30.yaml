numero: "64-30"
titre: "Psaume 51"
source: "Antienne parlée"
couplets:
  - |
    En ta tendresse efface mon péché ! (verset 3)
  - |
    Rends-moi la joie de ton salut ! (verset 14)
  - |
    Si notre cœur nous condamne,
    Dieu est plus grand que notre cœur. (1 Jn 3,20)
    Antienne chantée : 64-05
    Pitié pour moi, ô Dieu, dans ta bonté,
    en ta tendresse efface mon péché !
    Lave-moi tout entier de mon mal
    et purifie-moi de ma faute !
    O Dieu, je reconnais ma faute,
    mon péché est devant moi sans relâche.
    Contre toi, contre toi seul, j’ai péché.
    Ce qui est mal à tes yeux, je l’ai fait.
    Purifie-moi et je serai purifié,
    lave-moi, et je serai plus blanc que neige.
    Détourne de mes péchés ton visage,
    toutes mes fautes, efface-les !
    O Dieu, crée en moi un cœur pur,
    restaure en moi un esprit ferme !
    Ne me rejette pas loin de ta face,
    et ne me retire pas ton Esprit saint !
    Rends-moi la joie de ton salut,
    affermis en moi un esprit généreux !
    Seigneur, ouvre mes lèvres,
    et ma bouche publiera ta louange.
    Gloire au Père, au Fils, au Saint-Esprit,
    maintenant, et toujours,
    pour les siècles des siècles !
    Amen.
    (Repentance, Pardon, Carême, Baptême)
