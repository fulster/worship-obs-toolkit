numero: "41-26"
titre: "Grand Dieu, nous te bénissons"
source: "Te Deum de l’Eglise ancienne"
couplets:
  - |
    Grand Dieu, nous te bénissons,
    Nous célébrons tes louanges !
    Eternel, nous t’exaltons,
    De concert avec les anges,
    Et prosternés devant toi,
    Nous t’adorons, ô grand Roi !
  - |
    Les saints et les bienheureux,
    Les trônes et les puissances,
    Tous les êtres dans les cieux
    Disent ta magnificence,
    Proclamant dans leurs concerts
    Le grand Dieu de l’univers.
  - |
    Saint, saint, saint est l’Eternel,
    Le Seigneur, Dieu des armées !
    Son pouvoir est immortel ;
    Ses œuvres, partout semées,
    Font éclater sa grandeur,
    Sa majesté sa splendeur.
  - |
    Ton Eglise dans les cieux
    A la gloire parvenue
    Et ton Eglise en tous lieux
    Sur la terre répandue
    Célèbrent d’un même cœur
    Ta louange, ô Rédempteur.
  - |
    Tu vins, innocent Agneau
    Subir une mort cruelle ;
    Mais, triomphant du tombeau
    Par ta puissance éternelle,
    Tu détruisis tout l’effort
    De l’enfer et de la mort.
  - |
    Sauve ton peuple, Seigneur,
    Et bénis ton héritage !
    Que ta gloire et ta splendeur
    Soient à jamais son partage ;
    Conduis-le par ton amour
    Jusqu’au céleste séjour!
  - |
    Puisse ton règne de paix
    S’étendre sur tout le monde !
    Dès maintenant, à jamais,
    Que, sur la terre et sur l’onde,
    Tous les peuples se saluent
    Au nom du Seigneur Jésus !
  - |
    Gloire soit au Saint-Esprit !
    Gloire soit à Dieu le Père !
    Gloire soit à Jésus-Christ,
    Notre Sauveur, notre frère !
    Son immense charité
    Dure pour l’éternité.
    d’après Henri-Louis Empaytaz 1790-1853
credits: "d’après Hélène Swarth 1859-1941"
traductions:
  - langue: "en"
    couplets:
      - |
        Holy God, we praise your name ;
        Lord of all, we bow before you.
        All on earth your sceptre claim,
        All in heav’n above adore you.
        Infinite your vast domain,
        Everlasting is your reign.
      - |
        Hark ! The glad celestial hymn
        Angel choirs above are raising ;
        Cherubim and seraphim,
        In unceasing chorus praising,
        Fill the heav’ns with sweet accord :
        Holy, holy, holy Lord !
      - |
        Lo, the apostolic train
        Join your sacred name to hallow ;
        Prophets swell the glad refrain,
        And the white-robed martyrs follow
        And from morn to set of sun
        Through the Church the song goes on.
      - |
        Holy Father, holy Son,
        Holy Spirit, three we name you,
        Though in essence only one ;
        Undivided God we claim you
        And, adoring bend the knee
        While we own the mystery.
        Clarence A. Walworth 1820-1900
  - langue: "de"
    couplets:
      - |
        Grosser Gott, wir loben dich,
        Herr, wir preisen deine Stärke.
        Vor dir neigt die Erde sich
        und bewundert deine Werke.
        Wie du warst vor aller Zeit,
        so bleibst du in Ewigkeit.
      - |
        Herr, steh deinen Dienern bei,
        welche dich in Demut bitten.
        Kauftest durch dein Blut uns frei,
        hast den Tod für uns gelitten ;
        nimm uns nach vollbrachtem Lauf
        zu dir in den Himmel auf.
      - |
        Sieh dein Volk in Gnaden an ;
        hilf uns, segne, Herr, dein Erbe ;
        leit es auf der rechten Bahn,
        dass der Feind es nicht verderbe.
        Führe es durch diese Zeit,
        nimm es auf in Ewigkeit.
      - |
        Dich, Gott Vater auf dem Thron,
        Loben Grosse, loben Kleine.
        Deinem eingebornen Sohn
        singt die heilige Gemeinde,
        und sie ehrt den Heilgen Geist,
        der uns seinen Trost erweist.
        Ignaz Franz 1719-1790
        Nederlands
  - langue: "xx"
    couplets:
      - |
        Grote God, wij loven u,
        Heer, o sterkste aller sterken.
        Heel de wereld buigt voor u
        En bewondert uwe werken.
        Die Gij waart te allen tijd,
        Blijft Gij ook in eeuwigheid.
      - |
        Alles wat u prijzen kan,
        U, de Eeuwge, Ongeziene,
        Looft uw liefd’ en zingt ervan.
        Alle englen, die u dienen
        Roepen u nooit levensmoe
        «Heilig, heilig, heilig» toe.
      - |
        Heer, ontferm u over ons,
        Open uwe Vaderarmen,
        Stort uw zegen over ons,
        Neem ons op in uw erbarmen.
        Eeuwig blijft uw trouw bestaan
        Laat ons niet verloren gaan.
