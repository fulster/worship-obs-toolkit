numero: "22-09"
titre: "La Parole est à Dieu"
couplets:
  - |
    La Parole est à Dieu.
    Dès la première aurore
    Triomphe la lumière,
    Dieu nous parle aujourd’hui.
  - |
    La Parole est à Dieu.
    Avant notre naissance,
    Déjà il nous appelle,
    Son appel est reçu.
  - |
    Dieu dit le dernier mot.
    La Parole première
    Sera partout présente
    Jusqu’à la fin des temps.
  - |
    Dieu notre créateur
    Accomplira l’histoire.
    Sa Parole est vivante,
    Le prix de notre vie.
credits: "Jan Wit 1914-1980 / Frère Pierre-Etienne (*1922) — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04"
