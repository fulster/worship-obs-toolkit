numero: "51-02"
titre: "Jeunes et vieux"
couplets:
  - |
    Jeunes et vieux se réjouiront ensemble,
    Les jeunes filles danseront de joie.
    Laï, laï, laï, laï...
    Je changerai leur deuil en allégresse
    Et je les consolerai.
    Je leur donnerai la joie au lieu du chagrin, / Je leur donnerai la joie. (bis)
credits: "d’après Jr 31,13 / Merla Watson *1929 — © CCF, utilisé avec permission, LTC Créteil (22)"
