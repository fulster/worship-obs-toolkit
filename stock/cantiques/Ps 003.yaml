numero: "Ps 003"
titre: "Seigneur, que d'ennemis"
couplets:
  - |
    Seigneur, que d'ennemis
    Me raillent de leurs cris :
    Ton Dieu sera ta perte.
    Mais toi, mon bouclier,
    Quand tu me vois plier,
    Tu relèves ma tête.
    Vers toi quand j'ai prié,
    Vers toi quand j'ai crié,
    Tu as reçu ma plainte.
    Ta voix m'a répondu,
    Ton bras m'a secouru
    De ta demeure sainte.
  - |
    Je me couche sans peur,
    Je m'endors sans frayeur,
    Sans crainte je m'éveille ;
    Toi qui soutiens ma foi
    Tu restes près de moi
    Et jamais ne sommeilles.
    S'ils viennent par milliers
    Nuit et jour m'assiéger,
    Dieu les frappe au visage.
    Le salut vient de lui
    Et son amour conduit
    Son peuple d'âge en âge.
credits: "Clément Marot 1496-1544 / Roger Chapal 1912-1997 — © Fédération Musique et Chant de la Réforme, c/o Olivétan, BP 4464, F-69241 LYON Cedex 04"
