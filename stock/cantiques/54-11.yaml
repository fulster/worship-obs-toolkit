numero: "54-11"
titre: "Le Seigneur nous invite"
refrain: |
  Le Seigneur nous invite, le Seigneur nous attend ;
  Allons, la table est prête, partager ce repas !
couplets:
  - |
    La veille de sa mort, le Seigneur prit du pain,
    Il le rompit et dit : « Ceci est mon corps. »
  - |
    A la fin du repas, il prit aussi du vin ;
    Il rendit grâce et dit : « Ceci est mon sang. »
  - |
    Quand nous mangeons ce pain, quand nous buvons ce vin
    Nous célébrons sa mort, sa résurrection.
credits: "Jean-Jacques Delorme *1955 — © Auteur (120)"
