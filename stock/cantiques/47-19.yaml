numero: "47-19"
titre: "Tu es là, au cœur de nos vies"
refrain: |
  Tu es là, au cœur de nos vies,
  Et c'est toi qui nous fais vivre ;
  Tu es là au cœur de nos vies,
  Bien vivant, ô Jésus-Christ !
couplets:
  - |
    Dans le secret de nos tendresses,
    Tu es là,
    Dans le matin de nos promesses,
    Tu es là.
  - |
    Dans nos cœurs tout remplis d'orages,
    Tu es là,
    Dans tous les ciels de nos voyages,
    Tu es là.
  - |
    Au plein milieu de nos tempêtes,
    Tu es là,
    Dans la musique de nos fêtes,
    Tu es là.
credits: "Raymond Fau *1937 — © Studio SM, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne"
