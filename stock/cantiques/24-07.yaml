numero: "24-07"
titre: "De toi, Seigneur, nous vient le don"
couplets:
  - |
    De toi, Seigneur, nous vient le don
    Du repas de la fête.
    En ce désert où nous marchons,
    Toujours tu nous l’apprêtes.
    Richesse en notre pauvreté,
    Réponse à notre attente,
    Ta Pâque nous rassemble.
  - |
    Ce feu que tu vins allumer
    Enflamme notre monde,
    Foyer visible d’unité,
    Bonté qui nous inonde.
    L’amour bâtit la communion
    Sur cette unique pierre
    Pour notre terre entière.
  - |
    Tu as suivi nos durs chemins
    De souffrance en souffrance.
    Sur le visage des humains
    Affleure ta présence.
    Que le courage de la foi,
    Puisque par toi nous sommes,
    Nous porte vers tout homme !
