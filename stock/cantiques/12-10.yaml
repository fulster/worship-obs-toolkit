numero: "12-10"
titre: "Avec des cris de joie"
source: "Psaume 63"
refrain: |
  Avec des cris de joie,
  Je chanterai pour toi,
  J’élèverai mes mains,
  Et te célèbrerai.
couplets:
  - |
    O Dieu, tu es mon Dieu,
    Dès l’aube je te cherche,
    Mon âme a soif de toi,
    Terre aride et desséchée.
  - |
    Dans ta maison j’ai vu
    Ta gloire et ta puissance,
    Je dirai ta bonté
    Bien meilleure que la vie.
  - |
    La nuit je pense à toi,
    Des heures je médite ;
    Tu viens à mon secours,
    Ta main droite me soutient. Refr.
    Equipe Timothée
credits: "© Auteur (122a)"
