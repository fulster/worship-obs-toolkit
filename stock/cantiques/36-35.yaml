numero: "36-35"
titre: "Sur les routes de l'Alliance"
refrain: |
  Sur les routes de l'Alliance,
  Ta lumière nous conduit.
  Nous marchons pleins d'espérance ;
  Tu nous mènes vers la vie. (bis)
couplets:
  - |
    Dieu printemps du monde,
    Par amour tu nous choisis.
    Fais grandir ton peuple ;
    Nous vivrons pour te servir.
    Bienheureux qui sait répondre
    A l'appel de ton Esprit !
  - |
    Dieu semeur d'étoiles,
    Tu éclaires notre nuit.
    Fais grandir ton peuple ;
    Nous vivrons pour te servir.
    Bienheureux qui ose croire
    Au soleil de ton pays !
  - |
    Dieu berger fidèle,
    Tu nous dis quel est ton nom.
    Fais grandir ton peuple ;
    Nous vivrons pour te servir.
    Bienheureux celui qui cherche ;
    Tu lui ouvres ta maison !
  - |
    Dieu Sauveur des hommes,
    Tu nous donnes Jésus-Christ.
    Fais grandir ton peuple ;
    Nous vivrons pour te servir.
    Bienheureux le cœur de pauvre ;
    Son trésor est infini !
  - |
    Dieu promesse offerte,
    Ton alliance est notre joie.
    Fais grandir ton peuple ;
    Nous vivrons pour te servir.
    Bienheureux dans ta lumière
    Les marcheurs qui gardent foi !
