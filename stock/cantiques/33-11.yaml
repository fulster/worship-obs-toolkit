credits: "Johann Gottfried Herrmann 1717-1791"
traductions:
  - langue: "de"
    couplets:
      - |
        Herzliebster Jesu, was hast du verbrochen, / dass man ein solch scharf Urteil
        hat gesprochen ? / Was ist die Schuld, in was für Missetaten / bist du geraten?
      - |
        Was ist doch wohl die Ursach solcher Plagen ? / Ach, meine Sünden haben dich geschlagen ; / ich, mein Herr Jesu, habe dies verschuldet, / was du erduldet.
      - |
        Wie wunderbarlich ist doch diese Strafe ! / Der gute Hirte leidet für die Schafe, die Schuld bezahlt der Herre, der Gerechte, / für seine Knechte.
      - |
        Wann, o Herr Jesu, dort vor deinem Throne / wird stehn auf meinem Haupt die Ehrenkrone, / da will ich dir, wann alles wird wohl klingen, / Lob und Dank singen.
