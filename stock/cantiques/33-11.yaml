numero: "33-11"
titre: "Pour quel péché"
couplets:
  - |
    Pour quel péché, Jésus, pour quelle offense
    A-t-on sur toi prononcé la sentence ?
    Qu’as-tu donc fait, innocente victime ?
    Quel est ton crime ?
  - |
    Qui peut t’avoir attiré ce supplice ?
    C’est nous, Seigneur, oui, c’est notre injustice :
    De ces tourments où ton amour t’expose,
    Nous sommes cause.
  - |
    Pour nous sauver, ô mystère adorable,
    Toi, l’innocent, tu meurs pour les coupables ;
    Tu as vécu de notre vie humaine,
    Toute la peine.
  - |
    Où trouverais-je un cœur, dans ma détresse,
    Semblable au tien, plein d’amour, de tendresse ?
    Car en toi seul j’ai mis ma confiance,
    Mon espérance.
    d’après Jean-Jacques Hosemann 1805-1886
