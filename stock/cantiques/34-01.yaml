numero: "34-01"
titre: "Le Sauveur est ressuscité"
couplets:
  - |
    Le Sauveur est ressuscité,
    Alléluia, alléluia !
    Qu’en lui s’égaie l’humanité,
    Alléluia, alléluia !
  - |
    Si le tombeau l’avait gardé,
    Alléluia, alléluia !
    Qui donc pourrait encor chanter ?
    Alléluia, alléluia !
  - |
    Il est vivant ce beau matin,
    Alléluia, alléluia !
    Criez de joie, frappez des mains,
    Alléluia, alléluia !
  - |
    Sont venues trois pour le pleurer,
    Alléluia, alléluia !
    Vers le tombeau pour l’embaumer,
    Alléluia, alléluia !
  - |
    Alors un ange est apparu,
    Alléluia, alléluia !
    Pour éveiller l’espoir perdu,
    Alléluia, alléluia !
    L’ange
  - |
    Pourquoi chercher parmi les morts,
    Alléluia, alléluia !
    Celui qui a vaincu la mort,
    Alléluia, alléluia !
    Marie
  - |
    Dis-moi, Seigneur, où tu l’as mis,
    Alléluia, alléluia !
    Je veux encor pleurer sur lui,
    Alléluia, alléluia !
    L’ange
  - |
    Ne pleure plus sur un absent,
    Alléluia, alléluia !
    Il est le Christ, il est vivant,
    Alléluia, alléluia !
  - |
    Annonce vite à tes amis,
    Alléluia, alléluia !
    Que tout pouvoir lui est remis,
    Alléluia, alléluia !
    Marie, au peuple
  - |
    Il est vivant, notre Seigneur,
    Alléluia, alléluia !
    Chantons joyeux en son honneur,
    Alléluia, alléluia !
    Tous
  - |
    Louange soit à Jésus-Christ
    Alléluia, alléluia !
    Au Père, au Fils, au Saint-Esprit,
    Alléluia, alléluia !
