numero: "32-23"
titre: "O nuit bienveillante"
couplets:
  - |
    O nuit bienveillante,
    O nuit rassurante,
    Douce nuit du premier Noël !
    Jésus, ô mystère,
    Naît sur cette terre.
    Chantons, c’est le temps de l’Eternel !
  - |
    O nuit bienveillante,
    O nuit rassurante,
    Douce nuit du premier Noël !
    Jésus, faible et pauvre,
    Nous aime et nous sauve.
    Chantons, c’est le temps de l’Eternel !
  - |
    O nuit bienveillante,
    O nuit rassurante,
    Douce nuit du premier Noël !
    Jésus nous délivre,
    Jésus nous fait vivre,
    Chantons, c’est le temps de l’Eternel !
  - |
    O nuit bienveillante,
    O nuit rassurante,
    Douce nuit du premier Noël !
    Jésus, roi des anges,
    A toi nos louanges,
    Chantons, c’est le temps de l’Eternel !
    Auteur inconnu
credits: "Str. 1 : Johannes Daniel Falk 1768-1826 / str. 2-3 : Heinrich Holzschuher 1798-1847"
traductions:
  - langue: "de"
    couplets:
      - |
        O du fröhliche, o du selige, / gnadenbringende Weihnachtszeit ! / Welt ging
        verloren, Christ ist geboren : / Freue, freue dich, o Christenheit !
      - |
        O du fröhliche, o du selige, / gnadenbringende Weihnachtszeit ! / Christ ist
        erschienen, uns zu versühnen : / Freue, freue dich, o Christenheit!
      - |
        O du fröhliche, o du selige, / gnadenbringende Weihnachtszeit ! / Himmlische
        Heere jauchzen dir Ehre : / Freue, freue dich, o Christenheit !
