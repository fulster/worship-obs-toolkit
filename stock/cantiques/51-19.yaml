numero: "51-19"
titre: "Béni soit le Seigneur"
refrain: |
  Nous te louons, Seigneur, de tout notre cœur. / Nous nous tournons vers toi, tu es notre joie. (bis)
couplets:
  - |
    Béni soit le Seigneur, / Car son amour est grand. / Béni soit le Seigneur, / Car il est puissant.
  - |
    Béni soit le Seigneur / Pour sa fidélité ! / Béni soit le Seigneur / Pour sa sainteté !
