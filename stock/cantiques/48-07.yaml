numero: "48-07"
titre: "Mon Dieu, plus près de toi"
source: "Nearer, my God, to Thee"
couplets:
  - |
    Mon Dieu, plus près de toi,
    Plus près de toi !
    C’est le cri de ma foi :
    Plus près de toi !
    Dans le jour où l’épreuve
    Déborde comme un fleuve,
    Garde-moi près de toi,
    Plus près de toi !
  - |
    Plus près de toi, Seigneur,
    Plus près de toi !
    Tiens-moi, dans la douleur,
    Tout près de toi !
    Alors que la souffrance
    Fait son œuvre en silence,
    Toujours plus près de toi,
    Plus près de toi !
  - |
    Plus près de toi, toujours,
    Plus près de toi !
    Donne-moi ton secours,
    Soutiens ma foi !
    Que Satan se déchaîne,
    Ton amour me ramène
    Toujours plus près de toi,
    Plus près de toi !
  - |
    Mon Dieu, plus près de toi,
    Dans le désert
    J’ai vu, plus près de toi,
    Ton ciel ouvert.
    Pèlerin, bon courage !
    Ton chant brave l’orage.
    Mon Dieu, plus près de toi,
    Plus près de toi !
    Charles Chatelanat 1833-1907
credits: "Erhardt Friedrich Wunderlich 1830-1895"
traductions:
  - langue: "en"
    couplets:
      - |
        Nearer, my God to Thee,
        nearer to Thee !
        E’en though it be a cross
        that raiseth me,
        still all my song shall be,
        nearer my God to Thee.
        Nearer, my God to Thee,
        nearer to Thee !
      - |
        Though like the wanderer,
        the sun gone down,
        darkness be over me,
        my rest a stone,
        yet in my dreams I’d be
        nearer my God to Thee.
        Nearer, my God to Thee,
        nearer to Thee !
      - |
        There let the way appear,
        steps unto heav’n ;
        all that Thou sendest me,
        in mercy given ;
        angels to beckon me
        nearer, my God, to Thee.
        Nearer, my God to Thee,
        nearer to Thee !
      - |
        Then, with my waking thoughts
        bright with Thy praise,
        Out of my stony griefs
        Bethel I’ll raise ;
        so by my woes to be
        nearer, my God to Thee.
        Nearer, my God to Thee,
        nearer to Thee !
      - |
        Or, if on joyful wing
        cleaving the sky,
        sun, moon and stars forgot,
        upward I’ll fly,
        still all my song shall be,
        nearer, my God, to Thee.
        Nearer, my God to Thee,
        nearer to Thee !
        Sarah F. Adams 1805-1848
  - langue: "de"
    couplets:
      - |
        Näher, mein Gott zu dir,
        näher zu dir !
        Drückt mich auch Kummer hier,
        drohet man mir,
        soll doch trotz Kreuz und Pein
        dies meine Losung sein :
        Näher mein Gott zu dir,
        näher zu dir !
      - |
        Bricht mir wie Jakob dort
        Nacht auch herein,
        find’ ich zum Ruheort
        nur einen Stein,
        ist selbst im Traume hier
        mein Sehnen für und für :
        Näher mein Gott zu dir,
        näher zu dir !
      - |
        Geht auch die schmale Bahn
        aufwärts gar steil,
        führt sie doch himmelan
        zu meinem Heil.
        Engel so licht und schön
        winken aus sel’gen Höhn.
        Näher mein Gott zu dir,
        näher zu dir !
      - |
        Ist dann die Nacht vorbei,
        leuchtet die Sonn,
        weih’ ich mich dir aufs neu
        vor deinem Thron,
        baue mein Bethel dir
        und jauchz’ mit Freuden hier :
        Näher mein Gott zu dir,
        näher zu dir !
      - |
        Ist mir auch ganz verhüllt
        dein Weg allhier,
        wird nur mein Wunsch erfüllt :
        Näher zu dir !
        Schliesst dann mein Pilgerlauf,
        schwing’ ich mich freudig auf.
        Näher mein Gott zu dir,
        näher zu dir !
