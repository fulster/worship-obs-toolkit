numero: "12-16"
titre: "Joie pour des sœurs et des frères"
source: "Psaume 133"
refrain: |
  Joie pour des sœurs et des frères
  De demeurer ensemble
  Dans l’unité, la prière,
  Par l’Esprit qui rassemble.
couplets:
  - |
    C’est comme une onction
    Qui descend sur la tête,
    La barb’ d’Aaron
    Et son habit de prêtre.
  - |
    C’est comme l’Hermon
    Que baigne la rosée,
    Les monts de Sion
    Buvant la fraîche ondée.
  - |
    C’est là que descend
    Sur son peuple qui prie
    Le souffle puissant
    Du Saint-Esprit de vie.
credits: "Christian Glardon (*1938) — © 129"
