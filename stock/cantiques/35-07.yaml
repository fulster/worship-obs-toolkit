numero: "35-07"
titre: "Saint-Esprit, Dieu de lumière"
refrain: |
  Fais-nous vivre en ta présence,
  Revêts-nous de ta puissance,
  Et baptise-nous de feu,
  Esprit saint, Esprit de Dieu !
couplets:
  - |
    Saint-Esprit, Dieu de lumière,
    Viens resplendir dans nos cœurs !
    Nous serons avec nos frères
    Les témoins du seul Sauveur.
  - |
    Viens, Esprit de la promesse,
    Défenseur venu d'en haut,
    Sois vainqueur de nos faiblesses
    Donne-nous des cœurs nouveaux !
  - |
    Saint-Esprit d'obéissance,
    Fais de nous des serviteurs
    Engagés sans défaillance
    Dans les œuvres du Seigneur !
  - |
    Forme-nous pour le service
    Du divin Libérateur ;
    A ses pieds en sacrifice,
    Nous apportons notre cœur.
  - |
    Esprit de vie et de gloire,
    Conduis-nous de jour en jour
    Et de victoire en victoire
    Vers le céleste séjour.
credits: "d'après Edmond-Louis Budry 1854-1932"
