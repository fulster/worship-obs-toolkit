numero: "55-07"
titre: "Grain de blé"
couplets:
  - |
    Grain de blé qui tombes en terre,
    Si tu ne meurs pas,
    Tu resteras solitaire,
    Ne germeras pas.
  - |
    Qui à Jésus s’abandonne
    Trouve la vraie vie.
    Heureux l’homme qui se donne :
    Il sera béni.
    Communauté du Chemin Neuf
