numero: "Ps 047B"
titre: "B. Chantez le Dieu saint !"
couplets:
  - |
    Chantez le Dieu saint !
    Frappez dans vos mains !
    Venez l’acclamer,
    Peuples rassemblés,
    Vous tous, et partout,
    Réjouissez-vous !
    C’est le Dieu vivant,
    C’est le Tout-Puissant !
    Le grand roi qui fait
    Sentir en effet
    Sa force au travers
    De tout l’univers.
  - |
    Il nous a fait voir
    Quel est son pouvoir :
    Tout doit s’incliner
    Sous sa volonté,
    Et ses ennemis
    Lui seront soumis.
    Mais pour ses élus,
    Il a maintenu
    La part de ses biens
    Qu’il réserve aux siens,
    A son peuple aimé,
    A son héritier.
  - |
    Ce Dieu, le voici
    Qui se montre ici.
    Jouez et chantez,
    Dites ses bontés :
    Sur son trône saint,
    Il veut être craint.
    C’est lui le vrai Dieu
    Qui règne en tous lieux,
    Le Dieu tout-puissant
    Dont la main s’étend
    Comme un bouclier
    Sur ce monde entier.
credits: "Théodore de Bèze 1519-1605 / Psaumes, Cantiques et textes 1976 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
