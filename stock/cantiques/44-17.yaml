numero: "44-17"
titre: "Seigneur, par la clarté"
refrain: |
  Brille, ô Jésus, couvre ce pays de ta gloire !
  Brûle, Esprit saint, embrase nos cœurs !
  Coule en torrents, de ta grâce remplis les nations !
  Parle, Seigneur, que la lumière soit !
couplets:
  - |
    Seigneur, par la clarté de ton amour
    Chasse l'obscurité qui nous entoure !
    Toi, Jésus, la lumière qui nous éclaire,
    Vérité qui nous guide et qui nous libère,
    Brille sur nous, brille sur nous !
  - |
    Seigneur, tu me conduis en ta présence,
    De la nuit vers l'éclat de ta puissance.
    Par ton sang, je prends part à ta sainteté ;
    Sonde-moi, mes ténèbres, consume-les !
    Brille sur moi, brille sur moi !
  - |
    Et quand nous contemplons ta royauté,
    Nos visages reflètent ta beauté.
    Transformée sans cesse, de gloire en gloire,
    Que sans fin notre vie dise ton histoire !
    Brille sur nous, brille sur nous !
credits: "LTC / Répertoire commun protestant francophone 2002 — © Make Way Music (49)"
