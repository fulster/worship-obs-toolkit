numero: "Ps 098"
titre: "Entonnons un nouveau cantique"
couplets:
  - |
    Entonnons un nouveau cantique
    Pour célébrer le Dieu sauveur ;
    Ce qu'il a fait est magnifique,
    Levant pour nous un bras vainqueur.
    Le salut de Dieu se révèle
    Et tous les yeux l'ont reconnu ;
    De proche en proche la nouvelle
    Jusqu'au bout du monde a couru.
  - |
    Dieu fait à son peuple connaître
    Sa grâce et sa fidélité ;
    Et sa justice va paraître
    Devant les peuples assemblés.
    Vous qui comptiez sur sa promesse,
    Voyez : le Seigneur se souvient !
    Il nous secourt dans sa tendresse,
    Il nous relève et nous soutient.
  - |
    Chantez pour lui vos chants de fête,
    Psalmodiez ! Criez de joie !
    Au son du cor et des trompettes,
    Acclamez tous le Roi des rois !
    Le Seigneur vient juger la terre ;
    Sa vérité va s'imposer.
    Que tous les peuples qui espèrent
    En l'apprenant soient apaisés.
  - |
    Que tous les océans mugissent.
    Fleuves aussi, battez des mains
    Et que les montagnes bondissent
    Pour acclamer le Roi qui vient.
    Le Seigneur va juger le monde
    Avec droiture et vérité,
    Et partout sa justice fonde
    Son éternelle royauté.
    Théodore de Bèze 1519-1605 / Roger Chapal 1912-1997
    © Fédération Musique et Chant de la Réforme, c/o Olivétan, BP 4464, F-69241 LYON Cedex 04
traductions:
  - langue: "en"
    couplets:
      - |
        New songs of celebration render
        To him who has great wonders done ;
        Awed by his power his foes surrender
        And fall before the mighty One.
        He has made known his great salvation
        Which all his friends with joy confess ;
        He has revealed to ev'ry nation
        His everlasting righteousness.
      - |
        Joyfully, heartily resounding,
        Let every instrument and voice
        Peal out the praise of grace abounding,
        Calling the whole world to rejoice.
        Trumpets and organs set in motion
        Such sounds as make the heavens ring :
        All things that live in earth and ocean
        Make music for your mighty King.
      - |
        Rivers and seas and torrents roaring,
        Honour the Lord with wild acclaim ;
        Mountains and stones look up adoring
        And find a voice to praise his name.
        Righteous, commanding, ever glorious,
        Praises be his that never cease :
        Just is our God, whose truth victorious
        Establishes the world in peace.
        Eric Routley 1917-1982
        © Eerdmans Publishing Compagny, 225 Jefferson Av. SE, Grand Rapids, Michigan 49503 USA
  - langue: "de"
    couplets:
      - |
        Singt, singt dem Herren neue Lieder,
        er ist's allein, der Wunder tut.
        Seht, seine Rechte sieget wieder,
        sein heilger Arm gibt Kraft und Mut.
        Wo sind nun alle unsre Leiden ?
        Der Herr schafft Ruh und Sicherheit ;
        er selber offenbart den Heiden
        sein Recht und seine Herrlichkeit.
      - |
        Der Herr gedenkt an sein Erbarmen,
        und seine Wahrheit stehet fest ;
        er trägt sein Volk auf seinen Armen
        und hilft, wenn alles uns verlässt.
        Bald schaut der ganze Kreis der Erde,
        wie unsers Gottes Huld erfreut.
        Gott will, dass sie ein Eden werde ;
        rühm, Erde, Gottes Herrlichkeit !
      - |
        Frohlocket, jauchzet, rühmet alle,
        erhebet ihn mit Lobgesang !
        Sein Lob tön im Posaunenschalle,
        in Psalter und in Harfenklang !
        Auf, alle Völker, jauchzt zusammen,
        Gott macht, dass jeder jauchzen kann ;
        sein Ruhm, sein Lob muss euch entflammen,
        kommt, betet euren König an !
        Matthias Jorissen 1739-1823
        Nederlands
  - langue: "xx"
    couplets:
      - |
        Zingt een nieuw lied voor God den Here,
        Want Hij bracht wonderen tot stand.
        Wij zien Hem heerlijk triomferen
        Met opgeheven rechterhand.
        Zingt voor den Heer, Hij openbaarde
        Bevrijdend heil en bindend recht
        Voor alle volkeren op aarde.
        Hij doet zoals Hij heeft gezegd.
      - |
        Laat heel de aard' een loflied wezen,
        De psalmen gaan van mond tot mond.
        De Naam des Heren wordt geprezen,
        Lofzangen gaan de wereld rond.
        Hosanna voor de grote Koning,
        Verhef, bazuin, uw stem van goud,
        De Heer heeft onder ons zijn woning,
        De Heer, die bij ons intocht houdt.
      - |
        Laat alle zeeën, alle landen
        Hem prijzen met een blij geluid,
        Rivieren klappen in de handen,
        De bergen jubelen het uit.
        Hij komt, Hij komt de aarde richten,
        Hij komt, o volken weest verblijd,
        Hij komt zijn Koninkrijk hier stichten,
        Zijn heil en zijn gerechtigheid.
