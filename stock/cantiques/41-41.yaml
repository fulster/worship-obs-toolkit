numero: "41-41"
titre: "Roi des nations"
refrain: |
  Christ Jésus, Roi des nations,
  Christ Jésus, seul Seigneur,
  Christ Jésus, Roi des nations,
  Seul Seigneur !
couplets:
  - |
    Roi des nations, tu règnes !
    Adorons ton nom très saint !
    Ton ordre admirable et juste
    Etend sa bonté.
  - |
    C’est d’un cœur qui déborde
    Que nous t’acclamons, Seigneur !
    Toute race, toute langue,
    L’univers te loue.
  - |
    Apportant vos offrandes,
    Venez tous avec ferveur !
    Un seul cri joyeux s’élève,
    Un seul étendard.
  - |
    De gloire emplis ton temple,
    Que jubile ta maison !
    Que, cherchant ta face, accourent
    Les peuples lointains !
credits: "Graham Kendrick / Henri Künzler *1931 — © Make Way Music, Glindley Manor Hailsham Rd., Stonecross, East Sussex, UK (49)"
