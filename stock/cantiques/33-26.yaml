numero: "33-26"
titre: "Rédempteur admirable"
couplets:
  - |
    Rédempteur admirable
    Sur la croix attaché,
    Traité comme un coupable,
    Brisé pour mon péché,
    Ton angoisse suprême,
    Ta douleur, ton tourment,
    Me disent : « Vois, je t’aime ;
    J’ai pris ton châtiment. »
  - |
    Abandonné du Père,
    Toi qui n’es que bonté,
    Tu bois la coupe amère,
    Tu meurs pour mon péché ;
    Le sang de tes blessures,
    Ta couronne de roi,
    Toutes ces meurtrissures,
    Tu les subis pour moi.
  - |
    Ton amour me réclame,
    Me voici, mon Sauveur !
    Prends mon corps et mon âme
    O Toi, mon Rédempteur !
    Couvert par ta justice,
    Enfin je ne veux plus
    Que vivre à ton service,
    Pour ta gloire, ô Jésus !
credits: "Amélie Humbert 1851-1936 — © Fédération protestante de France, Paris (30)"
