numero: "62-78"
titre: "Demeure par ta grâce"
couplets:
  - |
    Demeure par ta grâce
    Avec nous, Dieu sauveur ;
    Quand l’ennemi menace,
    Protège-nous, Seigneur.
  - |
    Conserve ta Parole
    Parmi nous ici-bas ;
    Qu’elle soit la boussole
    Qui dirige nos pas.
  - |
    Eternelle lumière,
    Dont la vive splendeur
    Nous guide et nous éclaire,
    Garde-nous de l’erreur !
  - |
    Augmente-nous tes grâces,
    Donne-nous ton Esprit ;
    Fais nous suivre les traces
    De ton Fils Jésus-Christ.
  - |
    Garde-nous, Dieu fidèle,
    En ta puissante main,
    Pour la vie éternelle,
    Pour ce jour et demain !
  - |
    Amen
credits: "d’après Joseph-Frédéric Monnier 1749-1813 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)"
