numero: "45-03"
titre: "Oh ! quelle joie, oh ! quel honneur !"
couplets:
  - |
    Oh ! quelle joie, oh ! quel honneur
    De proclamer sa foi !
    Mon Rédempteur et mon Sauveur,
    O Jésus-Christ, c'est toi !
  - |
    Toi qu'en esprit j'ai contemplé
    Mourant sur une croix,
    C'est ma souffrance et mon péché
    Que tu prenais sur toi !
  - |
    Et maintenant, jour après jour,
    Je vis par ta bonté,
    Sûr d'un pardon et d'un amour
    Que rien n'a mérité.
  - |
    C'est ton Esprit, vivant et fort,
    Qui toujours me conduit,
    Et dans la vie et dans la mort,
    Ta grâce me suffit.
  - |
    Tu l'as promis : un jour viendra
    Où je verrai mon Dieu.
    Ce temps jamais ne finira
    Dans le séjour des cieux.
credits: "Gustave Borel-Girard 1843-1934 / Edmond Pidoux 1908-2004 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
