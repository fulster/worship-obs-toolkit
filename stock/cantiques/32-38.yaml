numero: "32-38"
titre: "Tout le ciel s’emplit d’une joie nouvelle"
couplets:
  - |
    Tout le ciel s’emplit
    D’une joie nouvelle,
    On entend la nuit
    Dire la merveille :
    Fête sans pareille,
    Le Sauveur est né,
    L’enfant Dieu nous est donné.
  - |
    Le Seigneur paraît,
    Verbe de lumière,
    L’univers connaît
    La bonté du Père.
    Dieu de notre terre,
    Viens tracer la voie
    Où chemineront nos pas !
  - |
    Avec les bergers,
    Avec tous les sages,
    C’est le monde entier
    Qui vers lui s’engage
    Pour voir le visage
    De l’amour vivant,
    Qui pour nous s’est fait enfant.
  - |
    Gloire à Jésus-Christ,
    Gloire au Fils du Père !
    Gloire à son Esprit,
    Dont l’amour éclaire
    L’éclatant mystère
    Qui remplit le ciel :
    Gloire à l’homme Dieu ! Noël !
credits: "Claude Rozier *1924 — © Groupe Fleurus-Mame, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne (33)"
