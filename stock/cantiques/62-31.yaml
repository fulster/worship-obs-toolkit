numero: "62-31"
titre: "Que la paix du Seigneur"
couplets:
  - |
    Officiant
    Que la paix du Seigneur soit avec vous !
    Assemblée
    Que la paix du Seigneur soit toujours avec nous !
    Officiant
    Elevons nos cœurs !
    Assemblée
    Nous les tournons vers le Seigneur.
    Officiant
    Rendons grâce au Seigneur notre Dieu !
    Assemblée
    Cela est juste et bon.
