numero: "56-02"
titre: "Amen, regarde la crèche"
source: "Amen, See the little Baby Amen! Amen ! Amen ! Amen ! Amen !"
couplets:
  - |
    Regarde la crèche !
    Vois l’enfant qui dort
    Au jour de Noël !
    Amen ! (ter)
  - |
    Vois-le dans le Temple
    Etudiant les livres,
    Posant des questions.
    Amen ! (ter)
  - |
    Il est dans la barque
    Et la foule écoute :
    Ouvre-lui ton cœur !
    Amen ! (ter)
  - |
    Sous l’olivier sombre
    Il veille et il prie
    Et moi je m’endors...
    Amen ! (ter)
  - |
    Vois-le sur la croix,
    Puni pour mes fautes,
    Mort pour mon péché.
    Amen ! (ter)
  - |
    Mais il ressuscite
    Au matin de Pâques :
    Il vit à jamais.
    Amen ! (ter)
  - |
    Amen ! Alléluia !
    Jésus me libère !
    Je lui appartiens !
    Amen ! (ter)
    Henri Künzler *1931
    © Auteur (139)
traductions:
  - langue: "en"
    couplets:
      - |
        See the little baby,
        lying in a manger
        on Christmas morning.
        Amen ! (ter)
      - |
        See him in the Temple,
        talking with the elders :
        how they all marvelled !
        Amen ! (ter)
      - |
        See him at the seashore,
        preaching to the people,
        healing all the sick ones !
        Amen ! (ter)
      - |
        See him in the garden,
        praying to the Father
        in deepest sorrow !
        Amen ! (ter)
      - |
        See him on the cross,
        bearing all my sins
        in bitter agony.
        Amen ! (ter)
      - |
        Yes, he died to save us
        and he rose on Easter,
        now he lives for ever !
        Amen ! (ter)
      - |
        Amen ! Alleluia !
        Jesus is my Saviour
        for he lives forever !
        Amen ! (ter)
