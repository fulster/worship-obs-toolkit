numero: "44-02"
titre: "Seigneur, je t'abandonne"
couplets:
  - |
    Seigneur, je t'abandonne
    Ma vie et ma personne :
    Je veux ce que tu veux.
    Sans ton amour, ô Père,
    Nul bien, sur notre terre,
    Ne peut jamais nous rendre heureux.
  - |
    Mais, de ta providence,
    Dans la reconnaissance,
    L'on peut tout accepter.
    Ce qu'il te plaît de faire,
    Toujours est salutaire :
    Je n'ai plus rien à redouter.
  - |
    Quand le malheur menace,
    Je compte sur ta grâce
    Et je regarde à toi.
    J'éprouve ma faiblesse,
    Mais j'ai, dans tes promesses,
    La force qui soutient ma foi.
credits: "d'après Léopold Bonsen 1699-1788"
