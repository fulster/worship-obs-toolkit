numero: "55-06"
titre: "L’Evangile est la semence"
refrain: |
  Alléluia, alléluia ! Amen ! Alléluia ! (bis)
couplets:
  - |
    L’Evangile est la semence ;
    Jésus, qui vient la jeter,
    La fera croître en silence
    Jusqu’à la moisson d’été.
  - |
    J’ai vu germer une graine,
    J’ai vu s’ouvrir une fleur.
    Je t’écoute quand tu sèmes
    Des mots vivants dans nos cœurs.
  - |
    Les plus simples mots du monde,
    La sagesse les choisit
    Pour dire la vie féconde
    Qui devant nous resplendit.
  - |
    Ce sont des mots de lumière
    Où rayonne ta douceur.
    Ton amour qui les éclaire,
    Les emplit de sa vigueur.
  - |
    Pour que grandisse la plante,
    Tu veux un sol nettoyé
    De nos ronces foisonnantes :
    Viens nous aider, jardinier !
  - |
    L’Evangile est l’arbre immense
    Qui porte beaucoup de fruits.
    Au loin s’étendent ses branches,
    Les oiseaux y font leur nid.
credits: "Roger Chapal 1912-1997 — © Auteur (112a)"
