numero: "12-06"
titre: "Dieu est pour nous un refuge"
source: "Psaume 46"
couplets:
  - |
    Dieu est pour nous un refuge et un appui,
    C’est pourquoi nous sommes sans crainte,
    Dieu est pour nous un refuge et un appui,
    Alléluia !
  - |
    Si les montagnes chancellent dans la mer,
    Que les flots en rage surgissent,
    Dieu est pour nous un refuge et un appui,
    Alléluia !
  - |
    Jérusalem reste ferme et sans effroi,
    Dieu est au milieu de sa ville,
    Dieu est pour nous un refuge et un appui,
    Alléluia !
  - |
    Que tous les peuples s’agitent contre nous,
    Dieu parle et sa voix les repousse,
    Dieu est pour nous un refuge et un appui,
    Alléluia !
  - |
    Dieu d’Abraham, Dieu d’Isaac et de Jacob,
    L’Eternel nous sauve et nous garde,
    Dieu est pour nous un refuge et un appui,
    Alléluia !
  - |
    Dieu brise l’arc, rompt la lance et le bâton,
    Rétablit la paix sur la terre,
    Dieu est pour nous un refuge et un appui,
    Alléluia !
credits: "Str. 1 : Roger Trunk *1930 / str. 2-6 : Yves Kéler *1939 — © Auteurs (162) et (138)"
