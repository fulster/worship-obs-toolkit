numero: "Ps 081"
titre: "Que nos chants joyeux"
couplets:
  - |
    Que nos chants joyeux,
    Nos cris d'allégresse
    Jaillissent vers Dieu,
    Le puissant Seigneur
    Qui met sa vigueur
    Dans notre faiblesse.
  - |
    Les cors, les hautbois,
    L'éclat des trompettes,
    Nos luths et nos voix
    Diront quelle ardeur
    Brûle notre cœur
    En ce jour de fête.
  - |
    Dieu nous a donné
    Ce jour d'espérance ;
    Il l'a ordonné
    Pour nous réunir
    Dans le souvenir
    De sa délivrance.
  - |
    J'entends une voix,
    Une voix nouvelle
    Qui dit : " Lève-toi !
    Redresse ton dos !
    J'ôte le fardeau,
    Je brise ta chaîne.
  - |
    Tu m'as appelé
    Dans tes longues peines
    Et je t'ai donné
    Pour guider tes pas,
    Pour armer ton bras,
    Ma parole même.
  - |
    Si tu l'écoutais,
    Peuple au cœur rebelle,
    Elle apaiserait
    Pour toujours ta faim
    Car elle est le pain
    De vie éternelle.
  - |
    Pour toi j'ai gardé,
    Pour emplir ta bouche,
    Le miel du rocher,
    Le meilleur froment ;
    Pour toi, mon enfant,
    Ma parole est douce. "
credits: "Théodore de Bèze 1519-1605 / Roger Chapal 1912-1997 — © Fédération Musique et Chant de la Réforme, c/o Olivétan, BP 4464, F-69241 LYON Cedex 04"
