numero: "47-18"
titre: "A mon Dieu je me confie"
refrain: |
  Ta pensée, ô Dieu d'amour,
  Est fidèle, éternelle.
couplets:
  - |
    A mon Dieu je me confie,
    Sa clémence est infinie.
  - |
    La lumière radieuse
    Est ton œuvre merveilleuse.
  - |
    Tu consoles, tu pardonnes,
    Ta bonté sur tous rayonne.
  - |
    Par ta grâce prévenante
    L'âme s'ouvre à l'espérance.
  - |
    Tout à toi je me confie,
    Ta clémence est infinie. Refr.
    Suzanne Bidgrain 1879-1961
    © Auteur (106a)
credits: "John Milton 1608-1674 / Michael Saward *1932"
traductions:
  - langue: "de"
    couplets:
      - |
        Brüder, macht die Herzen weit,
        euern Mund zum Lob bereit !
        Kehrvers
        Gottes Güte, Gottes Treu
        sind an jedem Morgen neu.
      - |
        Gottes Hand erschafft die Welt,
        Finsternis sein Wort erhellt. Kehrvers
      - |
        Je und je sein Siegen war
        über der Erwählten Schar. Kehrvers
      - |
        Und sein Blick aus Himmelshöh'n
        hat das Elend angeseh'n. Kehrvers
      - |
        Macht darum die Herzen weit,
        euern Mund zum Lob bereit ! Kehrvers
        Johann Christoph Hampe 1913-1991
  - langue: "en"
    couplets:
      - |
        Let us gladly with one mind
        Praise the Lord for He is kind :
        Chorus
        For His mercy shall endure
        Ever faithful, ever sure.
      - |
        He has made the realms of space,
        All things have their ordained place : Chorus
      - |
        He created sky and sea,
        Field and mountain, flower and tree : Chorus
      - |
        Every creation, great and small,
        God alone has made them all : Chorus
      - |
        Then at least he fashioned man,
        Crowning glory of his plan : Chorus
      - |
        He has shaped our destiny,
        Heaven for all eternity : Chorus
      - |
        Glory then to God on high,
        " Glory ! " let creation cry : Chorus
