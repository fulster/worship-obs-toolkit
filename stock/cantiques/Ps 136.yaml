numero: "Ps 136"
titre: "Louez Dieu, car il est bon"
refrain: |
  Sa bonté dure à toujours,
  Eternel est son amour.
couplets:
  - |
    Louez Dieu car il est bon,
    Louez-le pour tous ses dons.
  - |
    Gloire au Seigneur des seigneurs,
    Au tout-puissant Créateur !
  - |
    Ses ouvrages sont parés
    De sagesse et de beauté.
  - |
    Il a déployé les cieux,
    Il les a semés de feux.
  - |
    Il a donné les saisons,
    Les labours et les moissons.
  - |
    Pour son peuple, il a ouvert
    La route au creux de la mer.
  - |
    Quand nous étions opprimés,
    Sa main nous a relevés.
  - |
    Il nous donne d’habiter
    Le pays de sa bonté.
  - |
    Pour tout homme, il multiplie
    Un pain de force et de vie.
  - |
    Rendez grâce au Dieu des cieux ;
    Tous ses dons sont merveilleux. Refr.
    Doxologie
  - |
    Gloire au Père, au Dieu très saint,
    Sa parole est notre pain.
    L’Esprit saint fera germer
    Le grain par le Fils semé.
