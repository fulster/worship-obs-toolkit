numero: "47-24"
titre: "Mon Dieu est si bon"
refrain: |
  Dieu sait si bien ce qui te semble lourd,
  Qui te fait mal, te trouble chaque jour.
  Il connaît tes soucis, ta peur du lendemain :
  Il veut que tout concoure à notre bien.
couplets:
  - |
    Mon Dieu est si bon, il prend bien soin de moi.
    Ce Dieu plein d'amour, sais-tu qu'il pense à toi
    Tout prêt à t'aider quand tu es accablé ?
    Ne tarde pas, viens à lui tel que tu es.
  - |
    Il vit à jamais, c'est un Dieu tout-puissant,
    Il te répondra, viens à lui simplement.
    Quand tout semble noir, triste et désespéré,
    Sais-tu que là-haut, tu n'es pas oublié ?
  - |
    Mon Dieu t'aidera, il conduira tes pas,
    Si tu veux marcher, appuyé sur son bras.
    Alors, ne crains plus, en lui, sois affermi,
    Il accomplira tout ce qu'il a promis. Refr.
    H. Lepczynski (XXe)
