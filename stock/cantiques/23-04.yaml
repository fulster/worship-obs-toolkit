numero: "23-04"
titre: "Christ bien aimé, Seigneur Jésus"
couplets:
  - |
    Christ bien-aimé, Seigneur Jésus,
    Comme un enfant tu es venu ;
    D’une humble vierge tu es né
    Pour nous sauver de nos péchés.
  - |
    Tu ne renvoyas pas les gens
    Qui t’amenèrent leurs enfants,
    Mais tu ouvris pour eux tes bras,
    Tu les bénis, et déclaras :
  - |
    « Laissez-les tous venir à moi
    Et ne les en empêchez pas,
    Car le Royaume est à tous ceux
    Qui veulent l’accueillir comme eux. »
  - |
    Nous te prions pour cet enfant
    Que l’on baptise* maintenant :
    Qu’il te connaisse, toi, Seigneur,
    Qu’il se consacre à ton honneur.
    * Variante : présente
credits: "Georges Pfalzgraf (*1936) — © Auteur (155)"
