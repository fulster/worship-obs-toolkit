numero: "44-03"
titre: "Comme un enfant qui sert son père"
couplets:
  - |
    Comme un enfant qui sert son père
    Avec amour, avec bonheur,
    Je veux t'aimer, je veux te plaire
    Et te servir, ô Dieu sauveur.
  - |
    Comme un enfant, je veux sans crainte
    T'offrir ma vie jour après jour,
    J'aimerai ta parole sainte,
    Je compterai sur ton secours.
  - |
    Seigneur Jésus, c'est ta promesse
    D'affermir en nous ce désir :
    Te parler, te prier sans cesse,
    Dans le bonheur de t'obéir.
  - |
    De ton Esprit, emplis nos êtres,
    De ton amour, emplis nos cœurs,
    Habite en nous, fais-nous connaître
    Et ta lumière et ta douceur.
  - |
    Seigneur, pour nous tu intercèdes,
    Redis au Père notre appel.
    Nous t'attendons, viens à notre aide,
    O toi qui reviendras du ciel !
credits: "Edmond-Louis Budry 1854-1932 / Pierre Vallotton *1917 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (31)"
