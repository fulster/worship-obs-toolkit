numero: "24-11"
titre: "Viens, Seigneur, oh ! viens"
couplets:
  - |
    Viens, Seigneur, oh ! viens
    Prendre ici ta place,
    En rompant le pain,
    Signe de ta grâce.
    Quand tu nous le donnes,
    Pour les tiens rayonne
    Ta personne.
  - |
    Fais que nos esprits
    Et que nos yeux s’ouvrent,
    Qu’ils soient éblouis
    Lorsqu’ils te découvrent.
    Fais-toi reconnaître,
    Toi qui vins pour être
    Notre maître.
  - |
    Reste avec les tiens
    Quand le jour décline.
    Dans la nuit qui vient,
    Tu les illumines.
    Que ta paix profonde,
    Seule vraie au monde,
    Nous inonde !
credits: "Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
