numero: "41-28"
titre: "A Dieu soit la gloire"
refrain: |
  Gloire à Dieu, gloire à Dieu !
  Terre, écoute sa voix !
  Gloire à Dieu, gloire à Dieu !
  Monde, réjouis-toi !
  Reviens à ton Père !
  Jésus est vainqueur :
  Que toute la terre
  Chante en son honneur.
couplets:
  - |
    A Dieu soit la gloire
    Pour son grand amour,
    Car de sa victoire
    S’est levé le jour :
    Jésus, à ma place,
    Est mort sur la croix,
    Il donne sa grâce
    A celui qui croit.
  - |
    La foi, l’espérance
    Ont chassé la peur,
    Une paix immense
    Emplit notre cœur.
    Selon sa promesse,
    Jésus changera
    Deuil en allégresse
    Quand il reviendra.
credits: "Elisabeth Schurer-Curie (XIXe), rév. Arc-en-ciel 1988"
