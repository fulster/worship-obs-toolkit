numero: "56-06"
titre: "Un chrétien, je voudrais être"
source: "Lord, I want to be a Christian"
couplets:
  - |
    Un chrétien je voudrais être / De tout mon cœur, (bis)
    De tout mon cœur, (bis)
    Un chrétien je voudrais être / De tout mon cœur.
  - |
    Plus aimant je voudrais être / De tout mon cœur, (bis)
    De tout mon cœur, (bis)
    Donne-moi, Seigneur, de l’être / De tout mon cœur !
  - |
    Pur et saint je voudrais être / De tout mon cœur, (bis)
    De tout mon cœur, (bis)
    Donne-moi, Seigneur, de l’être / De tout mon cœur !
  - |
    Tel Judas je ne veux être, / De tout mon cœur, (bis)
    De tout mon cœur, (bis)
    Garde-moi, Seigneur, de l’être, / De tout mon cœur !
  - |
    Tel Jésus je voudrais être / De tout mon cœur, (bis)
    De tout mon cœur, (bis)
    Donne-moi, Seigneur, de l’être, / De tout mon cœur !
    d’après Charles Westphal 1896-1972
    © Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (25)
traductions:
  - langue: "en"
    couplets:
      - |
        Lord, I want to be a Christian / Ina my heart. (bis)
        Ina my heart. (bis)
        Lord, I want to be a Christian / Ina my heart.
      - |
        Lord, I want to be more loving / Ina my heart. (bis)
        Ina my heart. (bis)
        Lord, I want to be more loving / Ina my heart.
      - |
        Lord, I want to be more holy / Ina my heart. (bis)
        Ina my heart. (bis)
        Lord, I want to be more holy / Ina my heart.
      - |
        I don’t want to be like Judas / Ina my heart. (bis)
        Ina my heart. (bis)
        I don’t want to be like Judas / Ina my heart.
      - |
        Lord, I want to be like Jesus / Ina my heart. (bis)
        Ina my heart. (bis)
        Lord, I want to be like Jesus / Ina my heart.
