numero: "31-28"
titre: "Toi qui es lumière"
refrain: |
  Toi qui es lumière,
  Toi qui es l’amour,
  Mets dans nos ténèbres
  Ton Esprit d’amour.
couplets:
  - |
    Viens sur notre terre,
    Viens ouvrir nos cœurs,
    Toi qui nous libères
    Et nous rends meilleurs.
  - |
    Le monde se traîne
    Et vit dans la nuit.
    Au cœur de nos peines
    Vienne ton Esprit.
  - |
    Vois notre souffrance
    Et nos lâchetés.
    Donne l’espérance
    Aux cœurs fatigués.
  - |
    Toi qui nous appelles
    A vivre avec toi
    Une vie nouvelle
    Fleurie de ta joie.
  - |
    Que dans ton attente
    Nous vivions ta paix
    Et que nos cœurs chantent
    La vie retrouvée !
credits: "Raymond Fau *1937 — © Studio SM, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne"
