numero: "36-27"
titre: "Dans notre Europe ou notre Afrique"
refrain: |
  Seigneur Jésus, tu es vivant
  En tous les lieux, dans tous les temps !
couplets:
  - |
    Dans notre Europe ou notre Afrique,
    Sur les bords des fleuves brillants,
    En Asie et en Amérique
    Et sur les bords des océans :
  - |
    Dans les cités et les savanes,
    Au désert et dans nos banlieues
    Où les fleurs et l'espoir se fanent,
    O notre frère et notre Dieu !
  - |
    Nous le savons, tu accompagnes
    Tous les hommes sur leurs chemins,
    A la ville ou dans les campagnes,
    Dans le secret, vers nous tu viens.
  - |
    Et si la mort veut être reine,
    Si la crainte nous asservit,
    Nous crierons vers toi qui nous aimes :
    Tu es le Prince de la vie !
credits: "Henri Capieu 1909-1993 — © Auteur (109)"
