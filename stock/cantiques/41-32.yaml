numero: "41-32"
titre: "Chante, ciel, exulte, terre"
couplets:
  - |
    Chante, ciel, exulte, terre,
    A la gloire du Seigneur ;
    Faites monter vers le Père
    Un cantique en son honneur.
    Alléluia ! Célébrez-le tous en chœur !
  - |
    Tous les astres se prosternent
    Pour adorer le Seigneur ;
    Leurs feux nuit et jour alternent
    Et proclament sa grandeur.
    Alléluia ! Célébrez-le tous en chœur !
  - |
    Toi non plus ne peux te taire
    En présence du Seigneur ;
    Si tu veux vraiment lui plaire,
    Prends ta place dans ce chœur !
    Alléluia ! Célébrons-le de tout cœur !
  - |
    Mais c’est aussi par le geste
    Qu’il faut louer le Seigneur ;
    Par ton œuvre, manifeste
    Ton amour à ton Sauveur.
    Alléluia ! Sois toujours son serviteur !
credits: "Pierre Lutz *1926 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)"
