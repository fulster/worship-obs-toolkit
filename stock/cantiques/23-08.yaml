numero: "23-08"
titre: "Je t’appartiens par le baptême"
couplets:
  - |
    Je t’appartiens par le baptême,
    Dieu, Père, Fils et Saint-Esprit.
    Compté parmi ceux que tu aimes,
    Je suis lié à Jésus-Christ.
    Tu m’as fait passer par sa mort,
    Tu me fais membre de son corps.
  - |
    Tu me désignes, toi le Père,
    Comme héritier de tous tes biens ;
    Sur la croix, Jésus, tel un frère,
    C’est toi qui viens rompre mes liens;
    Tu mets en moi nouvelle ardeur,
    Esprit saint, mon Consolateur.
  - |
    Je sais que sur ta bienveillance
    Je peux compter jusqu’à la fin,
    Car tu as scellé cette alliance,
    M’accueillant au nombre des tiens.
    C’est toi qui me relèveras
    Lorsque l’épreuve m’atteindra.
  - |
    Je te donne en action de grâce
    Ce qu’il y a de meilleur en moi.
    Que jamais mon cœur ne se lasse
    De t’offrir ce qui vient de toi
    Et de partager à l’entour
    La foi, l’espérance et l’amour !
    Commission d'hymnologie de la Fédération protestante de France 1978
    © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04
credits: "Johann Jakob Rambach 1693-1735"
traductions:
  - langue: "de"
    couplets:
      - |
        Ich bin getauft auf deinen Namen,
        Gott Vater, Sohn und Heilger Geist ;
        ich bin gezählt zu deinem Samen,
        zum Volk, das dir geheiligt heisst.
        Ich bin in Christus eingesenkt,
        ich bin mit seinem Geist beschenkt.
      - |
        Du hast zu deinem Kind und Erben,
        mein lieber Vater, mich erklärt ;
        du hast die Frucht von deinem Sterben,
        mein treuer Heiland, mir gewährt ;
        du willst in aller Not und Pein,
        o guter Geist, mein Tröster sein.
      - |
        Mein treuer Gott, auf deiner Seite
        bleibt dieser Bund wohl feste stehn ;
        wenn aber ich ihn überschreite,
        so lass mich nicht verlorengehn ;
        nimm mich, dein Kind, zu Gnaden an,
        wenn ich hab einen Fall getan.
      - |
        Ich gebe dir, mein Gott, aufs neue
        Leib, Seel und Herz zum Opfer hin ;
        erwecke mich zu neuer Treue
        und nimm Besitz von meinem Sinn.
        Es sei in mir kein Tropfen Blut,
        der nicht, Herr, deinen Willen tut.
