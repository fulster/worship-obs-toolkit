numero: "36-19"
titre: "Non point à nous, Seigneur"
couplets:
  - |
    Non point à nous, Seigneur, non point à nous la gloire,
    Gloire au nom trois fois saint qu'on adore à genoux !
    De tes bienfaits passés tu couronnes l'histoire
    Par les bienfaits nouveaux que tu répands sur nous.
  - |
    C'est toi qui fais germer la plus humble semence,
    C'est toi qui la fais croître et fleurir sous nos yeux :
    Le grain de sénevé deviendra l'arbre immense
    Où bâtiront leurs nids tous les oiseaux des cieux.
  - |
    Tu nous as confié la Parole féconde ;
    Hérauts de ta justice et de ta charité,
    Nous n'avons autre chose à proclamer au monde
    Que la croix du Sauveur, mort et ressuscité.
  - |
    Le trésor est sans prix, mais le vase est d'argile.
    Toi seul tu peux soumettre et soutenir nos cœurs ;
    Que cédant à ta grâce, ô Dieu de l'Evangile,
    Ils soient vaincus par elle, et par elle vainqueurs !
credits: "Théodore Monod 1836-1921"
