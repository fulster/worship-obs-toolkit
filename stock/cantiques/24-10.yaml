numero: "24-10"
titre: "Christ, romps-nous le pain"
couplets:
  - |
    Christ, romps-nous le pain,
    Comme aux deux disciples,
    Quand sur le chemin
    Notre peur redouble ;
    Dans nos vies pénètre,
    Fais-toi reconnaître,
    Divin Maître !
  - |
    Là où deux ou trois
    En ton nom s’unissent,
    Au pied de la croix
    De ton sacrifice,
    Prends, Seigneur, ta place,
    Règne et que ta grâce
    Les embrasse.
  - |
    Notre indignité
    Nous rend incapables
    D’avoir mérité
    Le pain de ta table,
    Mais tu nous invites,
    Ton offre est gratuite,
    Sans limite.
  - |
    Verbe Créateur,
    Vérité limpide,
    Conduis notre cœur,
    Jésus, notre guide,
    Dans ton alliance,
    Dans l’obéissance,
    La souffrance.
  - |
    Vrai homme et vrai Dieu,
    Nous faisons mémoire
    Du salut joyeux
    Qui, par ta victoire,
    Nous donne la vie :
    La table servie
    Nous convie.
  - |
    L’eau changée en vin
    Nous montra ta gloire.
    Change-nous enfin,
    Montre ta victoire
    Sur nos cœurs de pierre,
    Sur nos âmes fières,
    Solitaires.
  - |
    Alpha, Oméga,
    Début, fin du monde,
    Source de la foi,
    Vigne en fruits féconde,
    Jésus, sanctifie,
    Jésus, glorifie
    Notre vie.
  - |
    Fils du Dieu vivant,
    Né du cœur du Père
    Avant tous les temps,
    Ouvre à ton mystère
    Le cœur des fidèles
    Pour la vie nouvelle,
    Eternelle.
credits: "Yves Kéler *1939 d’après Rudolf Alexander Schröder 1878-1962 — © Auteur (138)"
