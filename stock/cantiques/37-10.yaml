numero: "37-10"
titre: "Nos cœurs te rendent grâces"
couplets:
  - |
    Nos cœurs te rendent grâces,
    Seigneur, pour tes bienfaits,
    Toi dont l'amour surpasse
    Les œuvres que tu fais.
    Ainsi de jour en jour,
    Tu t'es montré fidèle,
    Pour nous tu renouvelles
    Ta force et ton secours.
  - |
    En toi, qui se confie
    A tout ce qu'il lui faut;
    Jamais le pain de vie
    Ne lui fera défaut.
    Aucun n'est délaissé :
    Il garde l'espérance,
    Au temps de la souffrance
    Et dans l'adversité.
  - |
    Par grâce tu pardonnes
    Nos fautes, nos erreurs.
    Par le salut tu donnes
    La paix à notre cœur.
    Celui qui t'appartient
    En toi connaît la joie,
    Il marche dans tes voies,
    Et toi tu le soutiens.
  - |
    Seigneur, voici l'année,
    Qui va finir bientôt !
    C'est toi qui l'as donnée,
    Veillant sur nous d'en haut !
    Oh! viens nous soutenir
    Par ton amour immense !
    Dans celle qui commence,
    Daigne encor nous bénir.
credits: "d'après Louis-Samuel Pidoux 1878-1953 — © Editions Musicales, Frédy Henry, Vullierens (24) et © Cantate Domino, Genève (15)"
