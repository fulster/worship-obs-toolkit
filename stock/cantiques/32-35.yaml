numero: "32-35"
titre: "Etoile ! à Bethléem"
couplets:
  - |
    Etoile ! à Bethléem, tu nous conduis
    Vers la crèche et l’enfant : brille en la nuit !
    Eclaire le chemin qui mène au Roi,
    Etoile ! à Bethléem, montre l’endroit !
  - |
    Etoile ! à Bethléem, arrête-toi
    Au-dessus du prodige et qu’on le voie !
    Qui donc s’y attendait, qui donc savait,
    Etoile ! à Bethléem, qu’un Fils naîtrait ?
  - |
    Etoile ! à Bethléem, tant attendu,
    Dans l’étable un trésor : l’enfant Jésus !
    Tu nous as bien guidés, restons ici,
    Etoile ! à Bethléem, disons merci !
  - |
    Etoile ! à Bethléem, nous repartons ;
    Ton doux éclat reluit à l’horizon.
    Tu nous as réjouis, nous t’emportons,
    Etoile ! à Bethléem, dans nos maisons.
    Yves Kéler *1939
    © 138
credits: "Alfred Hans Zoller *1928 — © Gustav Bosse Verlag, Heinrich-Schütz-Allee 35, D-34131 Kassel"
traductions:
  - langue: "de"
    couplets:
      - |
        Stern über Bethlehem, zeig uns den Weg,
        führ uns zur Krippe hin, zeig, wo sie steht,
        leuchte du uns voran, bis wir dort sind,
        Stern über Bethlehem, führ uns zum Kind !
      - |
        Stern über Bethlehem, nun bleibst du stehn
        und lässt uns alle das Wunder hier sehn,
        das da geschehen, was niemand gedacht,
        Stern über Bethlehem, in dieser Nacht.
      - |
        Stern über Bethlehem, wir sind am Ziel,
        denn dieser arme Stall birgt doch so viel !
        Du hast uns hergeführt, wir danken dir,
        Stern über Bethlehem, wir bleiben hier !
      - |
        Stern über Bethlehem, kehrn wir zurück,
        steht noch dein heller Schein in unserm Blick,
        und was uns froh gemacht, teilen wir aus,
        Stern über Bethlehem, schein auch zu Haus !
