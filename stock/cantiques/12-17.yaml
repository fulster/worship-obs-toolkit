numero: "12-17"
titre: "Chantez à l’Eternel"
source: "Psaume 98"
couplets:
  - |
    Chantez à l’Eternel un cantique nouveau,
    Car il a fait des choses inouïes !
    La force de son bras n’est jamais en défaut :
    Il vient de nous sauver la vie !
    Aux yeux des nations, notre Dieu s’est montré
    Fidèle en sa justice.
    Louange à l’Eternel, il nous a délivrés !
    Sans fin nos hymnes le bénissent.
  - |
    Vous, tous les habitants de la terre, chantez !
    Faisant monter vers lui des cris de fête !
    Aux chœurs mélodieux, harpe et luth accordez !
    Sonnez le cor et la trompette !
    Les vagues de la mer et les fleuves profonds
    L’acclament de leurs ondes.
    Les monts et les rochers se redisent le nom
    Du roi qui vient juger le monde.
credits: "Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
