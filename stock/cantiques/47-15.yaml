numero: "47-15"
titre: "C'est par la foi que devant nous"
couplets:
  - |
    C'est par la foi que devant nous
    S'effondrent les murailles,
    Que sont forcés tous les verrous,
    Que cessent les batailles.
    La foi permet de posséder
    Déjà ce qu'on espère,
    Ce qui reste à nos yeux caché,
    La foi déjà l'éclaire.
  - |
    Par elle nous avons connu
    Que c'est par la Parole
    Que le visible est advenu,
    Et non de quelque idole.
    Par elle Abraham est parti,
    - A Dieu va sa confiance -,
    Le nombre des astres lui dit
    Sa juste descendance.
  - |
    La foi sait rire et s'étonner :
    Sarah, restée stérile,
    Conçoit, bien qu'en âge avancé,
    Devient souche fertile.
    Gardons mémoire d'Israël,
    Des douze patriarches,
    D'Elie, Moïse et Samuel,
    Du roi conduisant l'arche.
  - |
    Par la foi, tous ils ont marché,
    Sont morts avant d'atteindre
    La cité qu'ils ont tant cherchée :
    Leur regard l'a vue poindre.
    Vers la cité par Dieu fondée
    En Jésus notre maître,
    La foi invite à avancer :
    Dieu la fera paraître.
credits: "Henri Künzler *1931 — © Auteur (139)"
