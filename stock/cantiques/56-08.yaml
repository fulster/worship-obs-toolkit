numero: "56-08"
titre: "Vivre libre"
source: "Oh ! freedom"
refrain: |
  Mais avant d’être affranchi, je serai enseveli
  Et j’irai au pays de la Vie.
couplets:
  - |
    Vivre libre ! Vivre libre !
    Vivre libre pour toujours !
  - |
    Plus d’alarmes, plus d’alarmes,
    Plus d’alarmes pour toujours !
  - |
    Plus de larmes, plus de larmes,
    Plus de larmes pour toujours !
  - |
    Et plus d’armes, et plus d’armes,
    Et plus d’armes contre moi ! Refr.
    d’après Alfred Kuen *1921
    © Joie de Vivre, 2-4 rue des Magasins, F-67000 Strasbourg (40)
traductions:
  - langue: "en"
    couplets:
      - |
        Oh ! freedom ! oh ! freedom !
         oh ! freedom over me !
        Chorus
        But before I’d be a slave, I’ll be buried in my grave,
         and go home to my Lord and be free.
      - |
        No more running, no more running,
         no more running over me ! Chorus
      - |
        No more crying, no more crying,
         no more crying, over me ! Chorus
      - |
        No more shooting, no more shooting
         no more shooting over me ! Chorus
