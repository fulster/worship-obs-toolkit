numero: "42-02"
titre: "Du cœur et de la voix"
couplets:
  - |
    Du cœur et de la voix, rendez à Dieu la gloire !
    Comptez tous ses bienfaits, qu’ils soient dans vos mémoires !
    Nous sommes sous ses yeux dès notre premier jour,
    Pour vivre et pour mourir, veillés par son amour.
  - |
    O Père tout-puissant, ta grâce est infinie !
    Ta paix remplit nos cœurs, ta joie est dans nos vies.
    Tu mets ta force en nous selon ta volonté,
    Et veux nous accueillir dans ton éternité.
  - |
    Louange soit à Dieu, le Père qui nous aime !
    Louange soit au Fils qui s’est donné lui-même !
    Louange au Saint-Esprit, le puissant défenseur !
    Unique et trois fois saint, loué soit le Seigneur !
    Edmond Pidoux 1908-2004
    © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)
credits: "© Colloquio Engadina Alta-Bregaglia-Poschiavo, Bügl de la Nina 4, CH-7503 Samedan (20)"
traductions:
  - langue: "de"
    couplets:
      - |
        Nun danket alle Gott mit Herzen, Mund und Händen,
        der grosse Dinge tut an uns und allen Enden,
        der uns von Mutterleib und Kindesbeinen an
        unzählig viel zugut bis hierher hat getan.
      - |
        Der ewigreiche Gott woll uns bei unserm Leben
        ein immer fröhlich Herz und edlen Frieden geben
        und uns in seiner Gnad erhalten fort und fort
        und uns aus aller Not erlösen hier und dort.
  - langue: "de"
    couplets:
      - |
        Lob, Ehr und Preis sei Gott dem Vater und dem Sohne
        und Gott dem Heilgen Geist im höchsten Himmelsthrone,
        ihm, dem dreieinen Gott, wie es im Anfang war
        und ist und bleiben wird so jetzt und immerdar.
        Martin Rinckart 1586-1649
  - langue: "en"
    couplets:
      - |
        Now thank we all our God with hearts and hands and voices,
        such wonders he has done ! in him the world rejoices.
        He, from our mothers’ arms, has blessed us on our way
        with countless gifts of love, and still is ours today.
      - |
        So may this generous God through all our life be near us,
        to fill our hearts with joy, and with his peace to cheer us ;
        to keep us in his grace, and guide us when perplexed,
        and free us from all ills, in this world and the next.
      - |
        All praise and thanks to God who reigns in highest heaven,
        to Father and to Son and Spirit now be given :
        this one eternal God whom heaven and earth adore,
        is he who was, is now and shall be evermore.
        Catherine Winkworth 1827-1878
        Nederlands
  - langue: "xx"
    couplets:
      - |
        Dankt, dankt nu allen God met hart en mond en handen,
        die grote dingen doet hier en in alle landen,
        die ons van kindsbeen aan, ja, van de moeder schoot,
        zijn vaderlijke hand en trouwe liefde bood.
      - |
        Die eeuwig rijke God moog ons reeds in dit leven
        een vrij en vrolijk hart en milde vrede geven.
        Die uit genade ons behoudt te allen tijd,
        is hier en overal een helper die bevrijdt.
      - |
        Lof, eer en prijs zij God die troont in ‘t licht daarboven.
        Hem, vader, Zoon en Geest moet heel de schepping loven.
        Van hem, de ene Heer, gaf het verleden blijk,
        het heden zingt zijn eer, de toekomst is zijn rijk.
        Jan Wit 1914-1980
        © Interkerkelijke Stichtung woor het Kerklied, Leidschendam (38)
        Italiano
  - langue: "xx"
    couplets:
      - |
        Siam grati a te, Signor, col cuore e cogli accenti,
        divino reggitor di tutte le tue genti.
        Fin dal materno sen e dalla gioventù
        largito ognor ci hai tu i tuoi paterni ben.
      - |
        O padre di bontà, col giusto tuo decreto
        a noi la pace dà e un cor sempre lieto ;
        perseveraci fedel nella tua grazia ognor
        e da gli umani error ci guarda e guida al ciel.
      - |
        A Dio sia gloria, onor e della lod il canto,
        al Padre, al Figlio ancor ed allo Spirto santo.
        La sua Maestà, sovrana come fu
        eterna regnerà nei secoli lassù.
