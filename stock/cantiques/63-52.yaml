numero: "63-52"
titre: "Seigneur, aie pitié de nous"
couplets:
  - |
    S’unir à la prière de repentance (canon à 3 voix)
    Seigneur aie pitié de nous ! Christ aie pitié de nous !
    Seigneur, aie pitié de nous !
    Amen, amen, (amen).
    Grec
    Kyrie eleison ! Christe eleison !
    Kyrie eleison !
    Amen, amen, (amen).
    Herr erbarm dich über uns! Christe erbarm dich über uns!
    Herr erbarm dich über uns!
    Amen, amen, (amen).
    Lord, have mercy upon us! Christ, o have mercy upon us!
    Lord, have mercy upon us!
    Amen, amen, (amen).
