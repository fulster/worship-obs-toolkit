numero: "45-19"
titre: "En toi, Seigneur, est notre espoir"
couplets:
  - |
    En toi, Seigneur, est notre espoir ;
    Que ta Parole soit notre pain,
    Que ton Esprit nous garde unis,
    Pour te servir, ô Jésus-Christ !
  - |
    En toi, Seigneur, est notre vie :
    Par toi, nous sommes enfants de Dieu,
    Choisis de toute éternité,
    Pour témoigner de ton amour.
  - |
    En toi, Seigneur, est notre foi :
    Dans la tempête de notre temps,
    Tu nous apprends à te chercher,
    Et tu nous donnes un cœur nouveau.
  - |
    En toi, Seigneur, est notre joie,
    Ca nous croyons que tu es l'Amour ;
    Tu es la Vie, la Vérité,
    Et le chemin de l'unité.
  - |
    En toi, Seigneur, est notre paix.
    Tu viens répandre ta charité,
    Tu nous apprends à pardonner :
    Le monde a tant besoin de toi !
  - |
    Honneur et gloire à notre Dieu,
    A Jésus-Christ qui nous a sauvés,
    Au Saint-Esprit qui vit en nous,
    Dès maintenant et pour toujours !
