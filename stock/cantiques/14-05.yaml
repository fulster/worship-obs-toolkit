numero: "14-05"
titre: "Seigneur, tu me permets"
source: "Cantique de Siméon"
couplets:
  - |
    Seigneur, tu me permets
    De m’en aller en paix.
    Tu as tenu promesse,
    Car de mes yeux j’ai vu
    Resplendir le salut
    Que j’attendais sans cesse.
  - |
    C’est lui qu’en l’univers,
    Tant de peuples divers
    Vont recevoir et croire ;
    En lui brille ton nom,
    Lumière des nations
    Et d’Israël la gloire.
credits: "d’après Lc 2,29-32 /rév. Répertoire commun protestant francophone 2000 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04"
