numero: "22-03"
titre: "Aux lois de Dieu, prêtons l’oreille"
couplets:
  - |
    Aux lois de Dieu prêtons l’oreille
    Pour accomplir sa volonté.
    Heureux celui qui prie et veille
    Pour vivre dans la vérité !
  - |
    Le Christ, un jour, nous a lui-même
    En ces mots résumé la Loi :
    Dieu le premier, il faut qu’on aime,
    Et le prochain autant que soi.
  - |
    Tous nos péchés, ô notre Père,
    Devant ta loi sont accablants,
    Mais tu promets la grâce entière
    Au repentir de tes enfants.
credits: "Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
