numero: "64-74"
titre: "Gloire à Dieu au plus haut des cieux"
couplets:
  - |
    Gloire à Dieu au plus haut des cieux,
    et paix sur la terre aux hommes qu’il aime !
    Nous te louons, nous te bénissons,
    nous t’adorons, nous te glorifions,
    nous te rendons grâce pour ta gloire infinie,
    Seigneur Dieu, roi des cieux,
    Dieu le Père tout-puissant.
    Seigneur, Fils unique, Jésus-Christ,
    Seigneur Dieu, Agneau de Dieu, Fils du Père,
    Toi qui ôtes le péché du monde, prends pitié de nous ;
    toi qui ôtes le péché du monde, reçois notre prière ;
    toi qui es assis à la droite du Père, prends pitié de nous !
    Car toi seul es saint, toi seul es Seigneur,
    toi seul es le Très-Haut : toi, Jésus-Christ,
    avec le Saint-Esprit, dans la gloire de Dieu le Père.
    Amen.
