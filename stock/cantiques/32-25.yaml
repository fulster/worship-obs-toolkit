numero: "32-25"
titre: "Que tous se réjouissent"
couplets:
  - |
    Que tous se réjouissent :
    Un enfant nous est né !
    Que tous en chœur s’unissent :
    Un Fils nous est donné !
    Ainsi chantent les anges
    Venus d’auprès de Dieu,
    Appelant la louange
    Partout, sur terre comme dans les cieux.
  - |
    Alors, chantez vous-mêmes :
    Il vient vous libérer,
    C’est vous, c’est toi qu’il aime
    De toute éternité.
    Allons, troupe joyeuse,
    Acclamer sa bonté,
    Sa force généreuse,
    Le don parfait de son humanité.
  - |
    Que toute peur s’en aille
    Devant ce nouveau-né !
    Sous sa petite taille,
    Que peut-il bien cacher ?
    Rien, sinon sa puissance
    D’amour illimité.
    Seigneur dès son enfance,
    Il vient régner sur nous en majesté.
credits: "Henri Künzler *1931 — © Auteur (139)"
