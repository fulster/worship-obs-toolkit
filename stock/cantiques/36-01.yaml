numero: "36-01"
titre: "Allez dans toutes les nations"
refrain: |
  Allez dans toutes les nations et faites-en des disciples.
  Allez, dans toutes les nations et soyez mes témoins.
couplets:
  - |
    Baptisez-les au nom du Père et du Fils et du Saint-Esprit.
    Apprenez-leur la Bonne Nouvelle de Jésus-Christ.
  - |
    Tout pouvoir m'a été donné dans le ciel est sur la terre.
    Jusqu'à la fin, tous les jours du monde, je suis avec vous. Refr.
    d'après Mt 28,18-20 / Roger Trunk *1930
    © Auteur (162)
credits: "Roger Trunk *1930 — © Auteur (162)"
traductions:
  - langue: "de"
    couplets:
      - |
        Und taufet sie im Namen des Vaters und des Sohns und des heiligen Geistes.
        Und lehrt sie halten, was ich euch befohlen hab' von Gott, dem Herrn. Kehrvers
      - |
        Mir ist gegeben alle Macht auf der Erd' und im Himmelreich.
        Und siehe ich bin bei euch allezeit und in Ewigkeit. Kehrvers
