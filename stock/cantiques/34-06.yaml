numero: "34-06"
titre: "En toi, Seigneur, par ton Esprit"
couplets:
  - |
    En toi, Seigneur, par ton Esprit
    Et par le nom de Jésus-Christ,
    En un seul corps tu nous unis.
  - |
    Depuis qu’il a vaincu la mort,
    Tout est changé dans notre sort,
    Et le plus faible devient fort
  - |
    Heureux qui t’a donné sa foi !
    La paix du cœur se trouve en toi,
    Et ton amour devient sa loi.
  - |
    Alléluia ! alléluia !
    Alléluia ! alléluia !
    Louange au Christ ressuscité !
credits: "Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
