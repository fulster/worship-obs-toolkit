numero: "49-24"
titre: "Pour cette journée qui commence"
couplets:
  - |
    Pour cette journée qui commence,
    Toute chaude encore d’espérance,
    Où tout est possible à nos yeux,
    Merci mon Dieu !
    Pour ces amis qui nous rassemblent
    Et pour le bonheur d’être ensemble
    A te chanter d’un cœur joyeux,
    Merci mon Dieu ! (ter)
  - |
    Pour quelques moments de partage,
    Quand la prière est un langage
    Fraternel et silencieux,
    Merci mon Dieu !
    Et pour chaque fois qu’un problème
    M’oblige à devenir moi-même
    Par un chemin mystérieux,
    Merci mon Dieu ! (ter)
  - |
    Pour le « non » qui devient « peut-être »,
    Quand le cœur ouvre ses fenêtres
    Pour donner ce qu’il a de mieux,
    Merci mon Dieu !
    Pour celui qui sur notre route
    Depuis vingt siècles est à l’écoute
    De chacun de nous en tous lieux,
    Merci mon Dieu ! (ter)
credits: "Daniel Vermeille *1924 — © Auteur (165)"
