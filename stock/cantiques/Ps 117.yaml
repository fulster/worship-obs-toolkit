numero: "Ps 117"
titre: "Vous tous les peuples, louez Dieu"
couplets:
  - |
    Vous tous les peuples, louez Dieu,
    Pour vous il est victorieux ;
    Son amour s’est montré plus fort
    Que les puissances de la mort.
    Sa vérité resplendira
    A tout jamais, alléluia !
credits: "Théodore de Bèze 1519-1605 / Roger Chapal 1912-1997 — © Fédération Musique et Chant de la Réforme, c/o Olivétan, BP 4464, F-69241 LYON Cedex 04"
