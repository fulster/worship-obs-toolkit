numero: "34-19"
titre: "Mystérieux compagnon de route"
source: "Emmaüs Disciples"
couplets:
  - |
    Mystérieux compagnon de route
    Qui nous comprends, qui nous écoutes,
    Nos yeux ne t’ont pas reconnu,
    Seigneur Jésus.
    Jésus
  - |
    Amis, d’où vient votre tristesse,
    Ce lourd chagrin qui vous oppresse,
    Qui vous écrase de son poids
    Comme une croix ?
    Disciples
  - |
    Nous avions foi dans un prophète,
    Ils l’ont tué durant la fête.
    Rien n’est resté de notre espoir
    Qu’un grand trou noir.
    Jésus
  - |
    L’Agneau de Dieu, dit l’Ecriture,
    Doit traverser la mort obscure :
    Alors l’amour s’accomplira,
    Il règnera.
    Disciples
  - |
    Il se fait tard, dressons la table,
    Ta bonté nous est secourable,
    Elle est un baume fort et doux :
    Reste avec nous.
  - |
    Levant les mains, Jésus rend grâce.
    De nos yeux le brouillard s’efface,
    Nous le voyons ressuscité
    Dans sa beauté.
credits: "Roger Chapal 1912-1997 — © Auteur (112a)"
