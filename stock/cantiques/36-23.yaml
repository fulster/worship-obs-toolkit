numero: "36-23"
titre: "Dieu notre Père, Dieu de lumière"
couplets:
  - |
    Dieu notre Père,
    Dieu de lumière,
    Que ton Eglise,
    Humble et soumise,
    Soit ta servante sur la terre !
  - |
    Qu'elle s'unisse
    Pour ton service,
    Montrant au monde
    Sa foi profonde,
    Par plus d'amour et de justice !
  - |
    Dieu d'espérance,
    Prends sa défense !
    Quand on l'outrage,
    Que son courage
    Soit la douceur, la patience !
credits: "Edmond Pidoux 1908-2004 — © Fondation d'édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
