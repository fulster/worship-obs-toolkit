numero: "12-01"
titre: "Je louerai l'Eternel"
source: "Psaume 9"
couplets:
  - |
    Je louerai l'Eternel de tout mon cœur,
    Je raconterai toutes tes merveilles,
    Je chanterai ton nom.
    Je louerai l'Eternel de tout mon cœur,
    Je ferai de toi le sujet de ma joie,
    Alléluia !
  - |
    Dieu, l'Eternel, est roi, il règne à jamais ;
    Pour le jugement, il dresse son trône :
    Il jugera la terre.
    Dieu, l'Eternel, est roi, il règne à jamais ;
    Le monde verra la force de son bras,
    Alléluia !
  - |
    Dieu voit les opprimés, il est leur abri,
    Leur refuge au temps des grandes détresses,
    Son nom est leur salut.
    Dieu voit les opprimés, il est leur abri,
    Il sauve les siens, car il est le Dieu saint,
    Alléluia !
  - |
    Chantez à l'Eternel qui règne à toujours,
    Lui dont la bonté, parmi tous les peuples,
    S'adresse aux malheureux !
    Chantez à l'Eternel qui règne à toujours !
    Il entend les cris de ceux qu'on oublie.
    Alléluia !
  - |
    Gloire au Père et au Fils, et au Saint-Esprit,
    Au commencement, aujourd'hui, toujours,
    Et aux siècles des siècles !
    Gloire au Père et au Fils, et au Saint-Esprit,
    A celui qui est, qui était et qui vient,
    Alléluia !
    Str. 1 : Louis Segond 1810-1885 / str. 2-5 Yves Kéler (*1939)
    © T : Auteur (138)
traductions:
  - langue: "en"
    couplets:
      - |
        Praise, I will praise you, Lord with all my heart.
        O God, I will tell the wonders of your ways,
        And glorify your name.
        Praise, I will praise you, Lord with all my heart.
        In you I will find the source of all my joy.
        Alleluia !
  - langue: "de"
    couplets:
      - |
        Ich lobe meinen Gott von ganzem Herzen
        Erzählen will ich von all seinen Wundern
        Und singen seinem Namen.
        Ich lobe meinen Gott von ganzem Herzen
        Ich freue mich und bin fröhlich, Herr, in dir !
        Halleluja !
        © T : Auteur : Gitta Leuschner
        Nederlands
  - langue: "xx"
    couplets:
      - |
        Ik wil u loven, Heer, met heel mijn hart.
        O God ik vertel van uw grote wondren,
        Ik juich en zing uw naam.
        Ik wil u loven, Heer, met heel mijn hart.
        Ik vind in uw naam, de blijdschap van 't bestaan,
        Halleluja !
