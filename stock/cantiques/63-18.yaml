numero: "63-18"
titre: "Agneau de Dieu"
couplets:
  - |
    Hymne au Christ, donné pour la vie du monde (Agnus Dei)
    Agneau de Dieu qui ôtes le péché du monde,
    prends pitié de nous !
    Agneau de Dieu qui ôtes le péché du monde,
    prends pitié de nous !
    Agneau de Dieu qui ôtes le péché du monde,
    donne-nous ta paix !
