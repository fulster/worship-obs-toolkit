numero: "62-82"
titre: "Bénis-nous, Seigneur"
couplets:
  - |
    Bénis-nous, Seigneur, tiens-nous tous ensemble,
    Pour être du Christ témoins véridiques !
    Nul ne reste seul au sein de ton peuple,
    Sa joie, sa tristesse, tu viens les bénir.
  - |
    Il est vain, Seigneur, que tu nous bénisses
    Si nos mains serrées gardent tes richesses ;
    Tes dons les meilleurs resteront stériles
    Si l’on ne partage ce qui vient de toi.
  - |
    Mets dans notre cœur la paix que tu donnes
    Pour en témoigner au sein de ce monde
    Et lui révéler la vie véritable.
    Que ta joie efface les pleurs du semeur !
    Répertoire commun protestant francophone 2004
    T : © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)
    English (new version 2009, with one extra verse)
credits: "© Auteur (150)"
traductions:
  - langue: "en"
    couplets:
      - |
        Bless and keep us, God, in your love united,
        from your family never separated.
        You make all things new as we follow after;
        whether tears or laughter, we belong to you.
      - |
        Blessing shrivels up when your children hoard it;
        move us then to share, for we can afford it:
        blessing only grows in the act of sharing,
        in a life of caring; love that heals and grows.
      - |
        Fill your world with peace, such as you intended.
        Teach us to prize the earth, love, replenish, tend it.
        God, uplift, fulfil all who sow in sadness,
        let them reap with gladness, by your kingdom thrilled.
      - |
        You renew our life, changing tears to laughter;
        we belong to you, so we follow after.
        Bless and keep us, God, in your love united,
        never separated from your living Word.
        Frederik (Fred) Herman Kaan *1929
        © Stainer & Bell Ltd, PO Box 110, Victoria House, 23 Gruneisen Road, London N3 1DZ, England (65)
  - langue: "de"
    couplets:
      - |
        Komm, Herr, segne uns, dass wir uns nicht trennen,
        sondern überall uns zu Dir bekennen.
        Nie sind wir allein, stets sind wir die Deinen.
        Lachen oder weinen wird gesegnet sein.
      - |
        Keiner kann allein Segen sich bewahren.
        Weil du reichlich gibst, müssen wir nicht sparen.
        Segen kann gedeihn, wo wir alles teilen,
        Schlimmen Schaden heilen, lieben und verzeihn.
      - |
        Frieden gabst du schon, Friede muss noch werden,
        Wie du ihn versprichst uns zum Wohl auf Erden.
        Hilf, dass wir ihn tun, wo wir ihn erspähen;
        Die mit Tränen säen, werden in ihm ruhn.
        Dieter Trautwein *1928
        © Strube Verlag, Pettenkoferstr. 24, D-80336 München (67)
        Italiano
  - langue: "xx"
    couplets:
      - |
        Benedici noi, Signor, ti preghiamo,
        Con la grazia tua, non ci disperdiamo.
        Sempre siamo i tuoi, siamo i tuoi figli.
        La nostra gioia e il pianto giungeranno a te.
      - |
        Senza te, Signor, siamo nel dolore.
        Riversa su noi tua benedizione.
        La grazia crescerà il ben’ condividendo.
        I figli tuoi ricolma del tuo grande amor.
      - |
        La pace viene da te, sempre ce l’ hai concessa.
        Il mondo grida a te : Tu ce l’hai promesso.
        Con pianto seminar e mietere con gioia
        La tua pace doni. Grazie a te, Signor.
        S. Baldegger
        Español
  - langue: "xx"
    couplets:
      - |
        Bendice Señor, a todos nosotros unidos.
        Que de tu familia nunca estemos separados ;
        Haznos todo el bien, cuando te seguimos ;
        Lloros como risas vas a bendecir.
      - |
        Nadie obtiene por sí solo bendiciones,
        Abundancia otorgas, gracias desprendiendo.
        Prospera el bien, cuando amamos,
        males remediamos con perdón y amor.
      - |
        Venga paz al mundo como antiguamente ;
        En tu promesa, en el amor clemente.
        Haz que sea así, lágrimas vertiendo,
        E igualmente sufriendo, venga el fin glorioso.
        Claudia Nelly
