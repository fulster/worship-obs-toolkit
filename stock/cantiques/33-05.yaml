numero: "33-05"
titre: "Agneau de Dieu, tu t’es donné"
couplets:
  - |
    Agneau de Dieu, tu t’es donné
    Dans ton amour suprême.
    Pour l’homme injuste et condamné
    Tu t’es livré toi-même.
    Quand sous la croix tu fléchissais,
    C’est nos péchés que tu portais :
    Nous sommes les complices
    Des hommes faux qui t’ont jugé
    Et des bourreaux qui t’ont frappé
    Au nom de leur justice.
  - |
    Mais par ta mort, ô Jésus-Christ,
    Tu m’as rendu la vie.
    Par tes tourments, tu m’as guéri
    Et tu me justifies.
    Né de la grâce et de la foi,
    Dès maintenant je trouve en toi
    La joie et l’espérance.
    Tu me fais voir ta sainteté
    Et tu m’apprends la charité
    Dans l’humble obéissance.
  - |
    Quand, au grand jour du jugement,
    Tous nous devrons paraître,
    A mes côtés, dans ce moment,
    Tu te feras connaître.
    Je te verrai, mon Rédempteur,
    Mon défenseur et mon Sauveur,
    Toi dont l’amour fidèle,
    Au prix du sang me délivra,
    Et jusqu’au ciel me conduira,
    Vers la vie éternelle.
credits: "Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2 (31)"
