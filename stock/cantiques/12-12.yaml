numero: "12-12"
titre: "Notre Dieu est délivrance"
source: "Psaume 68"
refrain: |
  Notre Dieu est délivrance !
  Il se lève, il nous sauve.
  Il est le Dieu de notre Histoire,
  Que les peuples lui rendent gloire !
couplets:
  - |
    Souviens-toi toujours, peuple du Seigneur :
    Le jour où ton Dieu s’est levé,
    Tous ses ennemis ont fui devant lui
    Comme fumée s’envole au vent.
    Il t’a délivré du pays d’Egypte,
    Des chaînes de tes esclavages ;
    Il t’a fait passer à travers la mer,
    Puis il t’a nourri au désert.
  - |
    Il a rassemblé tous les dispersés ;
    Il fit rentrer les déportés ;
    Il a délivré tous les enchaînés ;
    Il nous a redonné la paix.
    Il rabaisse à terre riches et puissants ;
    L’humble de cœur il le relève,
    Garde l’orphelin, soutient l’étranger,
    Remet debout les accablés.
  - |
    Peuples de la terre, louez le Seigneur !
    Car il nous juge avec justice.
    Au fil de l’histoire, guide des nations,
    Il les conduit avec droiture.
    Tous les continents que Dieu a créés,
    Un jour viendront lui rendre gloire ;
    Les peuples lointains, en battant des mains,
    L’acclameront tous dans la joie.
