numero: "43-08"
titre: "Prends pitié de moi, Seigneur"
couplets:
  - |
    Prends pitié de moi, Seigneur : écoute ta bonté
    Et que ton amour, Seigneur, efface mon péché !
    Le fardeau de ma détresse
    Alourdit mon cœur,
    Que le don de ta promesse
    Apaise ma peur.
    O mon Dieu, prends pitié de moi :
    J’ai péché contre toi.
  - |
    Fais renaître en moi, Seigneur, la paix de ton salut
    Et fais-moi par ton amour aimer de plus en plus.
    Ton pardon est mon ancrage,
    Ma joie, mon rocher,
    Que la foi soit le rivage
    De ma liberté !
    O mon Dieu, prends pitié de moi :
    J’ai péché contre toi.
credits: "Antoine Nouis *1955 d’après Roger Coutelle *1922 — © Auteur (117)"
