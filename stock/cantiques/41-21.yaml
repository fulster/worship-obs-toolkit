numero: "41-21"
titre: "Que toute la terre"
couplets:
  - |
    Que toute la terre
    Acclame ton nom,
    Jésus, notre frère,
    Toi notre pardon !
    Que chacun s’incline
    Devant ta grandeur :
    Toi seul en es digne,
    A toi seul l’honneur !
  - |
    Toi qui es le Maître,
    Le Roi, le Seigneur,
    Tu as voulu naître
    Comme un serviteur.
    Parole éternelle,
    Verbe créateur,
    Une chair mortelle
    Voile ta splendeur.
  - |
    O toi qui nous aimes,
    Tu t’es abaissé
    Jusqu’à la mort même,
    Jésus crucifié.
    Ta mort nous fait vivre
    Et c’est à ce prix
    Que nous sommes libres,
    Pardonnés, guéris.
  - |
    A toi nos louanges,
    Christ ressuscité ;
    Plus haut que les anges
    Ton nom est chanté.
    En attendant l’heure
    Où tu reviendras,
    Avec nous demeure
    Et guide nos pas !
