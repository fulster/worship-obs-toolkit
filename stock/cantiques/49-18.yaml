numero: "49-18"
titre: "Vient le soir, la nuit descend"
couplets:
  - |
    Vient le soir, la nuit descend,
    Bientôt tout s’endort.
    Dans la paix du firmament,
    Dieu seul veille encor.
  - |
    Oui, Dieu veille et prend sur lui
    Nos maux, nos douleurs,
    Il éclaire en nous la nuit
    Qui saisit nos cœurs.
  - |
    Reste avec nous, remplis nos cœurs
    De sérénité !
    Garde-nous, tes serviteurs,
    Ta fidélité !
  - |
    Dieu, dont la fidélité
    Nous garde en ta main,
    Donne après l’obscurité
    Un clair lendemain !
credits: "Yves Kéler *1939 et Marguerite Rosenstiehl (XXe) — © 138"
