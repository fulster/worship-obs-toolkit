numero: "33-32"
titre: "Jésus, ton peuple vient à toi"
couplets:
  - |
    Jésus, ton peuple vient à toi !
    Les tiens t’accueillent comme un roi !
    Alléluia ! alléluia !
    Écoute-les, de tout leur cœur,
    Te proclamer pour leur Seigneur !
    Alléluia ! alléluia !
  - |
    Tu vois des palmes dans les mains
    Et des manteaux sur ton chemin.
    Alléluia ! alléluia !
    Rien n’est trop beau, trop précieux
    Pour l’envoyé venu de Dieu.
    Alléluia ! alléluia !
  - |
    Tu es le roi le plus parfait.
    Tu viens, porteur de notre paix.
    Alléluia ! alléluia !
    Ton seul pouvoir est dans l’amour :
    Par lui tu dois régner un jour.
    Alléluia ! alléluia !
  - |
    Mets dans nos cœurs ta charité
    Pour qu’ils se donnent sans compter !
    Alléluia ! alléluia !
    Que ton Royaume, aux yeux de tous,
    Déjà se montre parmi nous !
    Alléluia ! alléluia !
credits: "Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
