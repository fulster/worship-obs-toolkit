numero: "45-06"
titre: "O Jésus, mon frère"
couplets:
  - |
    O Jésus, mon frère,
    Ma joie, ma lumière,
    Au fond de ma vie ;
    Ta présence est douce
    Comme un flot de source,
    Un chant dans la nuit.
    Jésus, prince de la vie,
    Tout le temps et tout l'espace
    Brillent de ta grâce.
  - |
    Au temps de l'épreuve,
    Que ma joie demeure,
    O Jésus, en toi !
    Dans le bonheur même,
    Que ton nom devienne
    La plus haute joie,
    Jésus, mon frère et mon Roi,
    Toi l'espoir, toi le mystère,
    La paix sur la terre.
  - |
    O Jésus qui m'aimes,
    Ta parole sème
    Sur moi tant de dons ;
    Seule ta présence
    Met dans ton silence
    Un désir profond.
    Jésus, je salue ton nom.
    En toi, Jésus, à toute heure,
    Que ma joie demeure !
credits: "Henri Capieu 1909-1993 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (30)"
