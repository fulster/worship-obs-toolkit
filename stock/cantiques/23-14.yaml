numero: "23-14"
titre: "L’enfant qui nous arrive"
couplets:
  - |
    L’enfant qui nous arrive,
    Pour tous quel grand bonheur !
    O Dieu ! tu veux qu’il vive,
    Que Christ soit son Seigneur.
    O Dieu ! tu veux qu’il vive,
    Que Christ soit son Seigneur.
  - |
    Pour son père et sa mère
    Nous voulons te prier,
    Marche avec eux sur terre
    Et bénis leur foyer.
    Marche avec eux sur terre
    Et bénis leur foyer.
  - |
    Pour l’enfant qu’on baptise,
    Soyons de vrais amis !
    Qu’il entre dans l’Eglise
    Et qu’il y soit chez lui !
    Qu’il entre dans l’Eglise
    Et qu’il y soit chez lui !
  - |
    Nous devrons lui apprendre
    Le grand amour de Dieu,
    Le dire en des mots tendres
    Et le montrer surtout.
    Le dire en des mots tendres
    Et le montrer surtout.
  - |
    O Dieu ! par le baptême
    Prends-nous dans ta maison !
    Prends-nous dans ton Royaume,
    Par Jésus nous vivrons !
    Prends-nous dans ton Royaume,
    Par Jésus nous vivrons !
    Yves Kéler (*1939)
    © Auteur (138)
credits: "Kurt Rommel *1926 — © Christophorus Verlag, Liebknechtstr. 33, D-70565 Stuttgart"
traductions:
  - langue: "de"
    couplets:
      - |
        Ein Kind ist angekommen.
        Wir alle freun uns sehr.
        Gott selber gab dies Leben.
        Er bleibt des Kindes Herr.
        Gott selber gab dies Leben.
        Er bleibt des Kindes Herr.
      - |
        Wir beten für die Eltern.
        Sie brauchen das Gebet.
        Sie leben alle davon,
        dass Gott mit ihnen geht.
        Sie leben alle davon,
        dass Gott mit ihnen geht.
      - |
        Wir wollen diesem Kinde
        recht gute Freunde sein
        und laden es mit Freude
        in die Gemeinde ein,
        und laden es mit Freude
        in die Gemeinde ein.
      - |
        Wir werden ihm auch sagen,
        wie lieb Gott alle hat.
        Wir sagen es mit Worten
        und sagen’s mit der Tat.
        Wir sagen es mit Worten
        und sagen’s mit der Tat.
      - |
        Gott nimmt das Kind beim Taufen
        in die Gemeinde auf.
        In Jesu Christi Namen
        beginnt sein Lebenslauf.
        In Jesu Christi Namen
        beginnt sein Lebenslauf.
