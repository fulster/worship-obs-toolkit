numero: "22-10"
titre: "Voix des prophètes"
couplets:
  - |
    Voix des prophètes, souffle de Dieu,
    Fais-nous connaître le Père !
    Vent de tempête, bible de feu,
    Parole et Loi de Dieu !
  - |
    Voix des apôtres, voix de l’Esprit
    Flamme, espérance et message !
    D’un siècle à l’autre, porte la vie,
    Parole de l’Esprit !
  - |
    Verbe admirable, voix de Jésus,
    Source d’amour et de vie !
    Inépuisable est ta vertu,
    Parole de Jésus !
credits: "Germaine de Lioncourt *1925 — © Groupe Fleurus-Mame, c/o SECLI 05/004, Abbaye Sainte Scholastique, F-81110 Dourgne"
