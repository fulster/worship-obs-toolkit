numero: "Ps 138"
titre: "Que tout mon cœur soit dans mon chant"
couplets:
  - |
    Que tout mon cœur soit dans mon chant ;
    Qu’il soit brûlant De tes louanges.
    Je te rends grâce en ta maison ;
    Je loue ton nom Devant les anges.
    Tu es venu pour exalter
    La renommée De ta parole.
    J’adore ta fidélité
    Et ta bonté Qui me console.
  - |
    Tu me réponds dès que je crie ;
    Tu élargis Mon espérance.
    Même les grands t’écouteront
    Et béniront Ta providence.
    Ton saint amour, ô roi des cieux,
    Veille en tous lieux Sur toutes choses.
    Dans ses projets tu suis des yeux
    L’homme orgueilleux : Tu en disposes.
  - |
    Ta paix, mon Dieu, dure à toujours ;
    C’est ton amour Qui me délivre.
    Quand je suis le plus éprouvé
    Ton bras levé Me fait revivre.
    Et quand je suis au désespoir,
    C’est ton pouvoir Qui me relève.
    Ce qu’il t’a plu de commencer
    Sans se lasser Ta main l’achève.
    Clément Marot 1496-1544 / Roger Chapal 1912-1997
    © Fédération Musique et Chant de la Réforme, c/o Olivétan, BP 4464, F-69241 LYON Cedex 04
traductions:
  - langue: "de"
    couplets:
      - |
        Mein ganzes Herz erhebet dich;
        vor dir will ich mein Loblied singen
        und will in deinem Heiligtum, / Herr,
        dir zum Ruhm mein Opfer bringen.
        Dein Name strahlt an allem Ort, / und
        durch dein Wort wird hell das Leben.
        Anbetung, Ehr und Herrlichkeit
        bin ich bereit, dir, Gott, zu geben.
      - |
        Dein Name, Herr, ist unser Hort ;
        du hast dein Wort an mir erfüllet ;
        du hast auf mein Gebet gemerkt
        und mich gestärkt, mein Herz gestillet.
        Die Völker werden preisen dich
        und Mächt’ge sich zu dir hin kehren,
        wenn sie das Wort vom ewgen Bund
        aus deinem Mund verkünden hören.
      - |
        Herr, ob den Himmeln thronst du hoch
        und siehest doch die Tiefgebeugten.
        In Angst und Widerwärtigkeit
        wird mir allzeit dein Antlitz leuchten.
        Mach mich von allem Elend frei,
        denn deine Treu wird niemals enden.
        Du wirst nach deinem ewgen Rat,
        Herr, gross an Tat, dein Werk vollenden.
        Matthias Jorissen 1739-1823 / Katholisches Einheitsgesangbuch 1972
        © Verband der Diözesen Deutschlands, Kaiserstr. 124, D53113 Bonn
  - langue: "en"
    couplets:
      - |
        Thee will I love, my God and King,
        Thee will I sing, my strength and tower
        For evermore thee will I trust,
        O God most just of truth and power.
        Thou all things hast in order placed,
        Yea, for thy pleasure hast created.
        And on thy throne, unseen, unknown,
        Reignest alone in glory seated.
      - |
        Set in my heart thy love I find /My
        wandering mind to thee thou leadest.
        My trembling hope, my strong desire
        With heavenly fire thou kindly feedest.
        Lo, all things fair thy path prepare
        Thy beauty to my spirit calleth ;
        Thine to remain in joy or pain,
        And count it gain whate’er befalleth.
      - |
        O more and more thy love extend,
        My life befriend with heavenly pleasure ;
        That I may win thy paradise, / thy
        pearl of price, Thy countless treasure ;
        Since but in thee I can go free
        From earthly care and vain oppression :
        This prayer I make for Jesus’ sake
        That thou me take in thy possession.
        Nederlands
  - langue: "xx"
    couplets:
      - |
        U loof ik, Heer met hart en ziel,
        In eerbied kniel ik voor u neder.
        Ja, in de tegenwoordigheid
        Der goden wijd ik u mijn beden.
        Naar ‘t heiligdom waar Gij vertoeft
        Hef ik het hoofd, ik zal u prijzen.
        Gij zult, o Here, wijd en zijd
        Uw heerlijkheid en trouw bewijzen.
      - |
        Daar zingen zij, in God verblijd,
        Aan Hem, gewijd, van ‘s Heren wegen.
        Groot is des Heren heerlijkheid,
        Zijn majesteit ten top gestegen.
        Hij slaat, ofschoon oneindig hoog,
        Op hen het oog die needrig knielen.
        Maar ziet van ver met gramschap aan
        De eigenwaan van trotse zielen.
      - |
        Als ik omringd door tegenspoed,
        Bezwijken moet, schenkt Gij mij leven.
        Wanneer mijn vijands toorn ontbrandt,
        Uw rechterhand zal redding geven.
        De Heer is zo getrouw als sterk,
        Hij zal zijn werk voor mij voleinden.
        Verlaat niet wat uw hand begon,
        O Levensbron, wil bijstand zenden.
