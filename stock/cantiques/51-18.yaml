numero: "51-18"
titre: "Frappe des mains"
couplets:
  - |
    Frappe des mains et chante ta joie, / Dès le matin, glorifie ton Roi ! (bis)
    Car dans ton cœur il est entré, / Le Roi de gloire pour y régner,
    Règne d’amour, règne de paix, / Louange à toi, Jésus, mon Roi !
    Hélène Précigout (XXe)
