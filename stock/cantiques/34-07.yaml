numero: "34-07"
titre: "Christ est ressuscité"
couplets:
  - |
    Christ est ressuscité, de la mort a triomphé.
    Réjouissons-nous en ce jour, Christ vivant l’est pour toujours. Alléluia !
  - |
    C’est pour l’éternité que Jésus a triomphé ;
    Célébrons le Père et le Fils dans l’unité de l’Esprit ! Alléluia !
  - |
    Alléluia ! Alléluia ! Alléluia ! Réjouissons-nous en ce jour,
    Christ vivant l’est pour toujours ! Alléluia !
    d’après l’allemand Christ ist erstanden
traductions:
  - langue: "de"
    couplets:
      - |
        Christ ist erstanden von der Marter alle. /Des solln wir alle froh sein ; / Christ will unser Trost sein. / Kyrieleis.
      - |
        Wär er nicht erstanden, so wär die Welt vergangen. / Seit dass er erstanden ist, / so freut sich alles, was da ist. / Kyrieleis.
      - |
        Halleluja, Halleluja, Halleluja. / Des solln wir alle froh sein ; / Christ will unser Trost sein. / Kyrieleis.
        Bavière-Autriche XIIe-XVe
  - langue: "en"
    couplets:
      - |
        Christ is now ris’n again / from his death and all his pain ; / therefore will we merry be, / and rejoice with him gladly. / Kyrieleis !
      - |
        Had he not ris’n again / we had been lost, this is plain ; / but since he is ris’n indeed / let us love him with all speed. / Kyrieleis !
      - |
        Alleluia ! Alleluia ! Alleluia ! / Therefore will we merry be, / and rejoice with him gladly. / Kyrieleis !
