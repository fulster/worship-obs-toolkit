numero: "64-28"
titre: "Psaume 32"
source: "Antienne parlée :"
couplets:
  - |
    Heureux celui que Dieu décharge de sa faute. (verset 1)
  - |
    Béni soit Dieu, qui nous a pardonné en Christ !
    Antienne chantée : 63-43
    Heureux celui que Dieu décharge de sa faute,
    et qui est pardonné du mal qu’il a commis !
    Heureux l’homme que le Seigneur ne traite pas en coupable,
    et qui est exempt de toute mauvaise foi !
    Tant que je ne reconnaissais pas ma faute,
    mes dernières forces s’épuisaient en plaintes quotidiennes.
    Car de jour et de nuit, Seigneur, tes coups pleuvaient sur moi,
    et j’étais épuisé, comme une plante au plus chaud de l’été.
    Mais je t’ai avoué ma faute, je ne t’ai pas caché mes torts.
    Je me suis dit : « Je suis rebelle au Seigneur,
    je dois le reconnaître devant lui. »
    Et toi, tu m’as déchargé de ma faute.
    Voilà pourquoi tous les fidèles devraient t’adresser leur prière
    quand ils découvrent leur faute.
    Si le danger menace de les submerger,
    ils resteront hors d’atteinte.
    Tu es un abri pour moi,
    tu me préserves de la détresse.
    Je crierai ma joie pour la protection dont tu m’entoures.
    Gloire au Père, au Fils, au Saint-Esprit,
    maintenant et à jamais,
    au Dieu qui est, qui était et qui vient,
    pour les siècles des siècles ! Amen.
    (Repentance, Pardon)
