numero: "36-22"
titre: "Seigneur, tu cherches tes enfants"
refrain: |
  Seigneur, Seigneur !
  Oh ! prends en ton Eglise
  Tous nos frères de la terre
  Dans un même amour !
couplets:
  - |
    Seigneur, tu cherches tes enfants
    Car tu es l'amour.
    Tu veux unir tous les vivants
    Grâce à ton amour.
  - |
    Seigneur, tu sauves de la mort
    Car tu es l'amour.
    Fais-nous les membres de ton corps
    Grâce à ton amour !
  - |
    Seigneur, tu calmes notre faim
    Car tu es l'amour.
    Partage à tous le même pain
    Grâce à ton amour !
  - |
    Seigneur, tu vois le monde entier
    Car tu es l'amour
    Fais-lui trouver son unité
    Grâce à ton amour !
  - |
    Seigneur, tu nous promis la paix
    Car tu es l'amour.
    Etends son règne désormais
    Grâce à ton amour !
credits: "Didier Rimaud 1922-2003 / Bernard Geoffroy 1910-1965 — © Le Seuil, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne"
