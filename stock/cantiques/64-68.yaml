numero: "64-68"
titre: "Le Sommaire de la Loi"
couplets:
  - |
    Voici de quelle manière notre Seigneur Jésus-Christ nous
    ordonne d’obéir à cette Loi :
    Tu aimeras le Seigneur ton Dieu de tout ton cœur, de toute
    ton âme, de toute ta pensée et de toute ta force.
    C’est là le grand, le premier commandement.
    Et voici le second, qui lui est semblable:
    Tu aimeras ton prochain comme toi-même.
    Il n’y a pas d’autre commandement plus grand que ceux-là.
    (Marc 12,29-31)
