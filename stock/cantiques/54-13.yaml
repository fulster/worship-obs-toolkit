numero: "54-13"
titre: "Il est vivant"
couplets:
  - |
    (1er groupe) Il est vivant ! Tu l’as vu la première.
    Parle, Marie de Magdala !
    (2e groupe) Hors du tombeau, debout dans la lumière,
    Il dit « Marie ! » – c’était sa voix !
    Refrain (tous)
    Nous l’avons vu ressuscité,
    Nous, témoins de la vérité :
    Il est venu, il reviendra,
    Amen, alléluia ! (bis)
  - |
    (1er groupe) Le cœur brûlant, vous alliez près du Maître,
    Vers Emmaüs, sur le chemin.
    (2e groupe) Nous étions deux, il s’est fait reconnaître,
    Le soir à la fraction du pain.
  - |
    (1er groupe) Vous étiez onze, nous dit l’Ecriture,
    La nuit couvrait Jérusalem.
    (2e groupe) Il a paru, il montrait ses blessures,
    Il a soufflé son Esprit saint.
  - |
    (1er groupe) Est-ce Jésus, celui qui t’a fait signe
    De l’approcher ? Dis-nous, Thomas !
    (2e groupe) Sur mon Seigneur et mon Dieu, moi, indigne,
    J’ai vu les marques de la croix.
  - |
    (1er groupe) Depuis Damas, tu ne peux plus te taire,
    Confirme-nous ce que tu crois !
    (2e groupe) Moi, Paul, je dis qu’ils étaient cinq cents frères,
    Témoins du Christ, tous à la fois. Refr.
    Jacqueline Frédéric Frié (XXe)
