numero: "34-28"
titre: "Auprès du Père il est monté"
couplets:
  - |
    Auprès du Père il est monté, alléluia !
    Jésus vivant, ressuscité, alléluia !
  - |
    Il était mort pour nous en croix, alléluia !
    Mais Dieu l’a fait Seigneur et Roi, alléluia !
  - |
    Et maintenant, à ses côtés, alléluia !
    Pour nous il veut intercéder, alléluia !
  - |
    A notre Père il nous unit, alléluia !
    Il nous promet le Saint-Esprit, alléluia !
  - |
    Grande est la joie dans notre cœur, alléluia !
    Nous adorons le Christ Sauveur, alléluia !
  - |
    Louange et gloire, honneur sans fin, alléluia !
    Au Père, au Fils, à l’Esprit saint, alléluia !
    Hymne latine (XVe) / Psaumes, Cantiques et Textes 1976
    © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2
credits: "Bartholomäus Gesius 1560-1613"
traductions:
  - langue: "de"
    couplets:
      - |
        Gen Himmel aufgefahren ist, Halleluja,
        Der Ehrenkönig Jesus Christ, Halleluja.
      - |
        Er sitzt zu Gottes rechter Hand, Halleluja,
        Herrscht über Himm’l und alle Land. Halleluja.
      - |
        Nun ist erfüllt, was g’schrieben ist, Halleluja,
        In Psalmen von dem Herren Christ. Halleluja.
  - langue: "de"
    couplets:
      - |
        Drum jauchzen wir mit grossem Schalln, Halleluja,
        Dem Herren Christ zum Wohlgefalln, Halleluja.
      - |
        Der Heiligen Dreieinigkeit, Halleluja,
        Sei Lob und Preis in Ewigkeit, Halleluja.
