numero: "56-01"
titre: "Dans le désert Dieu a parlé"
source: "Go down, Moses"
refrain: |
  Descends, Moïse,
  En Egypte descends !
  Dis à Pharaon :
  Libère Israël !
couplets:
  - |
    Dans le désert, Dieu a parlé :
    Libère Israël !
    Du milieu d’un buisson en feu :
    Libère Israël !
  - |
    Car mon peuple est chargé de liens :
    Libère Israël !
    Opprimé par les Egyptiens :
    Libère Israël !
  - |
    Je suis l’Eternel tout-puissant :
    Libère Israël
    Je briserai le joug pesant :
    Libère Israël ! Refr.
    Alfred Kuen *1921
    © Joie de Vivre, 2-4 rue des Magasins, F-67000 Strasbourg (40)
traductions:
  - langue: "en"
    couplets:
      - |
        When Israel was in Egypt’s land – / Let my people go !
        oppressed so hard they could not stand – / Let my people go !
        Chorus
        Go down, Moses, / way down in Egypt’s land,
        tell old Pharaoh : / Let my people go !
      - |
        No more shall they in bondage toil – / Let my people go !
        let them come out with Egypt’s spoil – / Let my people go ! Chorus
      - |
        The Lord told Moses what to do – / Let my people go !
        to lead the children of Israel through – / Let my people go ! Chorus
      - |
        O come along, Moses, you’ll not get lost – / Let my people go !
        stretch out your rod, and come across – / Let my people go ! Chorus
      - |
        When they reached the other shore – / Let my people go !
        they sang a song of triumph o’er – / Let my people go ! Chorus
      - |
        So let us all from bondage flee – / Let my people go !
        and Jesus, he will set us free – / Let my people go ! Chorus
