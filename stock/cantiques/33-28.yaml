numero: "33-28"
titre: "Vois, là-bas, mettre le Sauveur en croix"
couplets:
  - |
    Vois, là-bas, mettre le Seigneur en croix ! (bis)
    Oh ! Le cœur saisi d’effroi,
    Je tremble, tremble, tremble. . .
    Vois, là-bas, mettre le Seigneur en croix !
  - |
    Vois, là-bas, clouer le Seigneur au bois ! (bis)
    Oh ! Le cœur saisi d’effroi,
    Je tremble, tremble, tremble. . .
    Vois, là-bas clouer le Seigneur au bois !
  - |
    Vois, là-bas, de leur lance ils l’ont percé ! (bis)
    Oh ! Le cœur saisi d’effroi,
    Je tremble, tremble, tremble. . .
    Vois, là-bas, de leur lance ils l’ont percé !
  - |
    Vois, là-bas, soudain s’enfuir le soleil ! (bis)
    Oh ! Le cœur saisi d’effroi,
    Je tremble, tremble, tremble. . .
    Vois, là-bas, soudain s’enfuir le soleil !
  - |
    Vois, là-bas, dans la tombe ils l’ont porté ! (bis)
    Oh ! Le cœur saisi d’effroi,
    Je tremble, tremble, tremble. . .
    Vois, là-bas, dans la tombe ils l’ont porté !
  - |
    Vois, là-bas, le Seigneur ressuscité ! (bis)
    Oh ! Le cœur rempli de joie,
    Je chante, chante, chante !
    Vois, là-bas, le Seigneur ressuscité !
    Claire Julien
    © Editions Bethel, 1175 Ch Woodward RR1, Québec, Canada, Lenoxville
