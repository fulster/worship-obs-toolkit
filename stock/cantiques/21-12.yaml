numero: "21-12"
titre: "O Dieu vivant"
refrain: |
  O Dieu vivant, nous tournons nos cœurs vers toi,
  O Dieu vivant, nous t’offrons nos chants de joie.
couplets:
  - |
    Dieu qui étonnes,
    Dieu qui façonnes,
    Humains d’argile,
    Nous tournons nos cœurs vers toi.
  - |
    Rien ne te lasse,
    Berger tenace,
    Dieu qui pardonnes,
    Nous tournons nos cœurs vers toi.
  - |
    Dans nos détresses,
    Dieu des promesses,
    Dieu de mémoire,
    Nous tournons nos cœurs vers toi.
credits: "Henri Künzler (*1931) — © Auteur (139)"
