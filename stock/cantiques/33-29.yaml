numero: "33-29"
titre: "Etais-tu là-bas ?"
couplets:
  - |
    Etais-tu là-bas ? L’as-tu vu,
    Mon Seigneur et mon frère Jésus ?
    L’as-tu vu, dis-moi,
    Quand on l’a mis sur la croix ?
    Quand j’y pense parfois,
    Je tremble d’effroi !
    L’as-tu vu ?
  - |
    Etais-tu là-bas ? L’as-tu vu,
    Mon Seigneur et mon frère Jésus ?
    L’as-tu vu, dis-moi,
    Quand on l’a cloué au bois ?
    Quand j’y pense parfois,
    Je tremble d’effroi !
    L’as-tu vu ?
  - |
    Etais-tu là-bas ? L’as-tu vu,
    Mon Seigneur et mon frère Jésus ?
    L’as-tu vu, brisé,
    Quand on troua son côté ?
    Quand j’y pense parfois,
    Je tremble d’effroi !
    L’as-tu vu ?
  - |
    Etais-tu là-bas ? L’as-tu vu,
    Mon Seigneur et mon frère Jésus ?
    L’as-tu vu, Jésus,
    Quand le soleil disparut ?
    Quand j’y pense parfois,
    Je tremble d’effroi !
    L’as-tu vu ?
  - |
    Etais-tu là-bas ? L’as-tu vu,
    Mon Seigneur et mon frère Jésus ?
    L’as-tu vu, oh ! dis,
    Quand Jésus rendit l’esprit ?
    Quand j’y pense parfois,
    Je tremble d’effroi !
    L’as-tu vu ?
  - |
    Etais-tu là-bas ? L’as-tu vu,
    Mon Seigneur et mon frère Jésus ?
    L’as-tu vu, ami,
    Quand au tombeau ils l’ont mis ?
    Quand j’y pense parfois,
    Je tremble d’effroi !
    L’as-tu vu ?
    Pour finir
    L’as-tu vu ? L’as-tu vu ? L’as-tu vu ?
