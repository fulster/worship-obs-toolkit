numero: "Ps 042B"
titre: "Comme un cerf au loin soupire"
couplets:
  - |
    Comme un cerf au loin soupire
    Après le courant des eaux,
    O Seigneur, je te désire,
    Je t’appelle sans repos.
    Dans ma soif du Dieu vivant,
    Je demande en soupirant :
    Viendra-t-il ce temps de grâce,
    Où j’irai devant ta face ?
  - |
    Pour mon pain, pour mon breuvage,
    J’ai les larmes de mes yeux.
    A plaisir, chacun m’outrage,
    Me disant : « Où est ton Dieu ? »
    Et je songe au temps lointain
    Où, joyeux, parmi les miens,
    J’avançais, prenant leur tête,
    Vers le temple, aux jours de fête !
  - |
    Mais faut-il qu’ainsi tu pleures,
    O mon cœur, sans réconfort ?
    Mon espoir en Dieu demeure :
    Je veux le louer encor.
    Ta colère, Dieu très haut,
    A sur moi roulé ses flots.
    Entends-moi quand je te prie !
    Se peut-il que tu m’oublies ?
  - |
    J’ai vécu devant ta face,
    Protégé par ton amour ;
    Et la nuit, je rendais grâce
    Pour tous tes bienfaits du jour.
    O Seigneur, délivre-moi !
    En tous lieux, je pense à toi.
    Je t’implore en ma détresse,
    Mon rocher, ma forteresse !
  - |
    Tu me vois dans ma misère :
    Voudrais-tu m’abandonner ?
    Guide-moi par ta lumière,
    Montre ta fidélité !
    O mon Dieu, mon protecteur,
    Conduis-moi vers ce bonheur :
    Que mes yeux enfin contemplent
    Ta montagne et ton saint temple !
  - |
    Mais faut-il qu’ainsi tu pleures,
    O mon cœur, sans réconfort ?
    Mon espoir en Dieu demeure,
    Je me réjouis encor.
    Mon salut, c’est l’Eternel,
    Et j’irai vers son autel
    Pour chanter, chanter sans cesse
    Dans la joie et l’allégresse.
credits: "Théodore de Bèze 1519-1605 / Edmond Pidoux 1908-2004 — © Fondation d’édition des Eglises protestantes romandes, C.P. 128, CH-1800 Vevey 2"
