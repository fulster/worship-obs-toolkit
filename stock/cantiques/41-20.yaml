numero: "41-20"
titre: "Jésus, tout l’univers entonne"
couplets:
  - |
    Jésus, tout l’univers entonne
    Un chant à ton honneur.
    Le monde tout entier résonne
    De ta gloire, ô Sauveur.
  - |
    Ton nom, Jésus, pour nous est grâce,
    Amour, vie et pardon.
    En lui nous apparaît ta face,
    O Dieu saint, juste et bon.
  - |
    Ce nom divin est comme un baume,
    Il est la guérison.
    En lui s’approche ton Royaume,
    Eclairant l’horizon.
  - |
    Ce nom fait trembler les abîmes,
    Il fait fuir les démons.
    Il en libère les victimes,
    Il ouvre les prisons.
  - |
    O Christ, que tout genou fléchisse
    A ton nom glorieux !
    Pour t’adorer, que tout s’unisse
    Ici-bas comme aux cieux !
  - |
    Puissance, honneur, louange et gloire
    A ton nom, ô Jésus !
    Ta croix nous donne la victoire,
    En toi est le salut.
credits: "d’après Arthur S. Booth-Clibborn †1938, rév. Répertoire commun protestant francophone 1998 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04 (31)"
