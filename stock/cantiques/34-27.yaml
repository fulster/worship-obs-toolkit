numero: "34-27"
titre: "Sur tous les temps, sur tous les lieux"
couplets:
  - |
    Sur tous les temps, sur tous les lieux, alléluia !
    Tu vas régner auprès de Dieu, alléluia !
  - |
    Sur l’univers tu es Seigneur, alléluia !
    Toi son espoir et son honneur, alléluia !
  - |
    Notre avenir est d’être à toi, alléluia !
    Nous t’attendons, ô notre Roi, alléluia !
  - |
    Tu as promis, pour ton retour, alléluia !
    De nous garder en ton amour, alléluia !
  - |
    Tu es pour nous toujours présent, alléluia !
    Nous te louerons en tous les temps, alléluia !
credits: "Frère Pierre-Etienne *1922 — © Fédération protestante de France, c/o Editions Olivétan, BP 4464, F-69241 LYON Cedex 04"
