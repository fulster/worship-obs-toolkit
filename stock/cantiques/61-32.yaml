numero: "61-32"
titre: "Dieu tout puissant"
couplets:
  - |
    Dieu tout puissant dont la grâce m’accorde,
    Et la justice, et la miséricorde,
    Toute ma vie, je chanterai, Seigneur,
    A ton honneur.
    Pour le temps de Pâques
  - |
    Alléluia ! la mort a lâché prise,
    Dès le matin la victoire est acquise.
    Réjouis-toi sur terre et dans les cieux,
    Cité de Dieu !
credits: "Roger Chapal 1912-1997 — © Auteur (112a)"
