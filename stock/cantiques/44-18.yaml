numero: "44-18"
titre: "Tu es venu jusqu'à nous"
refrain: |
  Dieu tout-puissant, Roi serviteur,
  A ton appel nous te suivons
  Et nous t'offrons nos cœurs en sacrifice.
  A toi l'honneur, Roi serviteur !
couplets:
  - |
    Tu es venu jusqu'à nous,
    Quittant la gloire de ton ciel.
    Tu es venu pour servir,
    Donner ta vie pour nous sauver.
  - |
    Dans le jardin de douleurs
    Tu bois la coupe de malheur,
    En agonie, dis à Dieu :
    J'accomplirai ce que tu veux.
  - |
    Voyez ces mains et ces pieds
    Cloués pour notre liberté !
    Tu nous bénis par ces mains
    Et nous envoies sur tes chemins.
  - |
    En nous, Seigneur, viens régner,
    Et fais de nous des serviteurs.
    Ta gloire veut, à chaque heure,
    Dans le secret nous habiter.
credits: "Graham Kendrick *1950 / Henri Künzler *1931 — © Make Way Music, utilisé avec permission, LTC, 16, av. de la République, F-94000 Créteil (48)"
