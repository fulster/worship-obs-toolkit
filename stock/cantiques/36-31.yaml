numero: "36-31"
titre: "Le peuple de Dieu se lève"
refrain: |
  Le peuple de Dieu se lève,
  Armée puissante au cœur de feu
  Pour vivre et proclamer
  Amour et vérité !
  Le peuple de Dieu se lève !
couplets:
  - |
    O monde torturé, meurtri, défiguré,
    Tu as perdu ton cœur, regarde la lumière !
  - |
    Soldats au cœur d'enfant, revêtu de lumière,
    Petits et sans armure, pauvres de ce monde.
  - |
    Le Christ, notre berger, notre joie, notre vie,
    Brûle comme un feu au creux de nos misères.
  - |
    Pour crier, célébrer Jésus ressuscité,
    Vivant au cœur du monde, Seigneur de l'univers ! Refr.
    Sylvie Barthelemy (XXe)
credits: "© Auteur (104)"
