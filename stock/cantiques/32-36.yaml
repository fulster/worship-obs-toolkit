numero: "32-36"
titre: "Dors, ma merveille"
refrain: |
  A Dieu la gloire,
  Qui règne dans les cieux,
  Et paix sur la terre,
  Paix en tous lieux !
  A Dieu la gloire,
  Qui règne dans les cieux,
  Que chantent victoire
  Les fils de Dieu !
couplets:
  - |
    « Dors, ma merveille,
    Dors et sommeille »,
    Chante la Vierge à son enfant.
    « Dors ma tendresse,
    Dors ma richesse,
    Joseph est là, veillant sur toi. »
  - |
    « Dors, ma lumière,
    Clos tes paupières,
    Ferme ces yeux où rit le ciel !
    Dors, mon sourire,
    Dors, ô mystère
    Qui viens combler mon simple amour. »
  - |
    « O roi des siècles,
    Joie éternelle,
    Qui nais de moi, enfant d’un jour !
    Sauveur du monde,
    Ami des pauvres,
    Vrai Fils de Dieu né dans mon cœur ! »
