numero: "54-02"
titre: "Dieu vient d'allumer un feu"
source: "Noël, feu nouveau"
refrain: |
  Dieu vient d'allumer un feu sur la terre,
  Chantons Noël, chantons le feu !
  Dieu vient d'allumer un feu sur la terre,
  Rassemblons-nous autour du feu !
couplets:
  - |
    Joseph et Marie se sont agenouillés.
    Voyez leurs visages, ils sont illuminés !
  - |
    Les bergers s'assemblent autour du nouveau-né
    Et leur cœur de pauvres en est tout réchauffé.
  - |
    Ce feu si fragile, dit le vieux Siméon,
    Deviendra lumière pour toutes les nations.
  - |
    En suivant l'étoile qui a guidé leurs pas
    Les Mages ont vu la lumière de la foi.
  - |
    Dans la nuit du monde, il vient nous éclairer,
    Dans le froid du monde, il vient nous réchauffer.
credits: "Noël Colombier *1932 — © Air Libre, autorisation SECLI 09/002 (1)"
