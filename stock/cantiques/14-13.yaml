numero: "14-13"
titre: "Nous te bénissons, Seigneur"
refrain: |
  Nous te bénissons, Seigneur, Père, Fils et Saint-Esprit.
  Nous te bénissons, Seigneur, toi la source de la vie.
couplets:
  - |
    Ce que tu as caché aux sages et aux savants,
    Père, c’est aux petits que tu l’as révélé.
  - |
    Père, qui te connaît ? Il n’y a que le Fils
    Et ceux à qui le Fils veut bien le révéler.
  - |
    Venez à moi, vous tous, chargés et fatigués,
    Pour vous mon joug est doux et mon fardeau léger. Refr.
    Mt 11,25-28
