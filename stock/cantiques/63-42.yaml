numero: "63-42"
titre: "Seigneur, aie pitié de nous"
couplets:
  - |
    Seigneur, aie pitié de nous !
    Christ, aie pitié de nous !
    Seigneur, aie pitié de nous ! Amen.
    Grec
    Kyrie eleison !
    Christe eleison !
    Kyrie eleison ! Amen.
    Herr, erbarm’, erbarme dich !
    Christus, erbarme dich !
    Herr, erbarm’ dich über uns ! Amen.
