numero: "61-37"
titre: "O ma joie et mon espérance"
couplets:
  - |
    O ma joie et mon espérance,
    Le Seigneur est mon chant,
    C’est de lui que vient le pardon ;
    En lui j’espère, je ne crains rien ;
    En lui j’espère, je ne crains rien.
    Meine Hoffnung und meine Freude,
    meine Stärke, mein Licht,
    Christus, meine Zuversicht,
    auf dich vertrau’ ich und fürcht mich nicht,
    auf dich vertrau’ ich und fürcht mich nicht.
    In the Lord I’ll be ever thankful,
    in the Lord I’ll will rejoice !
    Look to God, do not be afraid.
    Lift up your voices, the Lord is near.
    Lift up your voices, the Lord is near.
    Català
    El Senyor és la meva força,
    el Senyor el meu cant.
    Ell m’ha estat la salvació.
    En ell confio i no tinc por,
    en ell confio i no tinc por.
    Italiano
    Il Signore è la mia forza
    e io spero in lui.
    Il Signor è il Salvator.
    In lui confido, non ho timor,
    In lui confido, non ho timor.
