numero: "44-12"
titre: "Te ressembler, Jésus"
couplets:
  - |
    Te ressembler, Jésus, c'est mon espoir suprême :
    Penser, agir, aimer toujours plus comme toi.
    Te ressembler, Jésus, c'est mon espoir suprême :
    Par ton Esprit rends-moi semblable à toi !
  - |
    Pour te suivre, ô Jésus, pour servir qui tu aimes,
    Et marcher dans tes pas, d'hésiter garde-moi !
    Pour te suivre, ô Jésus, pour servir qui tu aimes,
    Par ton Esprit rends-moi semblable à toi !
  - |
    Dans l'épreuve, ô Jésus, quand sévit l'adversaire,
    Donne-moi de tenir, fais que je reste droit !
    Dans l'épreuve, ô Jésus, quand sévit l'adversaire,
    Par ton Esprit rends-moi semblable à toi !
credits: "Str. 1 : d'après John Gowans *1934 — © Salvationist Publishing and Supplies, utilisé avec permission, LTC Créteil (60) — Str. 2-3 : Henri Künzler *1931 © Auteur (139)"
