numero: "48-08"
titre: "Frères, ne pleurez pas"
refrain: |
  Frères, ne pleurez pas
  Comme ceux qui n’ont pas d’espérance.
  Frères, ne pleurez pas
  Comme ceux qui n’ont pas la foi.
couplets:
  - |
    Au-delà de la nuit, c’est la lumière,
    A la fin de l’hiver vient le printemps.
    Notre vie, comme un grain qui meurt en terre,
    Va porter du fruit auprès du Dieu vivant.
  - |
    Nous croyons que le Christ venu sur terre
    Par sa croix a triomphé de la mort.
    Quand nos corps s’en retournent à la poussière,
    Dans le cœur de Dieu nous demeurons encor.
  - |
    Quand le poids de la souffrance et du doute
    Est si lourd après la mort d’un ami,
    Tu reviens nous rejoindre sur nos routes,
    Ta parole nous éclaire et nous guérit.
credits: "Noël Colombier *1932 — © Groupe Fleurus-Mame, c/o SECLI 09/002, Abbaye Sainte Scholastique, F-81110 Dourgne (33)"
