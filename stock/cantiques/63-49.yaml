numero: "63-49"
titre: "Christ, agneau de Dieu"
couplets:
  - |
    Christ, agneau de Dieu, qui ôtes le péché du monde,
    O prends pitié de nous ! O prends pitié de nous !
    Christ, agneau de Dieu, qui ôtes le péché du monde,
    O prends pitié de nous ! O prends pitié de nous !
    Christ, agneau de Dieu, qui ôtes le péché du monde,
    Accorde-nous ta paix ! Accorde-nous ta paix !
    Amen.
    Christus, Gottes Lamm, du trägst die Sünde aller Menschen.
    Erbarm dich über uns! Erbarm dich über uns!
    Christus, Gottes Lamm, du trägst die Sünde aller Menschen.
    Erbarm dich über uns! Erbarm dich über uns!
    Christus, Gottes Lamm, du trägst die Sünde aller Menschen.
    Gib Frieden uns, o Herr! Gib Frieden uns, o Herr!
    Amen
credits: "Gerhard P. Michael 1936-2008 — © Auteur (147)"
