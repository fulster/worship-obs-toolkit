numero: "33-09"
titre: "Qu’il est humble, mon Sauveur"
couplets:
  - |
    Qu’il est humble, mon Sauveur,
    Qu’il est doux, mon maître !
    Ils l’ont pris comme un voleur
    En suivant le traître.
    Fils unique et bien-aimé,
    Envoyé du Père,
    Nul ne veut t’accompagner
    Jusqu’à ton calvaire.
  - |
    Pierre, dès qu’il est tenté,
    Jure qu’il t’ignore ;
    Puis, devant sa lâcheté,
    Pleure et pleure encore.
    Tel sera mon repentir
    Si je t’abandonne.
    Mais si je devais faillir,
    O Jésus, pardonne !
  - |
    Tes disciples, sans égard
    Pour ton sacrifice,
    Se dispersent à l’écart,
    Loin de ton supplice.
    De cette infidélité
    Nous serions capables !
    Prends pitié, dans ta bonté,
    De nos cœurs coupables !
  - |
    On te traite en criminel,
    Accablé d’injures,
    Toi que des bourreaux cruels
    Couvrent de blessures.
    S’il nous faut souffrir un jour
    Notre part d’outrages,
    Apprends-nous ton pur amour,
    Ton parfait courage !
  - |
    Au plus fort de tes douleurs,
    O douleur cruelle !
    En voyant ta mère en pleurs,
    Tu t’émeus pour elle.
    Dans ta grâce pour les tiens
    Tu t’émeus de même.
    Ah ! que nous t’aimions enfin
    Comme tu nous aimes !
  - |
    Aide-nous, divin Sauveur,
    A te mieux connaître,
    A te prendre, dans nos cœurs,
    Pour Seigneur et maître !
    En réponse à ton amour,
    Qui nous justifie,
    Aide-nous, à notre tour,
    A donner nos vies !
credits: "d’après Louis-Samuel Pidoux 1878-1953 — © Avec l'autorisation de Frédy Henry Editions Sàrl - 1115 Vullierens"
