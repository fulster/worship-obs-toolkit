numero: "Ps 099"
titre: "Dans tout l'univers le Seigneur est roi"
couplets:
  - |
    Dans tout l'univers le Seigneur est roi ;
    La terre a frémi d'espoir et d'effroi.
    Vous qui le servez, écoutez sa voix,
    Vous que sa lumière
    Dans ce lieu éclaire.
  - |
    Ton royaume saint a pour fondement
    Le droit établi par tes jugements.
    Déjà nous voyons son avènement.
    Fais que ta justice
    En nous s'affermisse.
  - |
    Toi qui répondis à tes serviteurs,
    Qui vins soutenir leurs mains et leurs cœurs,
    Entends aujourd'hui l'appel des veilleurs :
    Reçois nos prières
    Pour toute la terre.
  - |
    Tu nous as fait voir ta grande bonté ;
    Tu n'as pas laissé nos pas s'écarter ;
    Mets en nous le feu de ta sainteté.
    Fais par ta victoire
    Resplendir ta gloire.
credits: "Théodore de Bèze 1519-1605 / Roger Chapal 1912-1997 — © Fédération Musique et Chant de la Réforme, c/o Olivétan, BP 4464, F-69241 LYON Cedex 04"
