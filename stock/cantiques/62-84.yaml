numero: "62-84"
titre: "Seigneur, garde-nous"
couplets:
  - |
    Seigneur, garde-nous, Seigneur, sauve-nous, / Et viens marcher sur nos routes.
    Sois l’eau et le pain / Sur le chemin, / Et que ta main nous bénisse. (bis)
  - |
    Seigneur, garde-nous, Seigneur, sauve-nous, / Viens alléger nos souffrances !
    Sois claire chaleur, / Beauté, douceur, / Dans les jours de froid et d’ombre. (bis)
  - |
    Seigneur, garde-nous, Seigneur, sauve-nous, / Et viens, du mal nous délivre !
    Sois force de paix / Au loin, au près, / Sois amour qui nous fait vivre. (bis)
  - |
    Seigneur, garde-nous, Seigneur, sauve-nous, / Ta paix toujours sur nous veille !
    Sois par ton Esprit, / En Jésus-Christ, / Notre espoir et notre guide. (bis)
    Yves Kéler *1939
    © Auteur (138)
credits: "Eugen Eckert *1954 — © Auteur (121)"
traductions:
  - langue: "de"
    couplets:
      - |
        Bewahre uns, Gott, behüte uns, Gott, / sei mit uns auf unsern Wegen.
        Sei Quelle und Brot / in Wüstennot, / sei um uns mit deinem Segen. (bis)
      - |
        Bewahre uns, Gott, behüte uns, Gott, / sei mit uns in allem Leiden.
        Voll Wärme und Licht / im Angesicht, / sei nahe in schweren Zeiten. (bis)
      - |
        Bewahre uns, Gott, behüte uns, Gott, / sei mit uns vor allem Bösen.
        Sei Hilfe, sei Kraft, / die Frieden schafft, / sei in uns, uns zu erlösen. (bis)
      - |
        Bewahre uns, Gott, behüte uns, Gott, / sei mit uns durch deinen Segen.
        Dein Heiliger Geist, / der Leben verheisst, / sei um uns auf unsern Wegen. (bis)
