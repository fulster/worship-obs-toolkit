numero: "41-10"
titre: "Bénissons Dieu, notre roi"
couplets:
  - |
    Bénissons Dieu, notre roi, le puissant roi de gloire !
    De ses bienfaits incessants célébrons la mémoire !
    Et qu'en tous lieux,
    Sur la terre et dans les cieux,
    Montent nos chants de victoire !
  - |
    Bénissons Dieu, notre roi, qui toujours fait justice,
    A l'orgueilleux redoutable, au plus humble propice !
    Riche en bonté,
    Pour ses enfants révoltés
    Son amour est sans limite.
  - |
    Bénissons Dieu, notre roi, célébrons ses louanges,
    Car il demeure à jamais quand tout passe et tout change.
    Il nous entend :
    Adressons-lui notre chant,
    Unis aux chœurs de ses anges !
    d'après Jules Vincent 1875-1954
    © Auteur (167)
credits: "Jan Wit 1914-1980 — © Interkerkelijke Stichtung woor het Kerklied, DS K. Holverda, Stenen Beer, NL-1035 JN Amsterdam (38)"
traductions:
  - langue: "en"
    couplets:
      - |
        Praise to the Lord, the Almighy, the King of creation ! / O my soul, praise him, for he is your health and salvation ! / Come, all who hear : / brothers and sisters, draw near, / praise him in glad adoration !
      - |
        Praise to the Lord, above all things so mightily reigning ; / keeping us safe at his side, / and so gently sustaining. / Have you not seen / all you have needed has been / met by his gracious ordaining ?
      - |
        Praise to the Lord, who shall prosper our work and defend us ; / surely his goodness and mercy / shall daily attend us. / Ponder anew / what the Almighty can do, / who with his love will befriend us.
      - |
        Praise to the Lord ! O let all that is in me adore him ! / All that has life and breath come now with praises before him ! / Let the Amen ! sound from his people again, / gladly with praise we adore him !
        d'après Catherine Winkworth 1827-1878
  - langue: "de"
    couplets:
      - |
        Lobe den Herren, den mächtigen König der Ehren ! / Lob ihn, o Seele, vereint mit den himmlischen Chören. / Kommet zu hauf ! / Psalter und Harfe, wacht auf, / lasset den Lobgesang hören !
      - |
        Lobe den Herren, der alles so herrlich regieret, / der wie auf Flügeln des Adlers dich sicher geführet, / der dich erhält, / wie es dir selber gefällt ; / hast du nicht dieses verspüret ?
      - |
        Lobe den Herren, der sichtbar dein Leben gesegnet, / der aus dem Himmel mit Strömen der Liebe geregnet. / Denke daran, / was der Allmächtige kann, / der dir mit Liebe begegnet.
      - |
        Lobe den Herren, was in mir ist, lobe den Namen. / Lob ihn mit allen, die seine Verheissung bekamen. / Er ist dein Licht, / Seele, vergiss es ja nicht. / Lob ihn in Ewigkeit. Amen.
        Joachim Neander 1650-1680
        Nederlands
  - langue: "xx"
    couplets:
      - |
        Lof zij de Heer, de almachtige Koning der ere, / Laat ons naar hartelust zingen en blij musiceren. / Komt allen saam, / Psalmzingt de heilige Naam, / Looft al wat ademt de Here.
      - |
        Lof zij de Heer, Hij omringt met zijn liefde uw leven ; / Heeft u in 't licht als op adelaarsvleuglen geheven. / Hij die u leidt, / Zodat uw hart zich verblijdt, / Hij heeft zijn woord u gegeven.
      - |
        Lof zij de Heer, die uw huis en uw haard heeft gezegend, / Lof zij de hemelse liefde die over ons regent. / Denk elke dag / Aan wat zijn almacht vermag, / Die u met liefde bejegent.
      - |
        Lof zij de Heer met de heerlijkste naam van zijn namen, / Christenen looft Hem met Abrahams kinderen samen. / Hart wees gerust, / Hij is uw licht en uw lust. / Alles wat ademt zegt : Amen.
