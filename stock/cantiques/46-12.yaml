numero: "46-12"
titre: "Seigneur, quand j'aurai faim"
couplets:
  - |
    Seigneur, quand j'aurai faim,
    donne-moi quelqu'un à nourrir !
    Quand je serai découragé,
    donne-moi quelqu'un à relever !
    Quand mon fardeau me pèsera,
    charge-moi de celui d'un autre !
    Quand j'aurai besoin de tendresse,
    que quelqu'un fasse appel à la mienne !
    Que ta volonté soit ma nourriture,
    que ta grâce soit ma force,
    que ton amour soit mon feu et mon repos,
    que ton Royaume soit mon espérance ! Amen.
credits: "Auteur inconnu"
