numero: "34-18"
titre: "A toi la gloire"
refrain: |
  A toi la gloire,
  O Ressuscité !
  A toi la victoire
  Pour l’éternité !
couplets:
  - |
    A toi la gloire,
    O Ressuscité !
    A toi la victoire
    Pour l’éternité !
    Brillant de lumière,
    L’ange est descendu,
    Il roule la pierre
    Du tombeau vaincu.
  - |
    Vois-le paraître :
    C’est lui, c’est Jésus,
    Ton Sauveur, ton maître,
    Oh ! ne doute plus !
    Sois dans l’allégresse,
    Peuple du Seigneur,
    Et redis sans cesse :
    Le Christ est vainqueur !
  - |
    Craindrais-je encore ?
    Il vit à jamais,
    Celui que j’adore,
    Le prince de paix.
    Il est ma victoire,
    Mon puissant soutien,
    Ma vie et ma gloire :
    Non, je ne crains rien. Refr.
    Edmond-Louis Budry 1854-1932
traductions:
  - langue: "en"
    couplets:
      - |
        Thine be the glory, / risen, conqu’ring Son,
        endless is the vict’ry / thou o’er death hast won.
        Angels in bright raiment / rolled the stone away,
        kept the folded grave clothes / where thy body lay.
        Chorus
        Thine be the glory, / risen conqu’ring Son,
        endless is the vict’ry / thou o’er death hast won.
      - |
        Lo ! Jesus meets us / risen from the tomb,
        lovingly he greets us, / scatters fear and gloom,
        let the Church with gladness / hymns of triumph sing,
        for her Lord now liveth, / death hast lost its sting : Chorus
      - |
        No more we doubt thee, / glorious Prince of life ;
        life is nought without thee : / aid us in our strife ;
        make us more than conqu’rors / through thy deathless love ;
        bring us safe through Jordan / to thy home above. Chorus
  - langue: "de"
    couplets:
      - |
        Herr, der dem Grabe / sieggekrönt entstieg,
        Dein ist Macht und Ehre, / ewig dein der Sieg.
        Wir auch sollen leben / mit dem Herrn zugleich,
        Er will uns erheben / in sein himmlisch Reich.
        Kehrvers
        Herr, der dem Grabe / sieggekrönt entstieg,
        Dein ist Macht und Ehre, / ewig dein der Sieg.
      - |
        Auf unser Flehen / gibt er und vergibt
        Jeder kann es sehen, / dass er lebt und liebt.
        Volk des Herrn, o freue / deines Königs dich !
        Seine Huld und Treue / währet ewiglich. Kehrvers
      - |
        Was kann uns scheiden / von der Liebe sein ?
        Trübsal oder Leiden, / irgend eine Pein ?
        Wovor soll mir grauen ? / Als ein Kind des Lichts
        Darf ich ihm vertrauen, / nein, ich fürchte nichts. Kehrvers
        Nederlands
  - langue: "xx"
    couplets:
      - |
        U zij de glorie, opgestane Heer !
        U zij de victorie nu en immermeer !
        In een blinkend stromen daalde d’engel af,
        Heeft de steen genomen van’t verwonnen graf. /
        U zij de glorie, opgestane Heer !
        U zij de victorie nu en immermeer !
      - |
        Zie Hem verschijnen, Jezus onzen Heer,
        Hij brengt al de Zijnen in zijn armen weer.
        Weest dan volk des Heeren, blijde en welgezind
        En zegt telken kere : Christus overwint.
        U zij de glorie…
      - |
        Zou ik nog vrezen, Nu Hij eeuwig leeft,
        Die mij heeft genezen, Die mij vrede geeft ?
        In Zijn god’lijk wezen, is mijn glorie groot,
        Niets heb ik te vrezen in leven of dood.
        U zij de glorie…
