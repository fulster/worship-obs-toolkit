numero: "24-01"
titre: "Voici le festin merveilleux"
couplets:
  - |
    Voici le festin merveilleux
    Où nous convie le Fils de Dieu,
    Pour recevoir le don précieux
    De sa grâce.
  - |
    Il vint des cieux pour nous servir,
    Pour donner sa vie et l’offrir
    En rançon pour nous affranchir,
    Dans sa grâce.
  - |
    Son sang, il le versa pour nous
    Et il nous dit : « Buvez-en tous,
    La vie éternelle est en vous ».
    Quelle grâce !
  - |
    O Jésus, toi qui fus livré,
    Pour nous à la croix attaché,
    Qu’à jamais tu sois adoré
    Pour ta grâce !
credits: "Texte : d’ap. une hymne attribuée à Jean Hus 15e s., adapt. RCPF 2000"
