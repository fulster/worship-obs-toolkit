numero: "p1124_2"
titre: "Pour être affermi dans la foi et dans la grâce"
couplets:
  - |
    Seigneur, renouvelle pour nous le baptême de ton Saint-Esprit.
    Tu l'as promis à tous ceux qui te le demanderont avec foi :
    nous te le demandons aujourd'hui pour nous.
    Esprit de lumière et de vérité,
    dirige-nous dans toute la vérité
    et fais-nous discerner ta volonté.
    Esprit de conseil et de force,
    soutiens-nous dans nos luttes et nos tentations
    et rends-nous vainqueurs.
    Esprit d'amour, de joie et de paix
    brille en nous comme une flamme
    que rien ne puisse éteindre.
    Aux premiers jours de l'Eglise,
    tu as inspiré le témoignage des apôtres :
    fais de nous aujourd'hui des témoins fidèles de l'Evangile.
    Amen.
    Pour etre affermi - 4		Source : Recueil de chants Alléluia
