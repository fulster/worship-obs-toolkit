numero: "p1130_1"
titre: "Intercéder au cœur du monde"
couplets:
  - |
    De tout péché, de toute erreur et de tout mal
    de la puissance et des ruses du Malin, d'une mort soudaine,
        préserve-nous, Seigneur.
    Des périls des temps de désordre et de guerre,
    de la faim et de la maladie,
        préserve-nous, Seigneur.
    Par le Christ, ton Fils bien-aimé,
    par sa naissance et par sa vie, par sa parole et ses miracles,
    par ses souffrances, par sa mort en croix et par sa résurrection,
        bénis-nous, Seigneur.
    Dans la prospérité et dans le malheur,
    dans la tentation et dans l'épreuve,
    à notre heure dernière et au jour du jugement,
        secours-nous, Seigneur.
    Nous te prions de bénir et de conduire ton Eglise universelle :
    qu'elle grandisse dans l'unité de la foi et de l'amour.
    Donne-lui des conducteurs fidèles à ta Parole
    et consacrés dans leur vie.
    Amène tous les peuples à la lumière de ton Evangile :
    envoie des ouvriers dans ta moisson.
    Fais-nous revenir à toi si nous nous égarons.
    Relève ceux qui sont tombés et affermis ceux qui sont debout.
    A nous tous donne ta force et ta lumière.
    Nous t'en prions par le Christ, ton Fils bien-aimé. Amen.
    Intercéder au cœur du monde - 1		Source : Recueil de chants Alléluia
