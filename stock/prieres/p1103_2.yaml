numero: "p1103_2"
titre: "CULTE DOMINICAL"
couplets:
  - |
    VARIANTE II
    Ouverture du culte
    (voir aussi 64-61 et suivants)
    Après un moment de silence ou de musique l'assemblée se constitue dans la louange, la repentance et l'accueil de la grâce.
    Salutation et prière d'ouverture
    La grâce et la paix vous sont données
    de la part de Dieu qui nous rassemble,
    et de Jésus-Christ qui nous aime et nous conduit.
    Prions :
    Seigneur,
    nous venons auprès de toi avec confiance et avec joie.
    Nous avons soif de ta Parole,
    nous avons faim de ta Vie.
    Tu ne nous laisseras pas repartir le cœur vide,
    nous le croyons à cause de Jésus-Christ, notre Seigneur,
    - Amen.
    Prière de louange (d'après le psaume 89)
    Sans fin, Seigneur, je chanterai ton amour,
    d'âge en âge je proclamerai ta fidélité ;
    oui, je dis : ton amour est établi pour toujours
    et ta fidélité est plus ferme que les cieux.
    Les cieux célèbrent tes merveilles, Seigneur,
    et l'assemblée des croyants ta fidélité.
    Seigneur, Dieu de l'univers, quelle est ta puissance ?
    C'est l'amour qui rayonne de toi !
    Heureux le peuple qui saura t'acclamer tout le jour ;
    à ton nom, il dansera de joie.
    Chant de louange
    Demande et accueil du pardon
    Si nous disons que nous sommes sans péché,
    nous nous trompons nous-mêmes
    et la vérité n'est pas en nous.
    Si nous confessons nos péchés,
    Dieu qui est fidèle et juste nous pardonnera
    et nous purifiera de tout mal.
    Dans la confiance que nous donne cette parole, confessons humblement nos fautes :
    Silence
    Dieu notre Père,
    nous avons péché contre toi,
    par notre propre faute,
    par nos pensées,
    nos paroles et nos actes,
    et par nos refus de parler
    et d'agir quand il le fallait.
    Pour l'amour de ton Fils, Jésus-Christ,
    pardonne nos fautes passées ;
    accorde-nous ta vie nouvelle pour te servir
    et pour vivre à la gloire de ton Nom,
    béni pour les siècles des siècles.
    - Amen.
    Ici l'on chante (61-11 et suivants) :
    Seigneur, aie pitié de nous !
    Christ, aie pitié de nous !
    Seigneur, aie pitié de nous !
    ou un autre chant de repentance
    Pour entendre la parole de grâce et de pardon, je vous invite à vous lever :
    Celui qui écoute ma parole, dit Jésus,
    et qui croit en Celui qui m'a envoyé,
    celui-là a la vie éternelle.
    Il ne vient pas en jugement,
    mais il est déjà passé de la mort à la vie. (Jean 5, 24)
    A cause de cette parole et de tout l'Évangile,
    il est permis de dire à tous ceux qui souffrent des contradictions de leur vie
    et qui mettent leur confiance en Jésus-Christ :
    Le Dieu tout-puissant vous fait miséricorde,
    il vous pardonne vos péchés
    et il vous conduit à la vie éternelle.
    Pardonnés et libérés, nous sommes appelés à servir
    comme nous y exhorte l'apôtre Paul :
    Ayez un même amour, un même cœur ;
    recherchez l'unité ;
    ne faites rien par rivalité, rien par gloriole,
    mais, avec humilité, considérez les autres comme supérieurs à vous.
    Que chacun ne regarde pas à soi seulement,
    mais aussi aux autres.
    Comportez-vous ainsi entre vous,
    comme on le fait en Jésus-Christ. (Ph 2,2-5)
    Chantons à Dieu notre reconnaissance.
    Chant d'action de grâce
    Liturgie de la Parole
    Prière d'illumination
    Père,
    ta Parole est pour nous ferment du Royaume et germe d'espérance.
    Que par ton Esprit, nous la recevions avec simplicité et avec joie.
    Que cette Parole nous fasse porter les fruits que tu attends.
    Nous te le demandons par Jésus-Christ, notre Seigneur.
    - Amen.
    Lectures bibliques
    On lit traditionnellement l'Écriture dans l'ordre suivant :
    - l'Ancien Testament
    - l'Épître
    - l'Évangile
    Entre les lectures, on peut chanter un ou plusieurs versets de psaume, ou conclure chaque lecture par un refrain psalmique ou une acclamation. On peut aussi conclure l'ensemble des lectures bibliques par un chant.
    Prédication
    Chant de l'assemblée
    Par ce chant, comme par la confession de foi qui le suit, l'assemblée répond à la Parole qu'elle vient d'accueillir dans l'Écriture et la prédication.
    Confession de foi
    On dit ensemble la confession de foi, sinon on peut la ponctuer par un refrain, par exemple 61-87 et suivants :
    Je crois, Seigneur, tu es source de vie.
    On peut aussi la conclure par une doxologie (61-51 et suivants) :
    Gloire au Père, au Fils, au Saint-Esprit !
    Nous croyons en Jésus-Christ,
    le Fils unique de Dieu,
    qui s'est fait homme
    pour que nous ayons pardon, joie et salut.
    Nous croyons qu'il est mort et ressuscité
    pour nous donner la victoire sur la mort
    et l'assurance de notre résurrection.
    Nous croyons qu'il viendra dans la puissance et la gloire,
    comme il est venu dans la faiblesse et l'humilité.
    Par lui, nous croyons en Dieu notre Père,
    qui nous prend pour ses enfants
    et nous aime comme Il aime Jésus-Christ.
    Nous croyons en l'Esprit saint
    qui agit en notre esprit
    et nous atteste que nous sommes enfants de Dieu,
    qui guide l'Eglise par sa Parole
    et nous révèle la gloire de Jésus-Christ.
    Nous croyons l'Eglise universelle,
    visible et invisible,
    pécheresse et pardonnée.
    Nous croyons que nous sommes tous liés à Jésus-Christ.
    Nous croyons que le Royaume de Dieu est notre commune espérance.
    Amen.
    Annonces
    Offrande
    L'offrande est elle aussi une réponse à la Parole du Seigneur. On peut la présenter avec la prière suivante :
    Seigneur, nous te rendons grâce pour les dons que, jour après jour, nous recevons de ta bonté. Accepte cette offrande comme un signe de notre amour et de notre consécration à ton service !
    Prière d'intercession
    On peut ponctuer chaque demande par un refrain, par exemple :
    Seigneur, écoute-nous, Seigneur, exauce-nous ! (66-02, 66-03)
    Pour que l'Eglise toute entière manifeste la vérité du Christ dans la communion à ses souffrances et à sa résurrection,
    prions le Seigneur.
    Pour ceux et celles qui sont usés par le travail et la fatigue,
    pour ceux que blessent les contraintes et les duretés de la vie,
    afin qu'ils rencontrent des frères et des sœurs capables de les aider,
    prions le Seigneur.
    Pour ceux et celles qui doivent affronter la vieillesse ou la maladie,
    pour ceux qui connaissent l'affliction ou le désespoir,
    prions le Seigneur.
    Pour ceux et celles qui portent de grandes responsabilités,
    afin qu'ils ne cherchent pas à dominer mais à servir,
    prions le Seigneur.
    Pour notre terre, création de Dieu,
    afin que tous ceux et celles qui l'habitent cessent de la meurtrir et de la défigurer,
    pour ceux qui consacrent leurs forces à restaurer la paix
    et à construire la justice,
    prions le Seigneur.
    Pour que notre communauté soit un lieu fraternel
    où soient vécus le service et le pardon,
    pour que toutes les générations y aient leur place
    et s'engagent au service du Christ,
    prions le Seigneur.
    Accueille, Seigneur nos prières,
    et fais-nous la grâce d'entrer toujours plus profondément
    dans ta pensée et dans ton service,
    par Jésus-Christ, notre Seigneur,
    - Amen.
    Liturgie du repas du Seigneur
    Chant de préparation
    Pendant ce chant le ou les officiants vont se placer à la table sur laquelle ont été disposés le pain et le vin.
    On restera debout jusqu'à la communion, comme le peuple d'Israël pour le repas pascal dans la nuit de sa délivrance.
    Préface
    Louons le Seigneur :
    C'est notre joie de te célébrer, ô Dieu notre Père,
    pour ce monde que tu as créé si beau
    et que tu gardes à travers ses douleurs
    jusqu'au jour où, selon ta promesse, viendra ton Royaume.
    C'est notre joie de te célébrer pour ton Fils, Jésus-Christ, notre Seigneur,
    né de notre chair, baptisé, tenté, transfiguré,
    condamné, crucifié,
    ressuscité d'entre les morts, élevé dans la gloire.
    C'est notre joie de te célébrer pour ton souffle de vie,
    l'Esprit d'adoption qui nous apprend à te dire Père,
    qui exorcise nos peurs et illumine notre foi.
    Aussi, avec les cieux et la terre,
    avec la multitude de ton peuple,
    de tout temps et de tout lieux,
    nous célébrons ton nom et nous chantons ta gloire
    Ici l'on chante (62-41 et suivants) :
    Saint, saint, saint est le Seigneur !
    Le ciel et la terre sont remplis de sa gloire.
    Hosanna ! au plus haut des cieux !
    Béni soit celui qui vient au nom du Seigneur !
    Hosanna dans les cieux !
    Prière eucharistique
    Rappelons-nous :
    Le soir venu, Jésus se mit à table avec les douze disciples.
    Pendant le repas, il prit du pain
    et après avoir rendu grâce,
    il le rompit et le leur donna en disant :
    " Prenez, mangez, ceci est mon corps. "
    Ayant aussi pris la coupe et rendu grâces,
    il la leur donna en disant :
    " Buvez-en tous, car ceci est mon sang,
    le sang de l'alliance qui est répandu pour beaucoup,
    pour la rémission des péchés.
    Je vous le dis désormais,
    je ne boirai plus de ce fruit de la vigne
    jusqu'au jour où je le boirai, nouveau,
    avec vous dans le Royaume de mon Père. "
    Ici l'on chante le chant d'anamnèse, par exemple 62-51 :
    Jésus, nous rappelons ta mort
    et ta résurrection,
    Et dans la foi nous attendons
    le jour de ton retour.
    En mémoire de Jésus, mort et ressuscité pour nous, nous te présentons, Père, ce pain et cette coupe où tu veux nous faire goûter le pain de la Vie et la coupe du Royaume, et nous te rendons grâce de nous avoir appelés, tels que nous sommes, à ton service.
    Ton Esprit seul donne la vie : que par son souffle nous ayons communion au corps et au sang de ton Fils, Jésus-Christ notre Seigneur, vivant au milieu de nous.
    Il n'y a qu'un pain et qu'une coupe : que ton Esprit nous donne de ne former qu'un même corps, qu'il nous fasse vivre dans la communion de ton Église, celle qui est en marche sur la terre et celle que déjà tu rassembles près de toi.
    Tiens-nous dans l'assurance d'être un jour réunis en toi avec tous ceux qui sont morts dans l'espérance de la résurrection. Qu'avec tes témoins de tous les temps, nous ayons part à la vie éternelle que tu nous offres en Jésus-Christ, notre Seigneur.
    C'est avec les mots que lui-même nous a donnés que nous te disons :
    Notre Père qui es au cieux...
    Invitation
    Tout est prêt, dit le Seigneur.
    Voici le repas que nos mains ont préparé,
    mais c'est le Seigneur qui nous invite.
    Voici la table que nous avons dressée,
    mais c'est le Seigneur qui la préside.
    Voici la joie que nous avons désirée,
    et c'est le Seigneur qui nous la donne.
    Voici le pain dont nous avons besoin,
    et c'est le Seigneur qui nous le distribue.
    Tout est prêt, dit le Seigneur. Venez !
    Selon les lieux ou les circonstances, on se groupe autour de la table, à moins que l'on n'y soit déjà rassemblé, ou encore on distribue la communion dans l'assemblée.
    Fraction du pain
    L'officiant dit en rompant le pain et en élevant la coupe :
    Voici le pain :
    Il est le fruit de la terre et du travail des hommes.
    Par le Saint-Esprit, il devient pour nous le rappel,
    la proclamation et le signe du sacrifice
    et de la présence du Seigneur Jésus qui a dit :
    " Je suis le pain vivant venu du ciel.
    Si quelqu'un mange de ce pain, il vivra éternellement. "
    Voici le vin :
    Il est le fruit de la terre et du travail des hommes.
    Par le Saint-Esprit, il devient pour nous le rappel,
    la proclamation et le signe du sacrifice
    et de la présence du Seigneur Jésus qui a dit :
    " Je suis le cep, vous êtes les sarments.
    Celui qui demeure attaché à moi porte beaucoup de fruit,
    car hors de moi, vous ne pouvez rien faire. "
    Ici on chante (62-61 et suivants) :
    Christ, Agneau de Dieu qui ôtes le péché du monde, prends pitié de nous !
    Christ, Agneau de Dieu qui ôtes le péché du monde, prends pitié de nous !
    Christ, Agneau de Dieu qui ôtes le péché du monde, donne-nous ta paix !
    Communion
    S'il n'y a pas eu de geste de paix précédemment, on peut se donner mutuellement la communion en disant :
    La paix soit avec toi !
    On peut aussi donner le pain et la coupe en disant :
    Le corps du Christ
    Le sang du Christ
    Puis l'officiant renvoie les communiants :
    Allez dans la paix du Christ !
    Prière après la communion
    Pour la force et le réconfort que tu nous as donnés
    par le corps et le sang du Christ,
          loué sois-tu, Seigneur !
    Pour la joie de ce repas
    pris en communion avec le Ressuscité,
          loué sois-tu, Seigneur !
    Pour l'unité en un même corps
    de tous ceux qui partagent le même pain et la même coupe,
          loué sois-tu, Seigneur !
    Pour la promesse de ton Royaume éternel,
          loué sois-tu, Seigneur !
    - Amen.
    Envoi et bénédiction
    Béni soit Dieu.
    Il nous a donné sa Parole pour que nous l'entendions.
    Il nous a promis son Royaume pour que nous espérions.
    Allons avec lui sur nos chemins,
    avec nos frères et nos sœurs,
    avec toute la création,
    dans l'audace du service et de l'adoration.
    Le Seigneur vous bénit et vous garde.
    Le Seigneur fait resplendir sur vous sa lumière
    et vous accorde sa grâce.
    Le Seigneur tourne sa face vers vous
    et vous donne la paix.
    - Amen.
    Chant d'envoi
    Culte dominical 2	1	Source : recueil de chants Alléluia
