numero: "p1122_2"
titre: "Pour le soir"
couplets:
  - |
    Reste avec nous, Seigneur, car le soir approche
    et le jour est à son déclin ;
    Reste avec nous et avec toute ton Eglise.
    Reste avec nous au soir du jour,
    au soir de la vie, au soir du monde.
    Reste avec nous par ta grâce et ta bonté,
    par ta Parole et ton Sacrement,
    par ton secours et ta bénédiction.
    Reste avec nous quand sur nous vient la nuit
    de l'affliction et de l'angoisse,
    la nuit du doute et de la tentation,
    la nuit amère de la mort.
    Reste avec nous et avec tous tes fidèles
    pour le temps et pour l'éternité. Amen.
    Wilhelm Löhe 1808-1872
    Pour le soir - 4		Source : Recueil de chants Alléluia
