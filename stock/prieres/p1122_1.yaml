numero: "p1122_1"
titre: "Pour le soir"
couplets:
  - |
    O Dieu, dont l'éclat ne s'éteint jamais,
    et dont la lumière n'a pas de fin,
    nous t'implorons à l'heure où le soir fait place à la nuit ;
    fais lever ta clarté dans nos cœurs et fortifie-nous par ta présence,
    de peur que nous ne soyons envahis par le péché.
    Exauce-nous au nom de Jésus-Christ, notre Seigneur.
    Amen.
    Liturgie des Eglises luthériennes de France 1965
    Pour le soir - 3		Source : Recueil de chants Alléluia
