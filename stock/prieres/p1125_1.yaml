numero: "p1125_1"
titre: "Pour être affermi dans la foi et dans la grâce"
couplets:
  - |
    Seigneur, j'ai besoin de déposer devant toi le fardeau de mon péché.
    Assez de ces excuses par lesquelles je me trompe moi-même !
    Pardon pour ma tiédeur, pour mes lâchetés, pour mon égoïsme,
    pour mon orgueil, pour mon acharnement à faire ma volonté et non la tienne.
    Pardon pour mon manque d'amour pour mes frères,
    pour mes jugements et mes paroles blessantes à leur égard.
    Pardon de n'avoir pas cru que ta Parole était claire et ta volonté simple,
    et de m'être laissé prendre dans l'écheveau inextricable de mes désobéissances.
    Pardon de n'avoir pas vécu de ta liberté et de ne pas avoir travaillé pour ta paix.
    Seigneur miséricordieux, pardonne-moi.
    Je me confie à ta grâce et je remets ma vie entre tes mains.
    J'attends ton salut et ton règne. Amen.
    Nous avons un défenseur devant le Père,
    Jésus-Christ le Juste.
    Il est la victime offerte pour nos péchés,
    et non seulement pour les nôtres,
    mais encore pour ceux du monde entier. (1 Jean 2, 1-2)
    Je veux dire merci au Seigneur ;
    de tout mon cœur, je veux remercier l'unique vrai Dieu.
    Oui, je veux remercier le Seigneur
    sans oublier un seul de ses bienfaits.
    C'est lui qui pardonne toutes mes fautes,
    guérit toutes mes maladies, m'arrache à la tombe,
    me comble de tendresse et de bonté. (Psaume 103,1-4)
    Pour etre affermi - 6		Source : Recueil de chants Alléluia
