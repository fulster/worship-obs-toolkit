numero: "p1134_3"
titre: "Prier dans l'épreuve"
couplets:
  - |
    En cette heure où la mort nous fait douter de la vie,
    où l'épreuve nous fait douter de ton amour et de ta puissance,
    Seigneur, tiens-nous dans ta main.
    Dans notre nuit, fais briller ta lumière.
    Par la puissance de ton Saint-Esprit,
    viens au secours de la faiblesse de notre foi :
    tiens-nous debout dans l'espérance.
    En cette heure où la mort trace sa déchirure,
    garde-nous pour toujours dans ton amour en Jésus.
    Amen.
    Les bontés du Seigneur ne sont pas épuisées,
    il n'est pas au bout de son amour.
    Sa bonté se renouvelle chaque matin. (Lamentations 3,22-23)
