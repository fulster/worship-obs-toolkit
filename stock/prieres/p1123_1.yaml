numero: "p1123_1"
titre: "Pour le soir"
couplets:
  - |
    Seigneur, je ne veux plus penser à rien.
    Je veux maintenant fermer les volets et tirer les rideaux,
    tourner la page de cette journée, accueillir la sérénité et le repos,
    pour y trouver la force d'écrire la page de demain.
    Seigneur, je ne veux pas que me poursuivent dans une nuit agitée
    les gens et les choses du jour fini.
    Je sais bien ce que j'ai fait et ce que je n'ai pas fait,
    ce que j'ai dû entendre, ce que j'aurais voulu entendre.
    Je sais bien ceux à qui j'ai fait du bien, ceux à qui je n'ai pas su en faire,
    ceux à qui j'ai fait du mal, et ceux qui m'en ont fait.
    Je sais bien ceux que j'aime et ceux que je n'aime pas.
    Je sais bien le projet qui tarde à aboutir,
    l'obstacle à ce qui doit changer, et la pesanteur de ce qui existe.
    Mais, Seigneur, je veux maintenant te confier tout cela,
    m'en décharger à tes pieds pour que tu t'en occupes,
    parce qu'après tout, c'est ton affaire autant et même plus que la mienne.
    Je te nomme maintenant les personnes et les choses, une par une,
    et je les pose là où je les retrouverai demain, sous tes yeux, Seigneur.
    Accorde-moi une bonne nuit, et bénis mon sommeil, toi qui veilles.
    Amen
    Pour le soir - 6		Source : Recueil de chants Alléluia
