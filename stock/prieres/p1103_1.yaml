numero: "p1103_1"
titre: "CULTE DOMINICAL"
couplets:
  - |
    VARIANTE I
    Ouverture du culte
    (voir aussi 64-61 et suivants)
    Après un moment de silence ou de musique l’assemblée se constitue dans la louange, la repentance et l’accueil de la grâce.
    Salutation et prière d’ouverture
    Que la grâce de notre Seigneur Jésus-Christ,
    l’amour de Dieu le Père
    et la communion du Saint-Esprit soient avec vous tous.
    Prions :
    Seigneur, voici le jour que tu as fait, jour de joie pour ton Eglise.
    Donne-nous aujourd’hui ton Esprit saint
    qu’il se saisisse de chacun de nous
    et fasse toutes choses nouvelles,
    par Jésus-Christ, notre Seigneur,
    – Amen.
    Prière de louange (d’après le psaume 95)
    Acclamez le Seigneur, terre entière,
    servez le Seigneur dans l’allégresse,
    venez à lui avec des chants de joie !
    Reconnaissez que le Seigneur est Dieu :
    Il nous a faits et nous sommes à lui,
    nous, son peuple, son troupeau.
    Venez dans sa maison lui rendre grâce,
    dans sa demeure chanter ses louanges.
    Rendez-lui grâce et bénissez son nom :
    Oui, le Seigneur est bon,
    éternel est son amour,
    sa fidélité demeure d’âge en âge.
    Chant de louange
    Demande et accueil du pardon
    Écoutons comment Dieu veut être servi :
    Écoute Israël, le Seigneur notre Dieu est l’unique Seigneur.
    Tu aimeras le Seigneur ton Dieu de tout ton cœur,
    de toute ton âme, de toute ta pensée et de toute ta force.
    C’est là le premier, le grand commandement.
    Et voici le second qui lui est semblable :
    Tu aimeras ton prochain comme toi-même.
    Aucun autre commandement n’est plus grand que ces deux-là. (Marc 12, 29-31)
    La Loi du Seigneur nous conduit à la repentance.
    Reconnaissons humblement que nous sommes pécheurs :
    Silence
    Seigneur Dieu,
    nous avons préféré nos désirs à ta volonté ;
    nous avons travaillé pour nous,
    plus que pour ton Royaume.
    Nous nous sommes aimés nous-mêmes,
    plus que nous n’avons aimé notre prochain et toi-même.
    Pardonne-nous, Seigneur, de n’avoir pas changé,
    de nous être si souvent repentis en vain.
    Toi qui nous connais mieux que nous-mêmes,
    toi qui nous aimes en dépit de tout,
    change notre volonté.
    Et avec ton pardon,
    accorde-nous la force et la joie de mieux t’aimer et te servir.
    Par Jésus-Christ ton Fils, notre Sauveur.
    – Amen.
    Ici l’on chante (61-11 et suivants) :
    Seigneur, aie pitié de nous !
    Christ, aie pitié de nous !
    Seigneur, aie pitié de nous !
    ou un autre chant de repentance
    Pour entendre la parole de grâce et de pardon, je vous invite à vous lever :
    Dieu a tant aimé le monde
    qu’il a donné son Fils unique,
    afin que tout homme qui croit en lui
    ne meure pas, mais qu’il ait la vie éternelle. (Jn 3,16)
    A vous qui vous reconnaissez pécheurs
    et croyez que le Père vous fait miséricorde en Jésus-Christ,
    j’annonce le pardon de vos péchés,
    au nom du Père, du Fils et du Saint-Esprit.
    Amen.
    Chantons à Dieu notre reconnaissance.
    Chant d’action de grâce
    Liturgie de la Parole
    Prière d’illumination
    Seigneur, nous voulons être entre tes mains comme l’argile dans les mains du potier. Donne-nous ton Esprit, ouvre nos cœurs et que ta Parole nous façonne, à l’image de ton Fils, Jésus-Christ, Notre Seigneur.
    – Amen.
    Lectures bibliques
    On lit traditionnellement l’Écriture dans l’ordre suivant :
    - l’Ancien Testament
    - l’Épître
    - l’Évangile
    Entre les lectures, on peut chanter un ou plusieurs versets de psaume, ou conclure chaque lecture par un refrain psalmique ou une acclamation. On peut aussi conclure l’ensemble des lectures bibliques par un chant.
    Prédication
    Chant de l’assemblée
    Par ce chant, comme par la confession de foi qui le suit, l’assemblée répond à la Parole qu’elle vient d’accueillir dans l’Écriture et la prédication.
    Confession de foi
    On dit ensemble la confession de foi, sinon on peut la ponctuer par un refrain, par exemple 61-87 et suivants :
    Je crois, Seigneur, tu es source de vie.
    On peut aussi la conclure par une doxologie (61-51 et suivants) :
    Gloire au Père, au Fils, au Saint-Esprit !
    Nous croyons en un seul Dieu,
    le Père tout-puissant, créateur du ciel et de la terre,
    de toutes les choses visibles et invisibles.
    Nous croyons en un seul Seigneur, Jésus-Christ,
    le Fils unique de Dieu,
    né du père avant tous les siècles,
    Dieu venu de Dieu,
    lumière issue de la lumière,
    vrai Dieu issu du vrai Dieu,
    engendré et non créé,
    d’une même substance que le Père
    et par qui tout a été fait ;
    qui pour nous les hommes et pour notre salut,
    est descendu des cieux
    et s’est incarné par le Saint-Esprit dans la vierge Marie
    et a été fait homme.
    Il a été crucifié pour nous sous Ponce Pilate,
    il a souffert et il a été mis au tombeau ;
    il est ressuscité des morts le troisième jour, conformément aux Ecritures ;
    il est monté aux cieux où il siège à la droite du Père.
    De là, il reviendra dans la gloire pour juger les vivants et les morts,
    et son règne n’aura pas de fin.
    Nous croyons en l’Esprit saint qui règne et qui donne la vie,
    qui procède du Père,
    qui a parlé par les prophètes,
    qui avec le Père et le Fils est adoré et glorifié ;
    nous croyons l’Eglise une et sainte, universelle et apostolique.
    Nous confessons un seul baptême pour la rémission des péchés ;
    nous attendons la résurrection des morts et la vie du monde à venir.
    Amen.
    Annonces
    Offrande
    L’offrande est elle aussi une réponse à la Parole du Seigneur. On peut la présenter avec la prière suivante :
    Seigneur, nous te rendons grâce pour les dons que, jour après jour, nous recevons de ta bonté. Accepte cette offrande comme un signe de notre amour et de notre consécration à ton service !
    Prière d’intercession
    On peut ponctuer chaque demande par un refrain, par exemple :
    Seigneur, écoute-nous, Seigneur, exauce-nous ! (66-02, 66-03)
    Pour le monde entier,
    pour tous les hommes nos frères,
    pour tous les peuples de la terre
    et pour ceux qui les gouvernent ;
    pour la paix entre les peuples,
    pour notre pays et pour notre ville (village),
    	nous te prions, Seigneur.
    Pour ton Église universelle,
    pour son unité, pour toutes les paroisses,
    pour la paroisse où nous vivons,
    pour tous les mouvements de jeunes ou d’adultes,
    pour les institutions, les œuvres, les services,
    pour les communautés, pour tous les ministères,
    	nous te prions, Seigneur.
    Pour les nouveaux baptisés et les catéchumènes,
    pour les malades et les souffrants,
    pour les foyers et les isolés,
    pour nos parents et nos amis,
    pour les jeunes et les vieillards,
    pour les opprimés et les persécutés,
    	nous te prions, Seigneur.
    Prière silencieuse - prières libres
    C’est avec confiance que nous t’adressons toutes nos prières,
    toi qui nous exauces bien au-delà de ce que nous demandons ou pensons,
    par Jésus-Christ notre Seigneur,
    – Amen.
    Liturgie du repas du Seigneur
    Chant de préparation
    Pendant ce chant, le ou les officiants vont se placer à la table sur laquelle ont été disposés le pain et le vin.
    On restera debout jusqu’à la communion, comme le peuple d’Israël pour le repas pascal dans la nuit de sa délivrance.
    Préface
    Élevons nos cœurs vers le Seigneur :
    Vraiment il est juste et bon de te rendre grâce, toujours et partout, Dieu notre Père, par Jésus-Christ, notre Seigneur.
    En lui tu as créé toutes choses et tu nous as façonnés à ta propre image. Par lui tu nous as rachetés de l’esclavage du péché et de la mort, tu nous as réconciliés avec toi et tu as fait de nous ton peuple.
    C’est pourquoi, avec l’Église universelle, avec les anges et la grande nuée des témoins, nous exaltons ton saint Nom et nous chantons ta gloire :
    Ici l’on chante (62-41 et suivants) :
    Saint, saint, saint est le Seigneur !
    Le ciel et la terre sont remplis de sa gloire.
    Hosanna ! au plus haut des cieux !
    Béni soit celui qui vient au nom du Seigneur !
    Hosanna dans les cieux !
    Prière eucharistique
    Prions le Seigneur :
    Tu es saint et bon, toi notre Père,
    toi qui as tant aimé le monde que tu as donné ton Fils unique
    afin que tout homme qui croit en lui
    ne meure pas mais qu’il ait la vie éternelle.
    Comme tu nous as aimés, lui aussi nous a aimés
    et c’est pour que nous demeurions dans son amour que,
    dans la nuit où il fut livré,
    il prit du pain
    et après avoir rendu grâce,
    il le rompit et le donna à ses disciples en disant :
    « Prenez et mangez :
    ceci est mon corps donné pour vous.
    Faites ceci en mémoire de moi. »
    De même, après le repas,
    il prit la coupe et, après avoir rendu grâce,
    il la leur donna en disant :
    « Buvez en tous car ceci est mon sang,
    le sang de la nouvelle Alliance,
    versé pour vous et pour beaucoup
    en rémission des péchés. »
    Faites ceci en mémoire de moi toutes les fois
    que vous en boirez.
    Ici l’on chante le chant d’anamnèse, par exemple 62-51 :
    Christ est venu, Christ est né,
    Christ a souffert, Christ est mort,
    Christ reviendra ! Christ est là.
    C’est dans la reconnaissance et dans la louange
    que nous prenons ce pain et ce vin
    pour proclamer la mort de ton Fils
    et pour annoncer sa résurrection dans l’attente de son retour.
    Par la puissance de ton Esprit, donne-nous, Seigneur,
    dans ce pain et dans ce vin,
    communion au corps et au sang de ton Christ.
    Que sa vie devienne la nôtre,
    que son amour devienne le nôtre.
    Qu’en lui nous puissions aimer d’un amour véritable,
    d’un amour plus fort que la mort,
    cette mort qu’il a vaincu en se donnant pour nous.
    Qu’en lui soit brisé tout ce qui nous sépare
    pour que nous ne fassions qu’un
    et que le monde croit en ton amour,
    dans l’attente du jour où tu nous rassembleras
    avec tous les rachetés dans le Royaume éternel de Jésus-Christ,
    ton Fils, notre Seigneur.
    C’est avec les paroles mêmes
    qu’il nous a enseignées que nous te disons ensemble :
    Notre Père…
    Invitation
    Voici, dit le Seigneur,
    je me tiens à la porte et je frappe.
    Si quelqu’un entend ma voix
    et m’ouvre la porte,
    je prendrai mon repas avec lui,
    et lui avec moi.
    Venez, car tout est prêt !
    Fraction du pain
    L’officiant dit en rompant le pain et en élevant la coupe :
    Le pain que nous rompons est la communion au corps du Christ.
    La coupe de bénédiction pour laquelle nous rendons grâce est la communion au sang du Christ, le sang de la Nouvelle Alliance versé pour nous et pour la multitude.
    Ici on chante (62-61 et suivants) :
    Christ, Agneau de Dieu qui ôtes le péché du monde, prends pitié de nous !
    Christ, Agneau de Dieu qui ôtes le péché du monde, prends pitié de nous !
    Christ, Agneau de Dieu qui ôtes le péché du monde, donne-nous ta paix !
    Communion
    S’il n’y a pas eu de geste de paix précédemment, on peut se donner mutuellement la communion en disant :
    La paix soit avec toi !
    On peut aussi donner le pain et la coupe en disant :
    Le corps du Christ
    Le sang du Christ
    Puis l’officiant renvoie les communiants :
    Allez dans la paix du Christ !
    Prière après la communion
    Seigneur, nous te rendons grâce pour la force et la joie de cette communion au corps et au sang du Christ, pour sa présence en nous et avec nous chaque jour.
    Envoie-nous dans le monde avec la puissance de ton Esprit pour vivre et travailler à ta louange et à ta gloire.
    – Amen.
    Envoi et bénédiction
    Poursuivez donc votre route dans le Christ Jésus, le Seigneur,
    tel que vous l’avez reçu.
    Soyez enracinés et fondés en lui,
    affermis dans la foi et débordants de reconnaissance.
    Et que le Dieu tout-puissant vous bénisse et vous garde,
    le Père, le Fils et l’Esprit saint.
    – Amen.
    Chant d’envoi
