numero: "p1124_1"
titre: "Pour être affermi dans la foi et dans la grâce"
couplets:
  - |
    Seigneur, donne-moi du courage
    pour changer les choses qui peuvent l'être.
    Donne-moi de la patience
    pour supporter celles que je ne peux changer.
    Donne-moi la sagesse
    pour distinguer les unes des autres.
    Friedrich Christoph Oetinger 1702-1782
    Pour etre affermi - 3		Source : Recueil de chants Alléluia
