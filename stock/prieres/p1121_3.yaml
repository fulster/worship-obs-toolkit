numero: "p1121_3"
titre: "Pour le soir"
couplets:
  - |
    Seigneur Dieu, puisqu'il t'a plu de créer la nuit
    pour le repos de l'homme,
    comme tu lui as ordonné le jour pour travailler,
    donne à notre corps une nuit paisible,
    élève à toi notre âme et remplis d'amour nos cœurs.
    Qu'ainsi notre esprit ait son repos comme notre corps a le sien.
    Que l'esprit du mal n'ait aucun pouvoir sur nous,
    et garde-nous contre tout danger,
    de sorte que notre sommeil même soit à la gloire de ton nom.
    Et puisque ce jour ne s'est point écoulé
    sans que nous t'ayons offensé de plusieurs manières,
    veuille, de même que tu caches maintenant toutes choses dans les ténèbres,
    ensevelir aussi toutes nos fautes dans ta miséricorde.
    Exauce-nous, notre Dieu, Père et Sauveur,
    par ton Fils Jésus-Christ notre Seigneur. Amen.
    d'après Jean Calvin (1509-1564)
    Pour le soir - 2		Source : Recueil de chants Alléluia
