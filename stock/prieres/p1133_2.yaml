numero: "p1133_2"
titre: "Prier dans l'épreuve"
couplets:
  - |
    Père plein de tendresse,
    c'est toi que j'invoque dans ma maladie.
    Je t'en supplie, aie pitié de moi !
    Garde-moi dans la foi en Jésus-Christ.
    fortifie-moi dans cette épreuve,
    et ne permets pas qu'elle dépasse mes forces.
    Donne-moi la patience pour supporter l'affliction ;
    et quand, dans ma souffrance,
    je ne sais pas te demander ce qu'il faut,
    que ton Saint-Esprit intercède pour moi.
    Sauve-moi et guéris-moi, toi le Dieu de la vie.
    Qu'ainsi je puisse te célébrer encore
    et te rendre grâce tous les jours,
    par Jésus-Christ mon Sauveur, amen.
